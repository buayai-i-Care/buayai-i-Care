<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสารสนเทศ มาสาย โดดเรียน พฤติกรรมไม่พึงประสงค์</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React แบบ Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- นำเข้า ExcelJS สำหรับสร้างไฟล์ Excel แบบมีหลายชีตและจัดฟอร์แมต -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', Tahoma, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ไอคอนแบบ Inline SVG ---
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconFilter = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-300 animate-[spin_4s_linear_infinite]"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;

        // --- ธีมสีประจำระดับชั้น ---
        const gradeColors = {
            'ม.1': { bg: 'bg-pink-50', text: 'text-pink-700', border: 'border-pink-300', active: 'bg-pink-600 text-white shadow-pink-200', tag: 'bg-pink-100 text-pink-700 border-pink-200' },
            'ม.2': { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-300', active: 'bg-emerald-600 text-white shadow-emerald-200', tag: 'bg-emerald-100 text-emerald-700 border-emerald-200' },
            'ม.3': { bg: 'bg-purple-50', text: 'text-purple-700', border: 'border-purple-300', active: 'bg-purple-600 text-white shadow-purple-200', tag: 'bg-purple-100 text-purple-700 border-purple-200' },
            'ม.4': { bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-300', active: 'bg-orange-500 text-white shadow-orange-200', tag: 'bg-orange-100 text-orange-700 border-orange-200' },
            'ม.5': { bg: 'bg-cyan-50', text: 'text-cyan-700', border: 'border-cyan-300', active: 'bg-cyan-600 text-white shadow-cyan-200', tag: 'bg-cyan-100 text-cyan-700 border-cyan-200' },
            'ม.6': { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-300', active: 'bg-amber-500 text-white shadow-amber-200', tag: 'bg-amber-100 text-amber-700 border-amber-200' },
            'default': { bg: 'bg-gray-50', text: 'text-gray-700', border: 'border-gray-300', active: 'bg-blue-600 text-white shadow-blue-200', tag: 'bg-gray-100 text-gray-700 border-gray-200' }
        };

        // --- ฟังก์ชันช่วยเหลือ ---
        const extractGradeLevel = (roomStr) => {
            if (!roomStr) return 'ไม่ระบุ';
            const str = String(roomStr).trim();
            if (str.includes('/')) {
                const grade = str.split('/')[0].replace('ม.', '').trim();
                return `ม.${grade}`;
            }
            return str;
        };

        const sortRooms = (a, b) => {
            const getNums = (str) => {
                const match = String(str).match(/(\d+)\/(\d+)/);
                return match ? [parseInt(match[1]), parseInt(match[2])] : [0, 0];
            };
            const [levelA, roomA] = getNums(a);
            const [levelB, roomB] = getNums(b);
            if (levelA !== levelB) return levelA - levelB;
            return roomA - roomB;
        };

        // แปลงวันที่เป็นรูปแบบภาษาไทย เช่น วันพุธที่ 9 มิ.ย. 2569
        const formatThaiDateFullText = (dateInput) => {
            if (!dateInput) return '';
            let d;
            const rawStr = String(dateInput).trim();
            
            // ตรวจสอบกรณีที่เป็นรูปแบบ 22/05/2026
            if (rawStr.includes('/')) {
                const parts = rawStr.split(' ')[0].split('/');
                if (parts.length === 3) {
                    let year = parseInt(parts[2], 10);
                    // เปลี่ยน พ.ศ. เป็น ค.ศ. สำหรับการแปลง
                    if (year > 2500) year -= 543;
                    d = new Date(`${year}-${parts[1]}-${parts[0]}`);
                } else {
                    d = new Date(rawStr);
                }
            } else {
                d = new Date(rawStr);
            }

            // ถ้าแปลงแล้วเป็น Invalid Date ให้แสดงค่าเดิม (เช่น "วันจันทร์ที่ 6 เม.ย. 2569" ที่พิมพ์มาตรงๆ)
            if (isNaN(d.getTime())) return rawStr; 
            
            const days = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
            const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            return `วัน${days[d.getDay()]}ที่ ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
        };

        // --- Component หลัก ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('late');
            const [data, setData] = useState({ late: [], skip: [], demerit: [] });
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);
            const [isMockData, setIsMockData] = useState(false);

            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [selectedGrade, setSelectedGrade] = useState('All');

            const [expandedGrade, setExpandedGrade] = useState(null); 
            const [expandedStudent, setExpandedStudent] = useState(null); 

            const [selectedDemeritTypes, setSelectedDemeritTypes] = useState([]);

            const GAS_URL = 'https://script.google.com/macros/s/AKfycbx8xYhO4G_ADQDpiCIXY7tdZmXUVRAK_JYdis3hfpLxzjRRD9jYt-2T_hqxp5ytQQ4i/exec';

            const mockResult = {
                late: [
                    { "วันที่มาสาย": "2026-05-11", "ห้อง": "3/9", "เลขประจำตัว": "32695", "ชื่อ-สกุล": "ดช.ธนพล ธรรมสุณา" },
                    { "วันที่มาสาย": "2026-05-12", "ห้อง": "3/2", "เลขประจำตัว": "32157", "ชื่อ-สกุล": "ดช.ธนาวัฒน์ บุญสิน" },
                    { "วันที่มาสาย": "2026-05-15", "ห้อง": "3/2", "เลขประจำตัว": "32157", "ชื่อ-สกุล": "ดช.ธนาวัฒน์ บุญสิน" },
                    { "วันที่มาสาย": "2026-05-12", "ห้อง": "1/8", "เลขประจำตัว": "33539", "ชื่อ-สกุล": "ดช.กมลทรรศ พันธ์สวัสดิ์" },
                    { "วันที่มาสาย": "2026-05-12", "ห้อง": "5/5", "เลขประจำตัว": "33147", "ชื่อ-สกุล": "นส.จิราภัค งิมขุนทด" },
                    { "วันที่มาสาย": "2026-05-13", "ห้อง": "3/1", "เลขประจำตัว": "32111", "ชื่อ-สกุล": "ดช.สมชาย ใจดี" },
                ],
                skip: [],
                demerit: [
                    { "วันที่": "2026-05-14", "ระดับชั้น": "5/7", "รหัสนักเรียน": "33829", "ชื่อ": "นายอิทธิพล มาตรวังแสง", "ประเภทความผิด": "โดดเรียน", "คะแนน": "-15" },
                    { "วันที่": "2026-05-24", "ระดับชั้น": "ม.2/9", "รหัสนักเรียน": "33579", "ชื่อ": "เด็กชายวัชรศักดิ์ จันทร์คำ", "ประเภทความผิด": "ดื่มสุราฯ", "คะแนน": "-60" },
                    { "วันที่": "2026-05-24", "ระดับชั้น": "ม.3/10", "รหัสนักเรียน": "33063", "ชื่อ": "เด็กชายธวัชชัย ดีสวน", "ประเภทความผิด": "สูบบุหรี่", "คะแนน": "-20" },
                    { "วันที่": "2026-05-25", "ระดับชั้น": "ม.3/10", "รหัสนักเรียน": "33063", "ชื่อ": "เด็กชายธวัชชัย ดีสวน", "ประเภทความผิด": "ทะเลาะวิวาท", "คะแนน": "-30" },
                    { "วันที่": "2026-05-26", "ระดับชั้น": "ม.3/1", "รหัสนักเรียน": "32001", "ชื่อ": "ดช.ก้าวหน้า ขยัน", "ประเภทความผิด": "มาสาย", "คะแนน": "-5" },
                ]
            };

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        const response = await fetch(GAS_URL);
                        if (!response.ok) throw new Error('Network response was not ok');
                        const result = await response.json();
                        
                        if(result.late && result.skip && result.demerit) {
                            setData(result);
                            setIsMockData(false);
                        } else {
                            throw new Error('Data structure invalid');
                        }
                    } catch (err) {
                        console.error('Fetch error:', err);
                        setData(mockResult);
                        setIsMockData(true);
                        setErrorMsg('กำลังแสดงข้อมูลตัวอย่าง (ไม่สามารถดึงข้อมูลจาก Google Sheets ได้ในขณะนี้)');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            const availableDemeritTypes = useMemo(() => {
                if (!data.demerit) return [];
                const types = new Set(data.demerit.map(item => item['ประเภทความผิด']).filter(Boolean));
                return Array.from(types).sort();
            }, [data.demerit]);

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setExpandedGrade(null);
                setExpandedStudent(null);
                setSelectedDemeritTypes([]);
            };

            const filteredData = useMemo(() => {
                let currentData = [];
                let dateField = '';
                let classField = '';

                if (activeTab === 'late') {
                    currentData = data.late || [];
                    dateField = 'วันที่มาสาย';
                    classField = 'ห้อง';
                } else if (activeTab === 'skip') {
                    currentData = data.skip || [];
                } else if (activeTab === 'demerit') {
                    currentData = data.demerit || [];
                    dateField = 'วันที่';
                    classField = 'ระดับชั้น';
                }

                return currentData.filter(item => {
                    let dateMatch = true;
                    let rawDate = item[dateField];
                    
                    if (rawDate) {
                        let parsedDate;
                        if(String(rawDate).includes('/')) {
                            const parts = String(rawDate).split(' ')[0].split('/');
                            if(parts.length === 3) parsedDate = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
                        } else {
                            parsedDate = new Date(rawDate);
                        }

                        const itemDate = parsedDate && !isNaN(parsedDate) ? parsedDate.getTime() : null;
                        const start = startDate ? new Date(startDate).getTime() : null;
                        const end = endDate ? new Date(endDate).getTime() : null;

                        if (itemDate) {
                            if (start && itemDate < start) dateMatch = false;
                            if (end && itemDate > (end + 86399999)) dateMatch = false; 
                        }
                    }

                    let gradeMatch = true;
                    if (selectedGrade !== 'All') {
                        const itemGrade = extractGradeLevel(item[classField]);
                        if (itemGrade !== selectedGrade) gradeMatch = false;
                    }

                    let typeMatch = true;
                    if (activeTab === 'demerit' && selectedDemeritTypes.length > 0) {
                        if (!selectedDemeritTypes.includes(item['ประเภทความผิด'])) {
                            typeMatch = false;
                        }
                    }

                    return dateMatch && gradeMatch && typeMatch;
                });
            }, [data, activeTab, startDate, endDate, selectedGrade, selectedDemeritTypes]);

            const stats = useMemo(() => {
                const gradeCounts = {};
                let classField = activeTab === 'late' ? 'ห้อง' : 'ระดับชั้น';
                
                filteredData.forEach(item => {
                    const grade = extractGradeLevel(item[classField]);
                    if(grade !== 'ไม่ระบุ') {
                        gradeCounts[grade] = (gradeCounts[grade] || 0) + 1;
                    }
                });

                return { 
                    totalLate: (data.late || []).length, 
                    totalSkip: (data.skip || []).length, 
                    totalDemeritItems: (data.demerit || []).length, 
                    gradeCounts 
                };
            }, [data, filteredData, activeTab]);

            const getGroupedStudents = useMemo(() => {
                if (!expandedGrade) return [];

                let classField = activeTab === 'late' ? 'ห้อง' : 'ระดับชั้น';
                let idField = activeTab === 'late' ? 'เลขประจำตัว' : 'รหัสนักเรียน';
                let nameField = activeTab === 'late' ? 'ชื่อ-สกุล' : 'ชื่อ';

                const gradeData = filteredData.filter(item => extractGradeLevel(item[classField]) === expandedGrade);
                
                const map = new Map();
                gradeData.forEach(item => {
                    const sid = item[idField] || 'ไม่มีรหัส';
                    if (!map.has(sid)) {
                        map.set(sid, {
                            studentId: sid,
                            name: item[nameField] || 'ไม่ระบุชื่อ',
                            room: item[classField] || '-',
                            count: 0,
                            records: []
                        });
                    }
                    const entry = map.get(sid);
                    entry.count += 1;
                    entry.records.push(item);
                });

                return Array.from(map.values()).sort((a, b) => sortRooms(a.room, b.room));
            }, [filteredData, expandedGrade, activeTab]);

            const handleDemeritTypeToggle = (type) => {
                setSelectedDemeritTypes(prev => 
                    prev.includes(type) ? prev.filter(t => t !== type) : [...prev, type]
                );
                setExpandedGrade(null);
                setExpandedStudent(null);
            };

            // ==========================================
            // ฟังก์ชันดาวน์โหลดเป็นไฟล์ Excel (.xlsx) อย่างเต็มรูปแบบ
            // ==========================================
            const handleExportExcel = async () => {
                if (!filteredData || filteredData.length === 0) {
                    alert("ไม่มีข้อมูลสำหรับดาวน์โหลด");
                    return;
                }

                const workbook = new ExcelJS.Workbook();
                const fontTH = { name: 'TH SarabunPSK', size: 16 };
                const fontTHBold = { name: 'TH SarabunPSK', size: 16, bold: true };
                const fontTitle = { name: 'TH SarabunPSK', size: 18, bold: true };

                const topicName = activeTab === 'late' ? 'การมาสาย' : (activeTab === 'skip' ? 'การหนีเรียน/โดดเรียน' : 'พฤติกรรมไม่พึงประสงค์');
                const classField = activeTab === 'late' ? 'ห้อง' : 'ระดับชั้น';
                const idField = activeTab === 'late' ? 'เลขประจำตัว' : 'รหัสนักเรียน';
                const nameField = activeTab === 'late' ? 'ชื่อ-สกุล' : 'ชื่อ';
                const dateField = activeTab === 'late' ? 'วันที่มาสาย' : 'วันที่';

                // สรุปข้อมูลยอดรวมรายห้อง
                const roomStats = {};
                filteredData.forEach(item => {
                    const room = item[classField] || 'ไม่ระบุ';
                    if (!roomStats[room]) roomStats[room] = 0;
                    roomStats[room]++;
                });
                const sortedRooms = Object.keys(roomStats).sort(sortRooms);

                // ----------------------------------------------------
                // 1. ชีต "สารสนเทศ"
                // ----------------------------------------------------
                const sheet1 = workbook.addWorksheet('สารสนเทศ');
                sheet1.getColumn(1).width = 30;
                sheet1.getColumn(2).width = 20;

                sheet1.addRow(['สรุปสารสนเทศระบบดูแลช่วยเหลือผู้เรียน']).font = fontTitle;
                sheet1.addRow([`เรื่อง: ${topicName}`]).font = fontTHBold;
                sheet1.addRow(['']);
                sheet1.addRow(['ยอดรวมทั้งหมด:', `${filteredData.length} รายการ`]).font = fontTHBold;
                sheet1.addRow(['']);
                
                sheet1.addRow(['รายละเอียดรายห้อง']).font = fontTHBold;
                sortedRooms.forEach(room => {
                    sheet1.addRow([`ห้อง ${room}`, `${roomStats[room]} รายการ`]).font = fontTH;
                });

                // ----------------------------------------------------
                // 2. ชีต "รายละเอียด"
                // ----------------------------------------------------
                const sheet2 = workbook.addWorksheet('รายละเอียด');
                sheet2.getColumn(1).width = 15; // รหัส
                sheet2.getColumn(2).width = 30; // วันที่ / ชื่อ
                sheet2.getColumn(3).width = 40; // รายละเอียดประเภท
                sheet2.getColumn(4).width = 25; // หมายเหตุ

                const currentYear = new Date().getFullYear() + 543;

                // เพิ่มหัวข้อของหน้า "รายละเอียด" จัดกึ่งกลาง ตัวใหญ่ สวยงาม
                const s2Title1 = sheet2.addRow([`บันทึกการติดตาม${topicName} ระบบ Buayai I Care School`]);
                s2Title1.font = { name: 'TH SarabunPSK', size: 22, bold: true };
                s2Title1.alignment = { horizontal: 'center', vertical: 'middle' };
                sheet2.mergeCells('A1:D1'); // ผสานเซลล์ 4 คอลัมน์แรก

                const s2Title2 = sheet2.addRow([`โรงเรียนบัวใหญ่ ภาคเรียนที่[  ] ปีการศึกษา[ ${currentYear} ]`]);
                s2Title2.font = { name: 'TH SarabunPSK', size: 18, bold: true };
                s2Title2.alignment = { horizontal: 'center', vertical: 'middle' };
                sheet2.mergeCells('A2:D2');

                sheet2.addRow(['']); // เว้นบรรทัด

                sortedRooms.forEach(room => {
                    const roomData = filteredData.filter(item => item[classField] === room);
                    
                    const headerRow = sheet2.addRow([`รายชื่อนักเรียน ห้อง ${room}`]);
                    headerRow.font = { name: 'TH SarabunPSK', size: 18, bold: true, color: { argb: 'FF0000FF' } }; // ตัวหนา สีน้ำเงิน
                    
                    // จัดกลุ่มรายคนในห้อง
                    const studentMap = new Map();
                    roomData.forEach(item => {
                        const sid = item[idField];
                        if (!studentMap.has(sid)) {
                            studentMap.set(sid, { name: item[nameField], count: 0, records: [] });
                        }
                        const s = studentMap.get(sid);
                        s.count++;
                        s.records.push(item);
                    });

                    studentMap.forEach((sData, sid) => {
                        // สรุปยอดรายคน (เพิ่มหัวข้อ 'หมายเหตุ' ไว้ตรงคอลัมน์ที่ 4)
                        sheet2.addRow([`รหัส: ${sid}`, `ชื่อ: ${sData.name}`, `ยอดรวม: ${sData.count} ครั้ง`, 'หมายเหตุ']).font = fontTHBold;
                        
                        // แสดงรายละเอียดแต่ละครั้ง
                        sData.records.forEach(rec => {
                            const dateStr = rec[dateField] ? formatThaiDateFullText(rec[dateField]) : '-';
                            
                            let extraInfo = '';
                            if (activeTab === 'demerit') {
                                const typeStr = rec['ประเภทความผิด'] || '-';
                                const score = String(rec['คะแนน']);
                                // ซ่อนคำว่า undefined หากข้อมูลคะแนนว่างเปล่า
                                if (rec['คะแนน'] !== undefined && score !== 'undefined' && score !== 'null' && score.trim() !== '') {
                                    extraInfo = `ประเภท: ${typeStr} (${score} คะแนน)`;
                                } else {
                                    extraInfo = `ประเภท: ${typeStr}`;
                                }
                            } else {
                                extraInfo = activeTab === 'late' ? 'มาสาย' : 'โดดเรียน/หนีเรียน';
                            }
                            
                            // ดึงข้อมูลหมายเหตุ หากในระบบยังไม่มี จะเป็นช่องว่างเพื่อให้ผู้ใช้พิมพ์เพิ่มได้
                            const remarkStr = rec['หมายเหตุ'] || '';
                            
                            sheet2.addRow(['', dateStr, extraInfo, remarkStr]).font = fontTH;
                        });
                        sheet2.addRow(['']); // เว้นบรรทัดรายบุคคล
                    });
                    sheet2.addRow(['']); // เว้นบรรทัดระหว่างห้อง
                });

                // ----------------------------------------------------
                // 3. ชีต "ดำเนินการ"
                // ----------------------------------------------------
                const sheet3 = workbook.addWorksheet('ดำเนินการ', {
                    pageSetup: { 
                        paperSize: 9, // A4
                        orientation: 'portrait', 
                        margins: { left: 0.25, right: 0.25, top: 0.75, bottom: 0.75, header: 0.3, footer: 0.3 } 
                    }
                });

                const gradeDisplay = selectedGrade === 'All' ? 'ทั้งหมด' : selectedGrade;
                const currentYear = new Date().getFullYear() + 543;

                sheet3.addRow([`แบบบันทึกการติดตาม ${topicName} ระดับชั้น ${gradeDisplay} ระบบดูแลช่วยเหลือผู้เรียนดิจิทัล`]).font = fontTitle;
                sheet3.addRow([`โรงเรียนบัวใหญ่ ภาคเรียนที่[  ] ปีการศึกษา[ ${currentYear} ]`]).font = fontTitle;
                sheet3.addRow([`ข้อมูล ณ ${formatThaiDateFullText(new Date())}`]).font = fontTH;
                sheet3.addRow(['']);

                // สร้างข้อความสรุปด้านบน
                let summaryText = `${topicName}รวม ${filteredData.length} คน `;
                sortedRooms.forEach(room => {
                    summaryText += `ห้อง ${room} ${roomStats[room]} คน, `;
                });
                summaryText = summaryText.replace(/, $/, ''); // ลบลูกน้ำตัวสุดท้าย
                
                const sumRow = sheet3.addRow([summaryText]);
                sumRow.font = fontTHBold;
                sumRow.alignment = { wrapText: true }; 

                sheet3.addRow(['']);

                // หัวตารางรายชื่อ
                sheet3.addRow(['ลำดับ', 'รหัส', 'ชื่อ-สกุล', 'ห้อง', 'จำนวนครั้ง', 'ผลการดำเนินการ/หมายเหตุ']).font = fontTHBold;
                sheet3.getColumn(1).width = 8;
                sheet3.getColumn(2).width = 12;
                sheet3.getColumn(3).width = 25;
                sheet3.getColumn(4).width = 10;
                sheet3.getColumn(5).width = 12;
                sheet3.getColumn(6).width = 25;

                // ใส่รายชื่อทุกคน
                let rowCount = 1;
                sortedRooms.forEach(room => {
                    const roomData = filteredData.filter(item => item[classField] === room);
                    
                    const tempMap = new Map();
                    roomData.forEach(item => {
                        const sid = item[idField];
                        if (!tempMap.has(sid)) tempMap.set(sid, { name: item[nameField], count: 0 });
                        tempMap.get(sid).count++;
                    });

                    tempMap.forEach((val, sid) => {
                        sheet3.addRow([rowCount++, sid, val.name, room, val.count, '']).font = fontTH;
                    });
                });

                // ตีเส้นตารางให้ชีตดำเนินการ (เริ่มบรรทัดที่ 7)
                sheet3.eachRow((row, rowNumber) => {
                    if(rowNumber >= 7) { 
                        row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                            if(colNumber <= 6) {
                                cell.border = {
                                    top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'}
                                };
                            }
                        });
                    }
                });

                // สร้างและดาวน์โหลดไฟล์
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `สารสนเทศ_${topicName}_${new Date().toISOString().split('T')[0]}.xlsx`;
                link.click();
            };

            if (loading) return <div className="flex h-screen items-center justify-center text-blue-600 text-xl font-semibold">กำลังโหลดข้อมูล...</div>;

            return (
                <div className="min-h-screen bg-gray-50 p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {isMockData && (
                            <div className="bg-amber-50 border-l-4 border-amber-500 p-4 rounded shadow-sm text-amber-800 flex items-center gap-2">
                                <IconAlert /> {errorMsg}
                            </div>

                            <div>
                                <h1 className="text-2xl font-bold text-gray-900">ระบบสารสนเทศงานกิจการนักเรียน</h1>
                                <p className="text-gray-500 mt-1">แดชบอร์ดสรุปสถิติ มาสาย โดดเรียน และตัดคะแนนความประพฤติ</p>
                            </div>
                            
                            {/* เปลี่ยนปุ่มเรียกฟังก์ชัน Export เป็น handleExportExcel */}
                            <button 
                                onClick={handleExportExcel}
                                className="mt-4 md:mt-0 flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors shadow-sm"
                            >
                                <IconDownload />
                                <span>ดาวน์โหลด Excel</span>
                            </button>
                        </div>

                        {/* การ์ดภาพรวม */}

                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-md transition-shadow">
                                <div className="p-4 bg-orange-100 text-orange-600 rounded-full"><IconClock /></div>
                                <div>
                                    <p className="text-sm text-gray-500 font-medium">มาสาย (ทั้งหมด)</p>
                                    <p className="text-2xl font-bold text-gray-900">{stats.totalLate} <span className="text-sm font-normal text-gray-500">ครั้ง</span></p>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-md transition-shadow">
                                <div className="p-4 bg-purple-100 text-purple-600 rounded-full"><IconUsers /></div>
                                <div>
                                    <p className="text-sm text-gray-500 font-medium">โดดเรียน (ทั้งหมด)</p>
                                    <p className="text-2xl font-bold text-gray-900">{stats.totalSkip} <span className="text-sm font-normal text-gray-500">รายการ</span></p>
                                </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-md transition-shadow">

                                    <p className="text-sm text-gray-500 font-medium">ตัดคะแนน (ทั้งหมด)</p>

                                </div>
                            </div>

                            <div className="flex border-b overflow-x-auto hide-scrollbar bg-gray-50/50">
                                <button onClick={() => handleTabChange('late')} className={`px-6 py-4 font-semibold whitespace-nowrap transition-colors ${activeTab === 'late' ? 'border-b-2 border-blue-600 text-blue-700 bg-white' : 'text-gray-500 hover:text-gray-800'}`}>สารสนเทศการมาสาย</button>
                                <button onClick={() => handleTabChange('skip')} className={`px-6 py-4 font-semibold whitespace-nowrap transition-colors ${activeTab === 'skip' ? 'border-b-2 border-blue-600 text-blue-700 bg-white' : 'text-gray-500 hover:text-gray-800'}`}>สารสนเทศการหนีเรียน โดดเรียน</button>
                                <button onClick={() => handleTabChange('demerit')} className={`px-6 py-4 font-semibold whitespace-nowrap transition-colors ${activeTab === 'demerit' ? 'border-b-2 border-blue-600 text-blue-700 bg-white' : 'text-gray-500 hover:text-gray-800'}`}>สารสนเทศพฤติกรรมไม่พึงประสงค์</button>
                            </div>

                            {/* --- แท็บโดดเรียน --- */}
                            {activeTab === 'skip' && (
                                <div className="p-16 flex flex-col items-center justify-center text-center bg-gray-50/50">
                                    <IconSettings />
                                    <h2 className="mt-6 text-2xl font-bold text-gray-700">กำลังพัฒนา</h2>
                                    <p className="text-gray-500 mt-2">ส่วนสารสนเทศการหนีเรียนและโดดเรียน อยู่ระหว่างการปรับปรุงระบบ</p>
                                </div>
                            )}

                            {/* --- แท็บมาสาย / พฤติกรรม --- */}
                            {activeTab !== 'skip' && (
                                <>
                                    {/* ส่วนตัวกรอง (Filter) */}
                                    <div className="p-4 bg-white border-b flex flex-col md:flex-row gap-4 items-end">
                                        <div className="flex-1 w-full">
                                            <label className="text-sm font-medium text-gray-700 mb-1 flex items-center gap-1"><IconCalendar /> ตั้งแต่วันที่</label>
                                            <input type="date" value={startDate} onChange={(e) => {setStartDate(e.target.value); setExpandedGrade(null); setExpandedStudent(null);}} className="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                                        </div>
                                        <div className="flex-1 w-full">
                                            <label className="text-sm font-medium text-gray-700 mb-1 flex items-center gap-1"><IconCalendar /> ถึงวันที่</label>
                                            <input type="date" value={endDate} onChange={(e) => {setEndDate(e.target.value); setExpandedGrade(null); setExpandedStudent(null);}} className="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                                        </div>
                                        <div className="flex-1 w-full">
                                            <label className="text-sm font-medium text-gray-700 mb-1 flex items-center gap-1"><IconFilter /> ระดับชั้น (ตัวกรองภาพรวม)</label>
                                            <select value={selectedGrade} onChange={(e) => {setSelectedGrade(e.target.value); setExpandedGrade(null); setExpandedStudent(null);}} className="w-full border-gray-300 rounded-lg p-2 border focus:ring-2 focus:ring-blue-500 outline-none bg-white text-sm">
                                                <option value="All">รวมทุกระดับชั้น</option>
                                                <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                                                <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                                                <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                                                <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                                                <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                                                <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                                            </select>
                                        </div>
                                        <div className="w-full md:w-auto">
                                            <button 
                                                onClick={() => { setStartDate(''); setEndDate(''); setSelectedGrade('All'); setSelectedDemeritTypes([]); setExpandedGrade(null); setExpandedStudent(null); }}
                                                className="w-full md:w-auto px-4 py-2 text-sm text-gray-600 bg-gray-100 border border-transparent rounded-lg hover:bg-gray-200 transition-colors font-medium"
                                            >
                                                ล้างตัวกรอง
                                            </button>
                                        </div>
                                    </div>

                                    {/* หมวดหมู่พฤติกรรม (เฉพาะแท็บพฤติกรรม) */}
                                    {activeTab === 'demerit' && availableDemeritTypes.length > 0 && (
                                        <div className="p-4 bg-gray-50 border-b">
                                            <label className="text-sm font-semibold text-gray-700 mb-3 block flex items-center gap-2"><IconFilter /> กรองตามหมวดหมู่พฤติกรรม:</label>
                                            <div className="flex flex-wrap gap-2">
                                                {availableDemeritTypes.map(type => {
                                                    const isSelected = selectedDemeritTypes.includes(type);
                                                    return (
                                                        <label key={type} className={`inline-flex items-center cursor-pointer border rounded-full px-4 py-1.5 transition-all text-sm select-none ${isSelected ? 'bg-blue-100 border-blue-300 text-blue-800 font-medium shadow-sm' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
                                                            <input 
                                                                type="checkbox" 
                                                                className="hidden"
                                                                checked={isSelected}
                                                                onChange={() => handleDemeritTypeToggle(type)}
                                                            />
                                                            <span className={`w-3 h-3 rounded-full mr-2 ${isSelected ? 'bg-blue-500' : 'bg-gray-300'}`}></span>
                                                            {type}
                                                        </label>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {/* สถิติและปุ่มเจาะลึก (Drill-down ระดับ 1) */}
                                    <div className="p-6 border-b bg-white">
                                        <h3 className="text-lg font-semibold mb-4 text-gray-800 flex items-center justify-between">
                                            สถิติแยกตามระดับชั้น
                                            <span className="text-xs font-normal text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 animate-pulse">
                                                👆 คลิกที่กล่องเพื่อดูรายชื่อ
                                            </span>
                                        </h3>
                                        <div className="grid grid-cols-3 md:grid-cols-6 gap-3 md:gap-4">
                                            {['ม.1', 'ม.2', 'ม.3', 'ม.4', 'ม.5', 'ม.6'].map(grade => {
                                                const count = stats.gradeCounts[grade] || 0;
                                                const isActive = expandedGrade === grade;
                                                const isStudentView = expandedStudent !== null;
                                                const theme = gradeColors[grade] || gradeColors['default'];
                                                
                                                return (
                                                    <div 
                                                        key={grade} 
                                                        onClick={() => {
                                                            if(count > 0) {
                                                                setExpandedGrade(isActive && !isStudentView ? null : grade);
                                                                setExpandedStudent(null);
                                                            }
                                                        }}
                                                        className={`rounded-xl p-4 text-center transition-all border-2 ${
                                                            count > 0 ? 'cursor-pointer hover:-translate-y-1' : 'opacity-40 cursor-not-allowed grayscale'
                                                        } ${
                                                            isActive ? `${theme.active} border-transparent shadow-lg` : `${theme.bg} ${theme.border} hover:shadow-md`
                                                        }`}
                                                    >
                                                        <p className={`text-sm font-bold mb-1 ${isActive ? 'text-white/80' : theme.text}`}>{grade}</p>
                                                        <p className={`text-3xl font-black ${isActive ? 'text-white' : theme.text}`}>{count}</p>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* พื้นที่แสดงข้อมูล */}
                                    <div className="bg-gray-50 min-h-[300px]">
                                        
                                        {/* ระดับ 3: ประวัติรายบุคคล */}
                                        {expandedStudent ? (
                                            <div className="p-4 md:p-6 fade-in">
                                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                                    <div className="flex items-center gap-3">
                                                        <button 
                                                            onClick={() => setExpandedStudent(null)}
                                                            className="p-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors flex items-center gap-1 text-sm font-medium"
                                                        >
                                                            <IconArrowLeft /> กลับ
                                                        </button>
                                                        <div>
                                                            <div className="flex items-center gap-2">
                                                                <h3 className="font-bold text-xl text-gray-800">{expandedStudent.name}</h3>
                                                                <span className={`px-2 py-0.5 rounded text-xs font-bold border ${gradeColors[expandedGrade]?.tag || gradeColors['default'].tag}`}>
                                                                    ห้อง {expandedStudent.room}
                                                                </span>
                                                            </div>
                                                            <p className="text-sm text-gray-500 mt-1">รหัสประจำตัว: {expandedStudent.studentId} • ทำรายการทั้งหมด: <span className="font-bold text-red-600">{expandedStudent.count}</span> ครั้ง</p>
                                                        </div>
                                                    </div>

                                                <div className="overflow-x-auto border border-gray-200 rounded-xl bg-white shadow-sm">

                                                        <thead className="bg-gray-100 text-gray-700 text-sm">

                                                                ))}

                                                        </thead>
                                                        <tbody>
                                                            {expandedStudent.records.map((row, index) => (

                                                                    {Object.values(row).map((val, i) => (
                                                                        <td key={i} className="p-4 whitespace-nowrap">{val || '-'}</td>
                                                                    ))}
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                        /* ระดับ 2: รายชื่อนักเรียน */
                                        : expandedGrade ? (
                                            <div className="p-4 md:p-6 fade-in">
                                                <div className="flex items-center justify-between mb-4 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                                    <div>
                                                        <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                                            <span className={`w-3 h-3 rounded-full ${gradeColors[expandedGrade]?.active.split(' ')[0] || 'bg-gray-500'}`}></span>
                                                            รายชื่อนักเรียนระดับชั้น {expandedGrade}
                                                        </h3>
                                                        <p className="text-sm text-gray-500">เรียงตามห้องจากน้อยไปมาก • คลิกที่ชื่อนักเรียนเพื่อดูประวัติ</p>

                                                                <th className="p-4 font-semibold w-32">รหัส</th>
                                                                <th className="p-4 font-semibold">ชื่อ-สกุล</th>
                                                                <th className="p-4 font-semibold text-center w-32">จำนวนครั้ง</th>
                                                                <th className="p-4 font-semibold text-right w-32">รายละเอียด</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {getGroupedStudents.map((student, index) => (
                                                                <tr key={index} className="border-b last:border-b-0 hover:bg-blue-50/50 transition-colors text-sm group">
                                                                    <td className="p-4 font-semibold text-gray-900">{student.room}</td>
                                                                    <td className="p-4 text-gray-600">{student.studentId}</td>
                                                                    <td className="p-4 font-medium text-gray-800">{student.name}</td>
                                                                    <td className="p-4 text-center">
                                                                        <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-200">{student.count}</span>
                                                                    </td>
                                                                    <td className="p-4 text-right">
                                                                        <button 
                                                                            onClick={() => setExpandedStudent(student)}
                                                                            className="text-blue-600 hover:text-blue-800 font-semibold text-sm bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors inline-flex items-center gap-1 opacity-80 group-hover:opacity-100"
                                                                        >
                                                                            ดูประวัติ <span className="text-lg leading-none">›</span>
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        ) 

                                        /* ระดับ 1: ตารางรวมทั้งหมด */
                                        : (
                                            <div className="p-8 text-center bg-white border-t">
                                                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-blue-500 mb-4">
                                                    <IconUsers />
                                                </div>
                                                <h3 className="text-xl font-bold text-gray-800 mb-2">เลือกกล่องระดับชั้นด้านบน</h3>
                                                <p className="text-gray-500 max-w-md mx-auto">
                                                    เพื่อดูรายชื่อนักเรียนที่มีประวัติ{activeTab === 'late' ? 'มาสาย' : 'พฤติกรรมไม่พึงประสงค์'} ในรูปแบบตารางรายบุคคล
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
