<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกตักเตือน โรงเรียนบัวใหญ่</title>
    
    <!-- ฟอนต์ TH Sarabun จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS สำหรับจัดความสวยงามอย่างรวดเร็ว -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cropper.js สำหรับตัดภาพ -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <!-- Tesseract.js สำหรับอ่านตัวอักษรจากภาพ (OCR) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        /* ตั้งค่าฟอนต์หลักและขนาดให้ผู้ใหญ่อ่านง่าย */
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .text-body { font-size: 1.25rem; /* ขนาดอักษรประมาณ 20px */ }
        .text-heading { font-size: 1.5rem; font-weight: 600; }
        
        /* ซ่อน Input ไฟล์ แต่ใช้ปุ่มแทนเพื่อความสวยงาม */
        #cameraInput { display: none; }
        
        /* กำหนดความสูงของพื้นที่ครอปรูป */
        .img-container {
            max-height: 400px;
            width: 100%;
            margin-bottom: 1rem;
        }
        
        /* Modal Styles */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-10">

    <!-- ส่วนหัวและโลโก้โรงเรียน -->
    <header class="w-full bg-blue-700 text-white p-4 shadow-md flex flex-col items-center justify-center">
        <!-- ใช้ URL โลโก้จำลอง (สามารถเปลี่ยนเป็นลิงก์โลโก้จริงได้) -->
        <img src="https://upload.wikimedia.org/wikipedia/th/thumb/7/7f/%E0%B8%95%E0%B8%A3%E0%B8%B2%E0%B8%AA%E0%B8%B1%E0%B8%8D%E0%B8%A5%E0%B8%B1%E0%B8%81%E0%B8%A9%E0%B8%93%E0%B9%8C%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99%E0%B8%9A%E0%B8%B1%E0%B8%A7%E0%B9%83%E0%B8%AB%E0%B8%8D%E0%B9%88.png/250px-%E0%B8%95%E0%B8%A3%E0%B8%B2%E0%B8%AA%E0%B8%B1%E0%B8%8D%E0%B8%A5%E0%B8%B1%E0%B8%81%E0%B8%A9%E0%B8%93%E0%B9%8C%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99%E0%B8%9A%E0%B8%B1%E0%B8%A7%E0%B9%83%E0%B8%AB%E0%B8%8D%E0%B9%88.png" alt="โลโก้โรงเรียนบัวใหญ่" class="h-16 w-16 object-contain bg-white rounded-full p-1 mb-2">
        <h1 class="text-heading text-center">ระบบบันทึกตักเตือน</h1>
        <p class="text-lg">โรงเรียนบัวใหญ่</p>
    </header>

    <!-- พื้นที่ทำงานหลัก -->
    <main class="w-full max-w-md p-4 mt-4 bg-white rounded-xl shadow-sm">
        
        <!-- ปุ่มถ่ายรูป -->
        <div id="captureSection" class="text-center">
            <p class="text-body mb-4 text-gray-600">กรุณาถ่ายภาพบริเวณ "ชื่อ-สกุล" บนเสื้อนักเรียน เพื่อให้ระบบค้นหาอัตโนมัติ</p>
            <label for="cameraInput" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg shadow-md cursor-pointer inline-flex items-center text-body w-full justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                เปิดกล้องถ่ายภาพ
            </label>
            <!-- input สำหรับเรียกกล้องมือถือ -->
            <input type="file" id="cameraInput" accept="image/*" capture="environment">
        </div>

        <!-- ส่วนแสดงภาพสำหรับครอป (จะซ่อนไว้ก่อนจนกว่าจะถ่ายรูป) -->
        <div id="cropSection" class="hidden mt-4">
            <h2 class="text-body font-semibold mb-2 text-center text-blue-700">ลากกรอบเฉพาะ "ชื่อ-สกุล"</h2>
            <div class="img-container">
                <img id="imageTarget" src="" alt="ภาพที่ถ่าย">
            </div>
            <div class="flex gap-2">
                <button onclick="cancelCrop()" class="w-1/3 bg-gray-300 text-gray-800 py-2 rounded-lg text-body">ยกเลิก</button>
                <button onclick="processImage()" class="w-2/3 bg-green-600 text-white py-2 rounded-lg text-body font-semibold shadow-md">
                    อ่านชื่อจากภาพ
                </button>
            </div>
        </div>

    </main>

    <!-- Custom Modal: กำลังโหลด (Loading) -->
    <div id="loadingModal" class="fixed inset-0 modal-overlay flex items-center justify-center hidden z-50">
        <div class="bg-white p-6 rounded-xl shadow-xl text-center max-w-xs w-full mx-4">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p id="loadingText" class="text-body text-gray-700">กำลังอ่านตัวอักษร กรุณารอสักครู่...</p>
        </div>
    </div>

    <!-- Custom Modal: ยืนยันชื่อที่อ่านได้ และเตรียมบันทึก -->
    <div id="resultModal" class="fixed inset-0 modal-overlay flex items-center justify-center hidden z-50">
        <div class="bg-white p-6 rounded-xl shadow-xl max-w-sm w-full mx-4">
            <h3 class="text-heading text-blue-700 mb-2">ตรวจสอบความถูกต้อง</h3>
            <p class="text-sm text-gray-500 mb-4">หากระบบอ่านชื่อจากด้ายปักผิดพลาด คุณครูสามารถแก้ไขให้ถูกต้องได้ที่นี่ครับ</p>
            
            <!-- รูป Thumbnail ที่ครอปแล้ว -->
            <div class="flex justify-center mb-4">
                <img id="thumbnailPreview" class="border-2 border-gray-200 rounded-lg max-h-24 object-contain">
            </div>

            <label class="block text-gray-700 text-body font-semibold mb-2">ชื่อ-สกุล นักเรียน:</label>
            <input type="text" id="studentNameInput" class="w-full border-2 border-blue-300 rounded-lg p-3 text-body mb-4 focus:outline-none focus:border-blue-600" placeholder="ระบุชื่อนักเรียน">
            
            <label class="block text-gray-700 text-body font-semibold mb-2">สาเหตุการตักเตือน:</label>
            <select id="warningReason" class="w-full border-2 border-blue-300 rounded-lg p-3 text-body mb-6 focus:outline-none focus:border-blue-600 bg-white">
                <option value="มาสาย">มาสาย</option>
                <option value="แต่งกายผิดระเบียบ">แต่งกายผิดระเบียบ</option>
                <option value="ทะเลาะวิวาท">ทะเลาะวิวาท</option>
                <option value="หนีเรียน">หนีเรียน</option>
                <option value="อื่นๆ">อื่นๆ</option>
            </select>

            <div class="flex gap-2">
                <button onclick="closeResultModal()" class="w-1/3 bg-gray-300 text-gray-800 py-3 rounded-lg text-body">ปิด</button>
                <button onclick="saveDataToServer()" class="w-2/3 bg-blue-600 text-white py-3 rounded-lg text-body font-semibold shadow-md">
                    บันทึกข้อมูล
                </button>
            </div>
        </div>
    </div>

    <!-- Custom Modal: แจ้งเตือนข้อความ (Success/Error) -->
    <div id="alertModal" class="fixed inset-0 modal-overlay flex items-center justify-center hidden z-50">
        <div class="bg-white p-6 rounded-xl shadow-xl text-center max-w-xs w-full mx-4">
            <div id="alertIcon" class="mb-4"></div>
            <h3 id="alertTitle" class="text-heading mb-2">แจ้งเตือน</h3>
            <p id="alertMessage" class="text-body text-gray-700 mb-6">ข้อความ</p>
            <button onclick="closeAlertModal()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-body shadow-md">ตกลง</button>
        </div>
    </div>

    <script>
        // === ตั้งค่า URL ของ Google Apps Script (ใส่ URL ที่ได้จากการ Deploy GAS ที่นี่) ===
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzxi59RgfdgrIou8ZJ75vla32BpxKMZkKuzyqK1VOk-IZuQJwJDz8ftOYsBnAGz5Q/exec"; 

        // ตัวแปรเก็บข้อมูล
        let cropper = null;
        let croppedBase64 = "";

        // Elements
        const cameraInput = document.getElementById('cameraInput');
        const imageTarget = document.getElementById('imageTarget');
        const captureSection = document.getElementById('captureSection');
        const cropSection = document.getElementById('cropSection');
        const studentNameInput = document.getElementById('studentNameInput');
        const thumbnailPreview = document.getElementById('thumbnailPreview');

        // 1. เมื่อผู้ใช้ถ่ายรูป หรือเลือกรูป
        cameraInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                // ซ่อนปุ่มถ่ายรูป แสดงหน้าครอปรูป
                captureSection.classList.add('hidden');
                cropSection.classList.remove('hidden');
                
                imageTarget.src = event.target.result;
                
                // เริ่มต้นระบบ Cropper.js
                if (cropper) cropper.destroy(); // เคลียร์ของเก่าถ้ามี
                cropper = new Cropper(imageTarget, {
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.8,
                    restore: false,
                    guides: true,
                    center: true,
                    highlight: false,
                    cropBoxMovable: true,
                    cropBoxResizable: true,
                    toggleDragModeOnDblclick: false,
                });
            };
            reader.readAsDataURL(file);
        });

        // 2. ยกเลิกการครอป
        function cancelCrop() {
            if (cropper) cropper.destroy();
            cameraInput.value = ""; // เคลียร์ไฟล์
            cropSection.classList.add('hidden');
            captureSection.classList.remove('hidden');
        }

        // 3. ครอปภาพและใช้ Tesseract อ่านอักษรไทย
        async function processImage() {
            if (!cropper) return;

            // เอาภาพที่ครอปแล้วมาเป็น Base64
            const canvas = cropper.getCroppedCanvas({
                width: 800, // จำกัดความกว้างไม่ให้ไฟล์ใหญ่เกินไป
            });
            croppedBase64 = canvas.toDataURL('image/jpeg', 0.8);

            // แสดงหน้าโหลด
            showLoading("กำลังวิเคราะห์ชื่อจากภาพ...");

            try {
                // ใช้ Tesseract.js โหลดภาษาไทย (tha)
                const result = await Tesseract.recognize(
                    croppedBase64,
                    'tha', 
                    { 
                        logger: m => console.log(m) // ดูสถานะในคอนโซล (ถ้าต้องการ)
                    }
                );

                hideLoading();
                
                // ทำความสะอาดข้อความที่ได้ (ตัดช่องว่างที่ไม่จำเป็น)
                let readText = result.data.text.replace(/\n/g, ' ').trim();
                
                // แสดง Modal ผลลัพธ์
                thumbnailPreview.src = croppedBase64; // แสดงรูปตัวอย่าง (Thumbnail)
                studentNameInput.value = readText; // ใส่ชื่อที่อ่านได้ในช่องพิมพ์
                showResultModal();

            } catch (error) {
                hideLoading();
                showAlert("เกิดข้อผิดพลาด", "ระบบไม่สามารถอ่านตัวอักษรได้ กรุณาพิมพ์ชื่อด้วยตนเองครับ", "error");
                // ถึง Error ก็ให้เปิดหน้าต่างกรอกข้อมูล เพื่อให้พิมพ์เองได้
                thumbnailPreview.src = croppedBase64;
                studentNameInput.value = "";
                showResultModal();
            }
        }

        // 4. ส่งข้อมูลไปบันทึกที่ Google Apps Script
        function saveDataToServer() {
            const name = studentNameInput.value.trim();
            const reason = document.getElementById('warningReason').value;

            if (name === "") {
                showAlert("ข้อมูลไม่ครบ", "กรุณาระบุชื่อ-สกุลนักเรียนก่อนบันทึกครับ", "error");
                return;
            }

            if (GAS_WEBAPP_URL === "ใส่_URL_ของ_GAS_ที่นี่") {
                showAlert("ระบบยังไม่พร้อม", "คุณยังไม่ได้ใส่ URL ของ Google Apps Script ในโค้ดครับ", "error");
                return;
            }

            closeResultModal();
            showLoading("กำลังบันทึกข้อมูล...");

            // เตรียมข้อมูลส่งเป็น JSON
            const payload = {
                name: name,
                reason: reason,
                image: croppedBase64
            };

            // ส่งข้อมูลด้วย Fetch API
            fetch(GAS_WEBAPP_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if(data.success) {
                    showAlert("สำเร็จ!", "บันทึกข้อมูลตักเตือนเรียบร้อยแล้ว", "success");
                    cancelCrop(); // รีเซ็ตหน้าจอเพื่อเริ่มคนต่อไป
                } else {
                    showAlert("ผิดพลาด", "เกิดข้อผิดพลาดในการบันทึก: " + data.message, "error");
                }
            })
            .catch(error => {
                hideLoading();
                showAlert("การเชื่อมต่อขัดข้อง", "ไม่สามารถส่งข้อมูลได้ กรุณาตรวจสอบอินเทอร์เน็ตครับ", "error");
                console.error("Error:", error);
            });
        }

        // --- ฟังก์ชันช่วยเหลือเกี่ยวกับ Custom Modal ---
        function showLoading(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingModal').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loadingModal').classList.add('hidden');
        }

        function showResultModal() {
            document.getElementById('resultModal').classList.remove('hidden');
        }
        function closeResultModal() {
            document.getElementById('resultModal').classList.add('hidden');
        }

        function showAlert(title, message, type) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerText = message;
            
            const iconDiv = document.getElementById('alertIcon');
            if(type === 'success') {
                document.getElementById('alertTitle').className = "text-heading mb-2 text-green-600";
                iconDiv.innerHTML = `<svg class="w-16 h-16 text-green-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else {
                document.getElementById('alertTitle').className = "text-heading mb-2 text-red-600";
                iconDiv.innerHTML = `<svg class="w-16 h-16 text-red-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }
            document.getElementById('alertModal').classList.remove('hidden');
        }
        function closeAlertModal() {
            document.getElementById('alertModal').classList.add('hidden');
        }
    </script>
</body>
</html>
