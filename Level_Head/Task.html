<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ภาระงานหัวหน้าระดับ | Buayai I-Care</title>
    <!-- Fonts & UI Library -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --purple-primary: #d946ef;
            --purple-dark: #a21caf;
            --purple-light: #fdf4ff;
            --bg-body: #f8fafc;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-body); color: #334155; }
        h1, h2, h3, .btn-purple, .nav-link, .modal-title { font-family: 'Prompt', sans-serif; }
        
        /* Sidebar Hamburger Style */
        .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; transition: 0.3s; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 2rem; transition: 0.3s; }
        
        .nav-link { color: #64748b; padding: 0.8rem 1.2rem; border-radius: 0.6rem; margin: 0.2rem 1rem; display: flex; align-items: center; text-decoration: none; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--purple-light); color: var(--purple-primary); font-weight: 600; }
        .nav-link i { font-size: 1.3rem; margin-right: 12px; }

        /* Mobile Sidebar */
        @media (max-width: 991.98px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 1rem; }
        }

        /* Task Card & Star Animation */
        .task-card { border: none; border-radius: 1rem; background: white; border-left: 6px solid var(--purple-primary); transition: 0.3s; position: relative; overflow: hidden; }
        .task-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
        
        .star-success {
            color: #fbbf24;
            font-size: 2rem;
            animation: star-glow 1.5s infinite ease-in-out;
            position: absolute; top: 10px; right: 15px;
        }
        @keyframes star-glow {
            0%, 100% { opacity: 1; transform: scale(1.1) rotate(0deg); }
            50% { opacity: 0.3; transform: scale(0.9) rotate(20deg); }
        }

        /* Progress Input */
        .progress-box { background: #f1f5f9; border-radius: 0.8rem; padding: 1rem; margin-top: 1rem; }
        input[type="range"] { accent-color: var(--purple-primary); width: 100%; }

        .btn-purple { background: var(--purple-primary); color: white; border: none; transition: 0.2s; }
        .btn-purple:hover { background: var(--purple-dark); color: white; transform: scale(1.02); }
        
        /* Sidebar Bottom Buttons (Rule 3) */
        .sidebar-footer { border-top: 1px solid #f1f5f9; padding: 1rem; margin-top: auto; }
        
        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; display: none; }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner-border text-purple-primary"></div></div>

<!-- Sidebar -->
<aside class="sidebar d-flex flex-column shadow-sm" id="sidebarMenu">
    <div class="p-4 text-center">
        <h4 class="text-purple-dark fw-bold mb-0">Buayai I-Care</h4>
        <div class="badge bg-purple-light text-purple-dark mt-1 px-3 py-2 rounded-pill shadow-sm">
            หัวหน้าระดับ <span id="userLevelHeader">...</span>
        </div>
    </div>
    
    <div class="flex-grow-1 overflow-y-auto pt-2">
        <a href="level_head.html" class="nav-link"><i class="bi bi-grid-1x2"></i> หน้าหลัก (Dashboard)</a>
        <a href="homeroom.html" class="nav-link"><i class="bi bi-house-door"></i> 1. งานโฮมรูม</a>
        <a href="discipline.html" class="nav-link"><i class="bi bi-shield-check"></i> 2. งานวินัย / E-Point</a>
        <a href="grades.html" class="nav-link"><i class="bi bi-mortarboard"></i> 3. ผลการเรียน</a>
        <a href="Task.html" class="nav-link active"><i class="bi bi-clipboard-check"></i> 4. ภาระงานอื่นๆ</a>
        <a href="messages.html" class="nav-link"><i class="bi bi-chat-dots"></i> 5. กล่องข้อความ</a>
        <a href="note.html" class="nav-link"><i class="bi bi-bell"></i> 6. เตือนความจำ</a>
    </div>

    <!-- Rule 3: Bottom Buttons -->
    <div class="sidebar-footer">
        <a href="https://buayai-i-care.github.io/buayai-i-Care/" class="nav-link text-primary mb-2">
            <i class="bi bi-house-up"></i> กลับเมนูโรงเรียน
        </a>
        <a href="#" onclick="handleLogout()" class="nav-link text-danger">
            <i class="bi bi-box-arrow-right"></i> ออกจากระบบ
        </a>
    </div>
</aside>

<!-- Main Content -->
<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <button class="btn btn-light d-lg-none me-3" onclick="toggleSidebar()">
                <i class="bi bi-list fs-3"></i>
            </button>
            <div>
                <h2 class="fw-bold mb-1">จัดการภาระงาน</h2>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><span id="levelLabel">กำลังโหลด...</span></li>
                        <li class="breadcrumb-item active">ภาระงานอื่นๆ</li>
                    </ol>
                </nav>
            </div>
        </div>
        <button class="btn btn-purple shadow-sm px-4 py-2 rounded-pill" onclick="openModal()">
            <i class="bi bi-plus-circle me-2"></i> เพิ่มภาระงาน
        </button>
    </div>

    <!-- Stats Summary -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3 text-center">
                <h3 class="fw-bold text-purple-primary mb-0" id="stat-total">0</h3>
                <small class="text-muted">งานทั้งหมด</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3 text-center">
                <h3 class="fw-bold text-success mb-0" id="stat-done">0</h3>
                <small class="text-muted">งานที่สำเร็จ</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3 text-center">
                <h3 class="fw-bold text-warning mb-0" id="stat-pending">0</h3>
                <small class="text-muted">งานที่กำลังทำ</small>
            </div>
        </div>
    </div>

    <!-- Task List -->
    <div class="row g-4" id="taskGrid">
        <!-- Render from JS -->
    </div>
</main>

<!-- Task Modal -->
<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-purple-light">
                <h5 class="modal-title fw-bold text-purple-dark" id="modalTitle">บันทึกภาระงาน</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">ชื่องาน / โครงการ</label>
                        <input type="text" id="taskName" class="form-control" placeholder="เช่น รายงานผลการจัดกิจกรรม..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">ผลการดำเนินงานโดยย่อ</label>
                        <textarea id="taskResult" class="form-control" rows="3" placeholder="สรุปผลงานที่ทำสำเร็จ..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" class="btn btn-purple px-4" onclick="saveTask()">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // --- Configuration ---
    // โปรดใส่ URL ที่ Deploy แบบ AnyOne จากไฟล์ task_backend.gs ล่าสุด
    const API_URL = "https://script.google.com/macros/s/AKfycbw2ljtG3YfjUBSgCsO2kntXS9Hm7STvJyu-pzXXTozc05dJ4PHnAV4H8A7Q7lcNHzXLlg/exec"; 
    
    if (!localStorage.getItem('buayai_user')) {
        localStorage.setItem('buayai_user', JSON.stringify({level: "m2", name: "หัวหน้า ม.2", role: "หัวหน้าระดับ"}));
    }
    const userData = JSON.parse(localStorage.getItem('buayai_user'));
    const CURRENT_LEVEL = userData.level; 

    let allTasks = [];

    window.onload = () => {
        document.getElementById('userLevelHeader').innerText = CURRENT_LEVEL.toUpperCase();
        document.getElementById('levelLabel').innerText = "ระดับชั้น " + CURRENT_LEVEL.toUpperCase();
        fetchTasks();

        // ปิด Sidebar อัตโนมัติเมื่อเลือกเมนูบนมือถือ (กฎข้อ 5)
        document.querySelectorAll('#sidebarMenu .nav-link').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 992) document.getElementById('sidebarMenu').classList.remove('show');
            });
        });
    };

    async function fetchTasks() {
        showLoading(true);
        try {
            const response = await fetch(`${API_URL}?level=${CURRENT_LEVEL}`);
            const data = await response.json();
            allTasks = Array.isArray(data) ? data : [];
            renderTasks();
        } catch (err) {
            console.error(err);
            allTasks = [
                { id: "MOCK1", date: "13 เม.ย. 2569", name: "งานติดตามการเข้าแถว", result: "เสร็จสิ้นครบถ้วน", progress: 100 }
            ];
            renderTasks();
        } finally {
            showLoading(false);
        }
    }

    async function saveTask() {
        const id = document.getElementById('taskId').value;
        const name = document.getElementById('taskName').value;
        const result = document.getElementById('taskResult').value;

        if (!name) return Swal.fire('กรุณาระบุชื่องาน', '', 'warning');

        showLoading(true);
        try {
            const payload = {
                action: "saveTask",
                level: CURRENT_LEVEL,
                id: id,
                name: name,
                result: result,
                progress: id ? (allTasks.find(t => t.id == id)?.progress || 0) : 0
            };

            await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });

            bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
            Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success');
            fetchTasks(); 
        } catch (err) {
            Swal.fire('Error', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
        } finally {
            showLoading(false);
        }
    }

    async function updateProgressAPI(id, val) {
        const task = allTasks.find(t => t.id == id);
        if (task) {
            task.progress = parseInt(val);
            if (val == 100) renderTasks(); 
        }

        const toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
        toast.fire({ icon: 'success', title: `บันทึกความก้าวหน้า ${val}%` });

        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "updateProgress", level: CURRENT_LEVEL, id: id, progress: val })
            });
        } catch (err) {}
    }

    function renderTasks() {
        const grid = document.getElementById('taskGrid');
        let doneCount = 0;

        grid.innerHTML = allTasks.map(task => {
            if (task.progress >= 100) doneCount++;
            return `
            <div class="col-12 col-md-6 col-xl-4">
                <div class="card task-card shadow-sm h-100 p-2">
                    <div class="card-body d-flex flex-column">
                        <div class="mb-2 pe-5">
                            <h5 class="fw-bold text-dark mb-0">${task.name}</h5>
                            <small class="text-muted"><i class="bi bi-clock"></i> ${task.date}</small>
                        </div>
                        
                        ${task.progress >= 100 ? '<i class="bi bi-star-fill star-success"></i>' : ''}
                        
                        <p class="text-secondary small mt-2 mb-3"><strong>ผลงาน:</strong> ${task.result || '-'}</p>

                        <div class="progress-box mt-auto">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="small fw-bold">ความก้าวหน้า</span>
                                <span class="badge ${task.progress >= 100 ? 'bg-success' : 'bg-purple-dark'} rounded-pill">${task.progress}%</span>
                            </div>
                            <input type="range" class="form-range" min="0" max="100" value="${task.progress}" 
                                onchange="updateProgressAPI('${task.id}', this.value)">
                        </div>

                        <div class="mt-3 d-flex gap-2">
                            <button class="btn btn-sm btn-outline-warning w-50" onclick="editTask('${task.id}')"><i class="bi bi-pencil-square"></i> แก้ไข</button>
                            <button class="btn btn-sm btn-outline-info w-50" onclick="exportPDF('${task.id}')"><i class="bi bi-file-earmark-pdf"></i> เสนอ ผอ.</button>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }).join('');

        document.getElementById('stat-total').innerText = allTasks.length;
        document.getElementById('stat-done').innerText = doneCount;
        document.getElementById('stat-pending').innerText = allTasks.length - doneCount;
    }

    function openModal() {
        document.getElementById('taskForm').reset();
        document.getElementById('taskId').value = "";
        document.getElementById('modalTitle').innerText = "เพิ่มภาระงานใหม่";
        new bootstrap.Modal(document.getElementById('taskModal')).show();
    }

    function editTask(id) {
        const task = allTasks.find(t => t.id == id);
        if (!task) return;
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskName').value = task.name;
        document.getElementById('taskResult').value = task.result;
        document.getElementById('modalTitle').innerText = "แก้ไขภาระงาน";
        new bootstrap.Modal(document.getElementById('taskModal')).show();
    }

    // --- กฎข้อ 4: จัดการพิมพ์ PDF ---
    async function exportPDF(id) {
        // แสดหน้าโหลดรอ
        Swal.fire({
            title: 'สร้างบันทึกข้อความ',
            html: 'กรุณารอสักครู่ ระบบกำลังจัดเตรียมไฟล์ PDF...',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        try {
            // ยิง API แบบ GET เพื่อสั่งสร้าง PDF
            const response = await fetch(`${API_URL}?action=genPdf&level=${CURRENT_LEVEL}&id=${id}`);
            const data = await response.json();

            if (data.status === 'success') {
                // สร้างปุ่มลิงก์ให้ผู้ใช้คลิกเอง ป้องกัน Popup Blocker
                Swal.fire({
                    title: 'สร้าง PDF สำเร็จ!',
                    icon: 'success',
                    html: `
                        <p>ไฟล์รายงานบันทึกข้อความของคุณพร้อมแล้ว</p>
                        <a href="${data.url}" target="_blank" class="btn btn-purple px-4 py-2 mt-3 text-white text-decoration-none" onclick="Swal.close()">
                            <i class="bi bi-file-earmark-pdf"></i> คลิกที่นี่เพื่อเปิดดูไฟล์ PDF
                        </a>
                    `,
                    showConfirmButton: false,
                    showCancelButton: true,
                    cancelButtonText: 'ปิด'
                });
            } else {
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถสร้าง PDF ได้: ' + data.message, 'error');
            }
        } catch(err) {
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์เพื่อสร้าง PDF', 'error');
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebarMenu').classList.toggle('show');
    }

    function handleLogout() {
        Swal.fire({
            title: 'ยืนยันการออกจากระบบ?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'ออกจากระบบ',
            confirmButtonColor: '#d33'
        }).then((result) => { 
            if (result.isConfirmed) {
                localStorage.removeItem('buayai_user');
                window.location.href = 'https://buayai-i-care.github.io/buayai-i-Care/'; 
            }
        });
    }

    function showLoading(show) {
        document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
    }
</script>
</body>
</html>
