<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฐานข้อมูลของระบบดูแลช่วยเหลือผู้เรียนดิจิทัล ฉบับนักเรียน - Buayai I-Care School</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --text-dark: #1e293b;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 80px; overflow-x: hidden; }
        h1, h2, h3, h4, h5, .font-prompt { font-family: 'Prompt', sans-serif; }

        #login-view { height: 100vh; display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; background: linear-gradient(135deg, #1e293b, #0f172a); }
        .login-card { background: white; border-radius: 24px; padding: 40px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        .form-control, .form-select { border-radius: 12px; padding: 12px 15px; border: 1px solid #cbd5e1; background-color: #f8fafc; font-weight: 600; margin-bottom: 15px; }
        .form-control:focus, .form-select:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); background-color: white; }

        .top-navbar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white; height: 75px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); position: sticky; top: 0; z-index: 1000;
        }

        .main-content { padding: 20px; max-width: 700px; margin: 0 auto; }

        .player-banner {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(234, 88, 12, 0.2);
            margin-bottom: 40px; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden;
        }
        .player-banner::after {
            content: '\F5A2'; font-family: 'bootstrap-icons'; position: absolute; right: -20px; bottom: -30px;
            font-size: 10rem; color: white; opacity: 0.1; transform: rotate(15deg);
        }
        .profile-avatar { width: 85px; height: 85px; border-radius: 50%; border: 4px solid white; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); object-fit: cover; z-index: 2; }

        .quest-container { position: relative; padding-left: 45px; }
        .quest-track { position: absolute; left: 24px; top: 20px; bottom: 0; width: 6px; background-color: #e2e8f0; border-radius: 10px; z-index: 1; }
        .quest-item { position: relative; z-index: 2; margin-bottom: 40px; display: flex; gap: 20px; align-items: flex-start; }
        
        .quest-node {
            width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; flex-shrink: 0; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: absolute; left: -49px; top: 0; z-index: 3; transition: 0.3s;
        }
        
        .quest-card {
            background: white; border-radius: 20px; padding: 20px; flex-grow: 1; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 2px solid transparent; position: relative; overflow: hidden;
        }

        .level-badge { font-size: 0.75rem; font-weight: 800; padding: 4px 12px; border-radius: 8px; margin-bottom: 10px; display: inline-block; }
        .quest-title { font-weight: 800; font-family: 'Prompt'; font-size: 1.2rem; margin-bottom: 5px; color: #1e293b; }
        .quest-desc { font-size: 0.9rem; color: #64748b; line-height: 1.5; margin-bottom: 15px; }
        
        /* 1. Unlocked (ยังไม่เคยทำ) */
        .status-unlocked .quest-node { animation: pulseGlow 2s infinite; }
        .status-unlocked .quest-card { border-color: #3b82f6; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.15); transform: translateY(-3px); }
        .btn-play { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; border: none; border-radius: 50px; font-weight: 700; padding: 10px 25px; width: 100%; text-decoration: none; display: inline-block; text-align: center; }
        
        /* 2. Completed (ทำแล้วของเทอมนี้) */
        .status-completed .quest-node { background: linear-gradient(135deg, #10b981, #059669) !important; box-shadow: 0 0 0 5px #dcfce7; }
        .status-completed .quest-card { background-color: #f8fafc; border-color: #cbd5e1; opacity: 0.9; }
        .status-completed .level-badge { background-color: #dcfce7; color: #15803d; }
        .status-completed .quest-title { text-decoration: line-through; color: #94a3b8; }
        .btn-done { background: #f1f5f9; color: #10b981; border: 2px solid #10b981; border-radius: 50px; font-weight: 700; padding: 8px 25px; width: 100%; text-align: center; pointer-events: none; }

        /* 3. Needs Confirm (มีข้อมูล แต่เป็นของเทอมเก่า) */
        .status-confirm .quest-node { background: linear-gradient(135deg, #f59e0b, #d97706) !important; box-shadow: 0 0 0 5px #fef3c7; animation: pulseGlow 2s infinite; }
        .status-confirm .quest-card { border-color: #f59e0b; box-shadow: 0 10px 25px rgba(245, 158, 11, 0.15); transform: translateY(-3px); background-color: #fffbeb;}
        .status-confirm .level-badge { background-color: #fef3c7; color: #b45309; }
        .status-confirm .quest-title { color: #b45309; }
        .btn-confirm { background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; border: none; border-radius: 50px; font-weight: 700; padding: 10px 25px; width: 100%; text-decoration: none; display: inline-block; text-align: center; }

        /* 4. Locked (ติดล็อก) */
        .status-locked .quest-node { background: #e2e8f0 !important; color: #94a3b8; box-shadow: none; border: 4px solid #f8fafc; }
        .status-locked .quest-card { background-color: #f8fafc; border-style: dashed; border-color: #cbd5e1; }
        .status-locked .quest-title, .status-locked .quest-desc { color: #94a3b8; }
        .status-locked .level-badge { background-color: #f1f5f9; color: #94a3b8; }
        .btn-lock { background: #e2e8f0; color: #64748b; border: none; border-radius: 50px; font-weight: 700; padding: 10px 25px; width: 100%; text-align: center; cursor: not-allowed; }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--rgb-color), 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(var(--rgb-color), 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--rgb-color), 0); }
        }
    </style>
</head>
<body>

    <!-- 🔒 หน้าเข้าสู่ระบบ -->
    <div id="login-view">
        <div class="login-card">
            <img src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w200" alt="Logo" width="80" class="mb-3 rounded-circle bg-light p-1">
            <h4 class="fw-bold mb-1 font-prompt text-dark">ระบบฐานข้อมูลผู้เรียน ฉบับนักเรียน ของระบบดูแลช่วยเหลือผู้เรียนดิจิทัล โรงเรียนบัวใหญ่</h4>
            <p class="text-muted small mb-4">เข้าสู่ระบบเพื่ออัปเดตและยืนยันข้อมูล</p>
            
            <select id="login-room" class="form-select text-center" onchange="loadStudents()">
                <!-- จะถูกเติมด้วย JS -->
            </select>
            <select id="login-student" class="form-select text-center" disabled onchange="fillId()">
                <option value="">-- โปรดเลือกห้องก่อน --</option>
            </select>
            <input type="hidden" id="login-id">
            
            <button id="btn-login" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow-sm" onclick="handleLogin()"><i class="bi bi-controller"></i> เข้าสู่ระบบภารกิจ</button>
        </div>
    </div>

    <!-- 📱 หน้าภารกิจ -->
    <div id="app-view" style="display: none;">
        <div class="top-navbar">
            <div class="d-flex align-items-center">
                <img src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w100" alt="Logo" class="rounded-circle bg-white p-1 me-3" style="width: 40px; height: 40px;">
                <div>
                    <h6 class="m-0 fw-bold font-prompt text-white">เส้นทางภารกิจ (Quest)</h6>
                    <div class="small text-white-50" style="font-size: 0.75rem;">Buayai I-Care System</div>
                </div>
            </div>
            <button onclick="logout()" class="btn btn-sm btn-outline-light rounded-pill fw-bold"><i class="bi bi-box-arrow-right"></i> ออก</button>
        </div>

        <div class="main-content">
            <!-- Player Banner -->
            <div class="player-banner">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-avatar">
                <div style="z-index: 2;">
                    <h4 class="fw-bold m-0 font-prompt text-white" id="player-name">ชื่อนักเรียน</h4>
                    <div class="text-white-50 small mb-1">ม.<span id="player-room"></span> | รหัส: <span id="player-id"></span></div>
                </div>
            </div>

            <h4 class="font-prompt fw-bold text-dark mb-4"><i class="bi bi-map-fill text-primary me-2"></i> เส้นทางภารกิจ ภาคเรียนปัจจุบัน</h4>

            <!-- Timeline ภารกิจ -->
            <div class="quest-container">
                <div class="quest-track"></div>
                <div id="mission-list">
                    <div class="text-center py-5 text-muted"><span class="spinner-border"></span> กำลังประมวลผลภารกิจ...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ====================================================
        // ⚠️ ใส่ลิงก์ Web App API (backend_mission_api.gs) ตรงนี้ ⚠️
        // ====================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbwUGLg7nqqt4kx2rmGbB3dMKQASCrX2Ti3rlm2dtw6dwRwjA_zUql_n9JOIlWieCBLm/exec"; 

        const questsData = [
            { 
                id: 'm1', title: 'อัปเดตประวัติส่วนตัว', 
                desc: 'ตรวจเช็คความถูกต้องของข้อมูลพื้นฐาน รูปถ่าย และกดปุ่ม "ยืนยันว่าถูกต้อง"', 
                icon: 'bi-person-bounding-box', url: 'verify_identity.html', 
                reqMissionId: null, delayDays: 0,
                colorTheme: 'linear-gradient(135deg, #3b82f6, #06b6d4)', rgbColor: '59, 130, 246', badgeBg: '#eff6ff', badgeText: '#2563eb'
            },
            { 
                id: 'm2', title: 'ข้อมูลยานพาหนะ', 
                desc: 'แจ้งวิธีการเดินทางมาโรงเรียน หรือขึ้นทะเบียนรถจักรยานยนต์', 
                icon: 'bi-scooter', url: 'vehicle_db.html', 
                reqMissionId: 'm1', delayDays: 0,
                colorTheme: 'linear-gradient(135deg, #d946ef, #8b5cf6)', rgbColor: '217, 70, 239', badgeBg: '#fdf4ff', badgeText: '#c026d3'
            },
            { 
                id: 'm3', title: 'แบบประเมิน SDQ', 
                desc: 'ตอบแบบสอบถามสำรวจพฤติกรรมและอารมณ์ 25 ข้อ', 
                icon: 'bi-clipboard-heart-fill', url: 'sdq_student.html', 
                reqMissionId: 'm2', delayDays: 0, 
                colorTheme: 'linear-gradient(135deg, #10b981, #059669)', rgbColor: '16, 185, 129', badgeBg: '#ecfdf5', badgeText: '#059669'
            },
            { id: 'm4', title: 'ภารกิจลับ 1', desc: 'ตั้งไว้สำหรับการพัฒนาในอนาคต', icon: 'bi-lock-fill', url: '#', reqMissionId: 'm3', delayDays: 0, isPlaceholder: true, colorTheme: '#cbd5e1', rgbColor: '203, 213, 225', badgeBg: '#f8fafc', badgeText: '#64748b' }
        ];

        let studentProgress = {}; 

        window.addEventListener('DOMContentLoaded', () => {
            let optionsHtml = '<option value="">-- เลือกระดับชั้น --</option>';
            for (let m = 1; m <= 6; m++) {
                let maxRooms = (m === 4) ? 12 : 10;
                for (let r = 1; r <= maxRooms; r++) optionsHtml += `<option value="${m}/${r}">ม.${m}/${r}</option>`;
            }
            document.getElementById('login-room').innerHTML = optionsHtml;
        });

        async function fetchAPI(payload, btnId) {
            let btn, originalText;
            if(btnId) {
                btn = document.getElementById(btnId);
                originalText = btn.innerHTML;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> รอสักครู่...';
                btn.disabled = true;
            }
            try {
                const response = await fetch(API_URL, {
                    method: 'POST', body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                return { success: false, error: "Connection Failed" };
            } finally {
                if(btnId) { btn.innerHTML = originalText; btn.disabled = false; }
            }
        }

        async function loadStudents() {
            const room = document.getElementById('login-room').value;
            const sel = document.getElementById('login-student');
            if(!room) { sel.innerHTML = '<option value="">-- โปรดเลือกห้องก่อน --</option>'; sel.disabled=true; return; }
            
            sel.innerHTML = '<option value="">กำลังโหลด...</option>'; sel.disabled=true;
            const res = await fetchAPI({ action: 'getStudents', room: room }, null);
            if(res.success) {
                let html = '<option value="">-- เลือกชื่อของคุณ --</option>';
                res.data.forEach(s => html += `<option value="${s.id}">${s.name}</option>`);
                sel.innerHTML = html; sel.disabled = false;
            } else {
                sel.innerHTML = '<option value="">ไม่พบข้อมูล</option>';
            }
        }

        function fillId() { document.getElementById('login-id').value = document.getElementById('login-student').value; }

        async function handleLogin() {
            const room = document.getElementById('login-room').value;
            const id = document.getElementById('login-id').value;
            const name = document.getElementById('login-student').options[document.getElementById('login-student').selectedIndex].text;
            if(!room || !id) return alert("กรุณาเลือกข้อมูลให้ครบ");

            // ดึงความคืบหน้าแบบ Real-time จาก Backend
            const res = await fetchAPI({ action: 'getProgress', id: id }, 'btn-login');
            
            if(res.success) {
                studentProgress = res.progress; 
                
                document.getElementById('player-name').innerText = name;
                document.getElementById('player-id').innerText = id;
                document.getElementById('player-room').innerText = room;

                document.getElementById('login-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'block';
                
                renderMissions();
            } else {
                alert("❌ ดึงข้อมูลล้มเหลว: " + res.error);
            }
        }

        function renderMissions() {
            const container = document.getElementById('mission-list');
            container.innerHTML = '';

            questsData.forEach((q, index) => {
                const prog = studentProgress[q.id];
                const isCompleted = prog && prog.status === 'completed';
                const needsConfirm = prog && prog.status === 'needs_confirm';
                
                let isUnlocked = true;
                let lockReason = "";

                if (q.reqMissionId) {
                    const reqProg = studentProgress[q.reqMissionId];
                    if (!reqProg || reqProg.status !== 'completed') {
                        isUnlocked = false; lockReason = "ต้องทำด่านก่อนหน้าให้ผ่านก่อน";
                    }
                }

                let statusClass = "", btnHtml = "", nodeStyle = "", iconClass = q.icon;

                if (isCompleted) {
                    statusClass = "status-completed"; iconClass = "bi-check-circle-fill";
                    btnHtml = `<div class="btn-done"><i class="bi bi-star-fill text-warning me-1"></i> ทำรายการสำหรับภาคเรียนนี้สำเร็จแล้ว</div>`;
                } 
                else if (needsConfirm && isUnlocked) {
                    statusClass = "status-confirm"; iconClass = "bi-exclamation-triangle-fill";
                    let actionClick = `startMission('${q.url}')`;
                    btnHtml = `<button class="btn-confirm shadow-sm" onclick="${actionClick}">
                                <i class="bi bi-clock-history"></i> พบข้อมูลเก่า: คลิกเพื่อตรวจสอบและยืนยัน
                               </button>`;
                }
                else if (isUnlocked) {
                    statusClass = "status-unlocked";
                    nodeStyle = `background: ${q.colorTheme}; --rgb-color: ${q.rgbColor};`;
                    let actionClick = q.isPlaceholder ? `alert('ระบบอยู่ระหว่างการพัฒนา')` : `startMission('${q.url}')`;
                    btnHtml = `<button class="btn-play" onclick="${actionClick}" style="background: ${q.colorTheme}; box-shadow: 0 6px 15px rgba(${q.rgbColor}, 0.3);">เริ่มทำภารกิจใหม่ <i class="bi bi-controller ms-1"></i></button>`;
                } 
                else {
                    statusClass = "status-locked"; iconClass = "bi-lock-fill";
                    btnHtml = `<button class="btn-lock" disabled><i class="bi bi-shield-lock me-1"></i> ${lockReason}</button>`;
                }

                container.innerHTML += `
                <div class="quest-item ${statusClass}">
                    <div class="quest-node" style="${nodeStyle}"><i class="bi ${iconClass}"></i></div>
                    <div class="quest-card">
                        <div class="level-badge" style="background: ${q.badgeBg}; color: ${q.badgeText};">ด่านที่ ${index + 1}</div>
                        <div class="quest-title">${q.title}</div>
                        <div class="quest-desc">${q.desc}</div>
                        ${btnHtml}
                    </div>
                </div>`;
            });
        }

        function startMission(url) {
            if(url !== '#') {
                window.open(url, '_blank');
                // แจ้งเตือนให้อัปเดตสถานะเมื่อกลับมา
                setTimeout(() => {
                    Swal.fire({
                        title: 'ดำเนินการเสร็จหรือยัง?',
                        text: 'หากท่านกรอกข้อมูลหรือกดยืนยันแล้ว ให้กดปุ่มด้านล่างเพื่ออัปเดตสถานะด่านครับ',
                        icon: 'question',
                        confirmButtonText: '<i class="bi bi-arrow-clockwise"></i> อัปเดตสถานะภารกิจ',
                        confirmButtonColor: '#3b82f6'
                    }).then((res) => {
                        if(res.isConfirmed) {
                            handleLogin(); // ยิงเช็ค DB ใหม่อีกรอบ
                        }
                    });
                }, 3000);
            }
        }

        function logout() {
            document.getElementById('app-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('login-student').value = '';
            document.getElementById('login-id').value = '';
        }
    </script>
</body>
</html>
