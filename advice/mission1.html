<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ภารกิจที่ 1: ค้นพบตัวตน - Buayai I Care School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f97316;
            --primary-hover: #ea580c;
            --bg-color: #fff7ed;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --success: #10b981;
            --danger: #ef4444;
            --warning-bg: #fffbeb;
            --warning-text: #b45309;
            --warning-border: #fcd34d;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .mission-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 25px;
            position: relative;
        }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #ffedd5; padding-bottom: 15px; }
        .back-btn { background: none; border: none; font-size: 1.5rem; color: var(--primary); cursor: pointer; margin-right: 15px; padding: 0; }
        .title-group { flex: 1; }
        .title-group h1 { margin: 0; font-size: 1.4rem; color: var(--primary); }
        .title-group p { margin: 0; font-size: 0.9rem; color: var(--text-muted); }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1); }
        input:disabled { background-color: #f3f4f6; color: #9ca3af; cursor: not-allowed; }

        /* การจัดการส่วนรูปภาพ */
        .image-upload-section {
            background-color: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .warning-box {
            background-color: var(--warning-bg);
            border: 1px solid var(--warning-border);
            color: var(--warning-text);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-align: left;
            line-height: 1.5;
        }
        .warning-box strong { color: #d97706; }
        
        .preview-container { margin-bottom: 15px; display: none; }
        .profile-preview {
            width: 140px;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: zoom-in;
            border: 3px solid white;
            transition: transform 0.2s;
        }
        .profile-preview:hover { transform: scale(1.05); }
        .click-to-expand-text { font-size: 0.8rem; color: var(--primary); margin-top: 5px; font-weight: 600; }

        input[type="file"] { width: 100%; padding: 10px; background: white; border-radius: 8px; font-family: 'Sarabun', sans-serif; border: 1px solid #e2e8f0; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Sarabun', sans-serif;
            margin-top: 10px;
        }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { background-color: #9ca3af; cursor: not-allowed; }

        /* Modal ภาพขยาย */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85);
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-content { max-width: 90%; max-height: 85vh; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .close-modal {
            position: absolute; top: 20px; right: 30px; color: white;
            font-size: 40px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .close-modal:hover { color: var(--primary); }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); border-radius: 16px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; display: none;
        }
        .spinner {
            border: 4px solid #ffedd5; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="mission-container">
    <!-- หน้าจอโหลดข้อมูล -->
    <div class="loading-overlay" id="loadingData">
        <div class="spinner"></div>
        <div style="color: var(--primary); font-weight: 600;">กำลังดึงข้อมูลของคุณ...</div>
    </div>

    <!-- ส่วนหัว -->
    <div class="header">
        <button class="back-btn" onclick="window.location.href='Std_info_dashboard.html'">⬅️</button>
        <div class="title-group">
            <h1>⭐ ภารกิจที่ 1: ค้นพบตัวตน</h1>
            <p>ตรวจสอบและอัปเดตข้อมูลส่วนตัวของคุณ</p>
        </div>
    </div>

    <form id="mission1Form" onsubmit="saveData(event)">
        <!-- คอลัมน์ 1: ID (ล็อกอิน) -->
        <div class="form-group">
            <label>รหัสนักเรียน (ID)</label>
            <input type="text" id="studentId" disabled>
        </div>

        <div style="display: flex; gap: 10px;">
            <!-- คอลัมน์ 4: ชั้น -->
            <div class="form-group" style="flex: 1;">
                <label>ชั้นเรียน</label>
                <input type="text" id="level" placeholder="เช่น ม.1/1">
            </div>
            <!-- คอลัมน์ 5: เลขที่ -->
            <div class="form-group" style="flex: 1;">
                <label>เลขที่</label>
                <input type="number" id="studentNumber" placeholder="เลขที่">
            </div>
        </div>

        <!-- คอลัมน์ 2: หมายเลขบัตรประชาชน -->
        <div class="form-group">
            <label>หมายเลขประจำตัวประชาชน (13 หลัก)</label>
            <input type="text" id="citizenId" maxlength="13" placeholder="กรอกตัวเลข 13 หลัก" required>
        </div>

        <!-- คอลัมน์ 3: ชื่อ-สกุล -->
        <div class="form-group">
            <label>ชื่อ - นามสกุล (พร้อมคำนำหน้า)</label>
            <input type="text" id="fullName" placeholder="เช่น ด.ช. รักเรียน ขยันยิ่ง" required>
        </div>

        <div style="display: flex; gap: 10px;">
            <!-- คอลัมน์ 6: วัน/เดือน/ปีเกิด -->
            <div class="form-group" style="flex: 2;">
                <label>วันเกิด</label>
                <input type="date" id="birthDate" required>
            </div>
            <!-- คอลัมน์ 8: ศาสนา -->
            <div class="form-group" style="flex: 1;">
                <label>ศาสนา</label>
                <select id="religion">
                    <option value="">- เลือก -</option>
                    <option value="พุทธ">พุทธ</option>
                    <option value="คริสต์">คริสต์</option>
                    <option value="อิสลาม">อิสลาม</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
            </div>
        </div>

        <!-- คอลัมน์ 7: ภาพโปรไฟล์ -->
        <div class="image-upload-section">
            <div class="warning-box">
                <strong>⚠️ รูปนี้สำคัญมาก!</strong><br>
                รูปภาพนี้จะถูกใช้ในเอกสารทางการของโรงเรียน กรุณาใช้รูปถ่ายหน้าตรง สวมชุดนักเรียนที่สุภาพและเรียบร้อยเท่านั้น (อนุญาตให้ถ่ายจากมือถือได้)
            </div>

            <!-- แสดงรูปภาพเก่า (ถ้ามี) -->
            <div class="preview-container" id="previewContainer">
                <p style="font-size: 0.9rem; margin-top: 0; color: var(--text-main);">รูปภาพปัจจุบันของคุณ:</p>
                <img id="profilePreview" class="profile-preview" src="" alt="ภาพโปรไฟล์" onclick="openModal()">
                <div class="click-to-expand-text">🔍 คลิกที่รูปเพื่อขยาย</div>
            </div>

            <label style="text-align: left; margin-top: 15px;">อัปโหลดรูปภาพใหม่ (หากต้องการเปลี่ยน)</label>
            <input type="file" id="profileImageInput" accept="image/*" onchange="previewNewImage(this)">
            <!-- เก็บ URL เดิมซ่อนไว้เผื่อไม่เปลี่ยนรูป -->
            <input type="hidden" id="existingImageUrl">
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">💾 บันทึกข้อมูลภารกิจนี้</button>
    </form>
</div>

<!-- Modal สำหรับขยายภาพ -->
<div id="imageModal" class="modal" onclick="closeModal(event)">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="img01">
</div>

<script>
    // ⚠️ นำ URL ของ Web App จาก Google Apps Script (อันที่จะเขียนใหม่สำหรับจัดการข้อมูล) มาใส่ที่นี่
    // (ตอนนี้ใช้ลิงก์หลอกไปก่อนระหว่างที่คุณครูเตรียม GAS)
    const DATA_API_URL = 'วาง_URL_ของ_GAS_DATA_ที่นี่';

    // 1. ตรวจสอบและโหลดข้อมูลตอนเปิดหน้า
    window.onload = () => {
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = '../login.html';
            return;
        }

        const studentId = localStorage.getItem('studentId');
        document.getElementById('studentId').value = studentId;

        // ดึงข้อมูลจำลองจาก LocalStorage ก่อน (ในระบบจริงจะ fetch จาก GAS)
        fetchDataFromServer(studentId);
    };

    // ฟังก์ชันจำลองดึงข้อมูลจาก Server (Google Sheet)
    async function fetchDataFromServer(studentId) {
        document.getElementById('loadingData').style.display = 'flex';
        
        try {
            // โค้ดนี้คือตัวอย่างการดึงข้อมูล ในการใช้งานจริงจะต้องยิง GET request ไปที่ GAS
            /*
            const response = await fetch(`${DATA_API_URL}?action=getStudent&studentId=${studentId}`);
            const data = await response.json();
            if(data.status === 'success') {
                populateForm(data.studentData);
            }
            */

            // จำลองดึงข้อมูลที่เคยเซฟไว้ในเครื่อง (Auto-Save จากหน้าเก่าๆ)
            setTimeout(() => {
                const mockData = {
                    citizenId: localStorage.getItem('citizenId') || '',
                    fullName: localStorage.getItem('fullName') || '',
                    level: localStorage.getItem('level') || localStorage.getItem('room') || '',
                    studentNumber: localStorage.getItem('studentNumber') || '',
                    birthDate: localStorage.getItem('birthDate') || '',
                    religion: localStorage.getItem('religion') || '',
                    profileImageUrl: localStorage.getItem('profileImageUrl') || '' // ลิงก์ Drive
                };
                populateForm(mockData);
                document.getElementById('loadingData').style.display = 'none';
            }, 800);

        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById('loadingData').style.display = 'none';
        }
    }

    // ฟังก์ชันเติมข้อมูลลงฟอร์ม
    function populateForm(data) {
        document.getElementById('citizenId').value = data.citizenId;
        document.getElementById('fullName').value = data.fullName;
        document.getElementById('level').value = data.level;
        document.getElementById('studentNumber').value = data.studentNumber;
        document.getElementById('birthDate').value = data.birthDate;
        document.getElementById('religion').value = data.religion;
        
        // จัดการรูปภาพ
        if (data.profileImageUrl) {
            document.getElementById('existingImageUrl').value = data.profileImageUrl;
            const previewImg = document.getElementById('profilePreview');
            const previewContainer = document.getElementById('previewContainer');
            
            // แปลงลิงก์ Google Drive ให้แสดงภาพได้ (Extract ID)
            const driveUrl = convertDriveLinkToImage(data.profileImageUrl);
            previewImg.src = driveUrl;
            previewContainer.style.display = 'block';
        }
    }

    // ฟังก์ชันแปลงลิงก์ Google Drive
    function convertDriveLinkToImage(url) {
        if (!url) return '';
        // ตรวจสอบว่าเป็นลิงก์ Drive หรือไม่
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
            return `https://drive.google.com/uc?id=${match[1]}`;
        }
        return url; // ถ้าเป็นลิงก์รูปปกติ (หรือ Base64) ก็คืนค่าเดิม
    }

    // แสดงพรีวิวรูปใหม่เมื่อผู้ใช้กดเลือกไฟล์
    function previewNewImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewImg = document.getElementById('profilePreview');
                const previewContainer = document.getElementById('previewContainer');
                
                previewImg.src = e.target.result;
                previewContainer.style.display = 'block';
                document.getElementById('existingImageUrl').value = ''; // เคลียร์ลิงก์เก่า เพราะจะอัปโหลดใหม่
            }
            reader.readAsDataURL(file);
        }
    }

    // บันทึกข้อมูล
    async function saveData(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'กำลังบันทึกข้อมูล... ⏳';

        // บันทึกลง LocalStorage (สำรอง)
        localStorage.setItem('citizenId', document.getElementById('citizenId').value);
        localStorage.setItem('fullName', document.getElementById('fullName').value);
        localStorage.setItem('level', document.getElementById('level').value);
        localStorage.setItem('studentNumber', document.getElementById('studentNumber').value);
        localStorage.setItem('birthDate', document.getElementById('birthDate').value);
        localStorage.setItem('religion', document.getElementById('religion').value);
        
        // จำลองการบันทึกสำเร็จ
        setTimeout(() => {
            // ประทับเวลาการผ่านด่าน 1
            localStorage.setItem('mission_1_done_time', Date.now());
            
            alert('🎉 บันทึกข้อมูลและภาพโปรไฟล์เรียบร้อยแล้ว!');
            window.location.href = 'Std_info_dashboard.html';
        }, 1500);

        /* การส่งข้อมูลจริงไป GAS จะต้องเขียน fetch(DATA_API_URL, { method: 'POST', body: ... }) ตรงนี้ */
    }

    // ==========================================
    // ระบบ Modal ขยายรูปภาพ
    // ==========================================
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById("img01");

    function openModal() {
        const previewImg = document.getElementById('profilePreview');
        if(previewImg.src) {
            modal.style.display = "flex";
            modalImg.src = previewImg.src;
        }
    }

    function closeModal(event) {
        // ปิดเมื่อกดกากบาท หรือคลิกพื้นที่ดำๆ รอบนอก
        if (event.target === modal || event.target.className === 'close-modal') {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
