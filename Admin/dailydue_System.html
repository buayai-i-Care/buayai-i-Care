<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเวรโรงเรียนบัวใหญ่</title>
  <link href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)" rel="stylesheet">
  <link href="[https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap](https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap)" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; font-size: 20px; background-color: #f4f7f6; }
    .container { max-width: 500px; padding: 20px; }
    .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 20px; background: white; }
    .btn-custom { padding: 16px; font-size: 22px; font-weight: bold; border-radius: 15px; margin-bottom: 15px; width: 100%; transition: all 0.2s; }
    .btn-custom:hover { transform: translateY(-2px); }
    .logo-container { text-align: center; margin-bottom: 25px; }
    .logo { max-width: 120px; height: auto; margin-bottom: 15px; }
    .hidden { display: none !important; }
    
    /* Loading Overlay */
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1050; }
    .modal-content { border-radius: 25px; border: none; }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
    <div class="mt-3 fw-bold text-primary">กำลังประมวลผล...</div>
  </div>

  <div class="container text-center">
    <!-- โลโก้และหัวเว็บ (แสดงในทุกหน้า) -->
    <div class="logo-container">
      <img src="[https://drive.google.com/uc?export=view&id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj](https://drive.google.com/uc?export=view&id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj)" alt="โรงเรียนบัวใหญ่" class="logo">
      <h3 class="fw-bold mb-1">ระบบจัดการเวรครู</h3>
      <p class="text-muted">โรงเรียนบัวใหญ่</p>
    </div>
    
    <!-- หน้า 1: Main Menu -->
    <div id="page-main">
      <button class="btn btn-primary btn-custom shadow" disabled style="opacity: 0.6; cursor: not-allowed;">
        1. สุ่มวันเวรประจำวัน (ปิดชั่วคราว)
      </button>
      <button class="btn btn-success btn-custom shadow" onclick="showPage('page-vote')">
        2. เลือกหัวหน้าเวร
      </button>
      <button class="btn btn-info btn-custom shadow text-white" onclick="showPage('page-report')">
        3. ดูรายงานสรุป
      </button>
    </div>

    <!-- หน้า 2: โหวตเลือกหัวหน้า -->
    <div id="page-vote" class="card hidden text-start">
      <h4 class="text-success text-center mb-3 fw-bold">โหวตหัวหน้าเวร</h4>
      
      <label class="form-label text-muted">1. เลือกวันประจำเวร</label>
      <select id="p2-day" class="form-select mb-3" onchange="loadDayTeachers()">
        <option value="">-- เลือกวัน --</option>
        <option>วันจันทร์</option><option>วันอังคาร</option><option>วันพุธ</option><option>วันพฤหัสบดี</option><option>วันศุกร์</option>
      </select>
      
      <label class="form-label text-muted">2. ชื่อของคุณ (โหวตได้ครั้งเดียว)</label>
      <select id="p2-voter" class="form-select mb-3"></select>
      
      <label class="form-label text-muted">3. เลือกหัวหน้าเวร</label>
      <select id="p2-leader" class="form-select mb-4"></select>
      
      <button class="btn btn-success w-100 py-3 mb-2 shadow fw-bold" onclick="vote()">ยืนยัน (ข้อมูลจะถูกเข้ารหัส)</button>
      <button class="btn btn-outline-secondary w-100" onclick="showPage('page-main')">กลับหน้าหลัก</button>
    </div>

    <!-- หน้า 3: รายงานผล -->
    <div id="page-report" class="card hidden text-start">
      <h4 class="text-center mb-3 fw-bold text-info">ผลคะแนน (ถอดรหัสแล้ว)</h4>
      <div id="report-list" style="font-size: 18px;"></div>
      <button class="btn btn-outline-secondary w-100 mt-4" onclick="showPage('page-main')">กลับหน้าหลัก</button>
    </div>
  </div>

  <!-- Modal แจ้งเตือน -->
  <div class="modal fade" id="notifyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow-lg text-center p-5">
        <div id="modal-icon" style="font-size: 60px;" class="mb-3"></div>
        <h4 id="modal-title" class="fw-bold"></h4>
        <p id="modal-text" class="text-muted mb-4"></p>
        <button class="btn btn-primary w-100 py-3" data-bs-dismiss="modal">ตกลง</button>
      </div>
    </div>
  </div>

  <script src="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js)"></script>
  <script>
    // ==========================================
    // ⚠️ นำ URL ของ Web App (Google Apps Script) มาใส่ที่นี่ ⚠️
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw5KgYlNnjpNaNKusCdm6KPVaDYYzeqjOLaU92iJy1xkLPGPAi4Ki9wCHcBimNqLRho/exec";
    // ==========================================

    const loading = document.getElementById('loading-overlay');

    // ฟังก์ชันแสดง Modal แบบเดิม
    function showModal(title, text, type) {
      const modal = new bootstrap.Modal(document.getElementById('notifyModal'));
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-text').innerText = text;
      document.getElementById('modal-icon').innerHTML = type === 'success' ? '✅' : '❌';
      document.getElementById('modal-icon').style.color = type === 'success' ? '#2ecc71' : '#e74c3c';
      modal.show();
    }

    function showPage(pageId) {
      document.getElementById('page-main').classList.add('hidden');
      document.getElementById('page-vote').classList.add('hidden');
      document.getElementById('page-report').classList.add('hidden');
      document.getElementById(pageId).classList.remove('hidden');
      
      if(pageId === 'page-report') loadReport();
    }

    // ฟังก์ชันเชื่อมต่อกับ Backend (แทนที่ google.script.run)
    async function apiRequest(params) {
      loading.classList.remove('hidden');
      try {
        const url = new URL(WEB_APP_URL);
        // แปลงพารามิเตอร์เป็น query string
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.error) throw new Error(result.error);
        loading.classList.add('hidden');
        return result;
      } catch (error) {
        loading.classList.add('hidden');
        showModal("เกิดข้อผิดพลาด", "ไม่สามารถเชื่อมต่อกับฐานข้อมูลได้ กรุณาตรวจสอบ URL หรือการตั้งค่าสิทธิ์ Web App", "error");
        console.error(error);
        return null;
      }
    }

    async function loadDayTeachers() {
      let day = document.getElementById('p2-day').value;
      if(!day) {
        document.getElementById('p2-voter').innerHTML = '';
        document.getElementById('p2-leader').innerHTML = '';
        return;
      }

      const list = await apiRequest({ action: 'getTeachers', day: day });
      if (list) {
        let html = list.length === 0 ? '<option>-- ใช้สิทธิ์โหวตครบแล้ว --</option>' : list.map(n => `<option>${n}</option>`).join('');
        document.getElementById('p2-voter').innerHTML = html;
        document.getElementById('p2-leader').innerHTML = html;
      }
    }

    async function vote() {
      let day = document.getElementById('p2-day').value;
      let voter = document.getElementById('p2-voter').value;
      let leader = document.getElementById('p2-leader').value;
      
      if(!voter || voter.includes('--')) {
        showModal("ไม่สามารถโหวตได้", "กรุณาเลือกรายชื่อผู้โหวตที่ถูกต้อง", "error");
        return;
      }

      const res = await apiRequest({ action: 'save', day: day, leader: leader, voter: voter });
      if (res && res.message) {
        showModal("สำเร็จ", res.message, "success");
        // รีเซ็ตหน้า
        document.getElementById('p2-day').value = "";
        document.getElementById('p2-voter').innerHTML = "";
        document.getElementById('p2-leader').innerHTML = "";
        showPage('page-main');
      }
    }

    async function loadReport() {
      document.getElementById('report-list').innerHTML = "กำลังประมวลผล...";
      const data = await apiRequest({ action: 'getReport' });
      
      if (data) {
        document.getElementById('report-list').innerHTML = data.length === 0 
          ? "<div class='text-center text-muted mt-3'>ยังไม่มีข้อมูล</div>" 
          : data.map(i => `<div class='mb-2 p-2 border-bottom'><b>${i.day}</b>: ${i.name} <span class="badge bg-primary rounded-pill ms-1">${i.votes} โหวต</span></div>`).join('');
      } else {
        document.getElementById('report-list').innerHTML = "<div class='text-danger'>ไม่สามารถโหลดข้อมูลได้</div>";
      }
    }
  </script>
</body>
</html>
