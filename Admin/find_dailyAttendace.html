<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบสืบค้นบันทึกเข้าเรียน</title>
  <!-- โหลด Bootstrap 5 สำหรับจัดหน้าตาเว็บให้สวยงามและรองรับมือถือ -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- โหลด Font TH Sarabun PSK -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ตั้งค่าฟอนต์และการแสดงผลหลัก */
    body {
      font-family: 'Sarabun', sans-serif;
      background-color: #f8f9fa;
      font-size: 18px; /* ขนาดตัวอักษรใหญ่ สบายตา */
    }

    /* ตกแต่งแถบด้านบน (Header) */
    .navbar-brand {
      font-weight: 700;
      font-size: 24px;
      white-space: normal;
      line-height: 1.2;
    }
    .logo-thumbnail {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
      margin-right: 15px;
    }

    /* ตกแต่งปฏิทิน */
    .calendar-container {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-top: 20px;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .btn-nav {
      font-size: 20px;
      font-weight: bold;
      padding: 5px 20px;
    }
    .table-calendar th {
      text-align: center;
      color: #6c757d;
      font-size: 18px;
    }
    .table-calendar td {
      text-align: center;
      vertical-align: middle;
      height: 70px; /* ขนาดช่องปฏิทินให้ใหญ่กดง่าย */
      width: 14.28%;
      font-size: 20px;
      border: 1px solid #dee2e6;
      border-radius: 8px; /* ทำขอบมนให้แต่ละช่อง */
      cursor: pointer;
      transition: all 0.2s;
    }
    
    /* ทางเลือกที่ 9: Glowing Border Effect (เอฟเฟกต์ขอบเรืองแสง) */
    .glowing-border {
      border: 3px solid #198754 !important; /* ขอบสีเขียวหนา */
      box-shadow: 0 0 12px rgba(25, 135, 84, 0.4); /* เงาเรืองแสง */
      color: #198754;
      font-weight: bold;
      background-color: #f0fdf4;
    }
    .glowing-border:hover {
      background-color: #d1e7dd;
    }

    /* สถานะโหลดข้อมูล */
    #loadingSpinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 50vh;
    }

    /* การ์ดข้อมูลรายวัน */
    .data-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      background: #fff;
    }
    .data-card img.thumbnail-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      cursor: zoom-in; /* เปลี่ยนรูปเมาส์ให้รู้ว่ากดซูมได้ */
      border: 2px solid #ddd;
    }

    /* ระบบซูมภาพ (Zoom Viewer) */
    #zoomContainer {
      width: 100%;
      height: 60vh;
      overflow: auto; /* ให้เลื่อนดูภาพได้เมื่อซูม */
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
    }
    #zoomedImage {
      max-width: 100%;
      max-height: 100%;
      transition: transform 0.2s ease;
      transform-origin: center center;
    }
    .zoom-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
    }
    .zoom-slider {
      width: 60%;
    }
  </style>
</head>
<body>

  <!-- ส่วนหัว (Header) -->
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container d-flex align-items-center">
      <!-- รูปโลโก้จาก ID ที่ให้มา แปลงเป็นลิงก์ uc?id= -->
      <img src="https://drive.google.com/uc?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj" alt="Logo" class="logo-thumbnail">
      <span class="navbar-brand mb-0 text-primary">ระบบสืบค้นบันทึกเข้าเรียนรายคาบ<br><small class="text-muted" style="font-size: 16px;">Buayai I Care School</small></span>
    </div>
  </nav>

  <div class="container">
    <!-- หน้าจอโหลดข้อมูล -->
    <div id="loadingSpinner">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
      <h3 class="mt-3 text-secondary">กำลังดึงข้อมูลปฏิทิน...</h3>
    </div>

    <!-- ส่วนของปฏิทิน -->
    <div id="calendarSection" style="display: none;">
      <div class="calendar-container">
        <div class="calendar-header">
          <button class="btn btn-outline-primary btn-nav" onclick="prevMonth()">&#10094; ก่อนหน้า</button>
          <h4 id="monthYearDisplay" class="m-0 text-primary" style="font-weight: 700;"></h4>
          <button class="btn btn-outline-primary btn-nav" onclick="nextMonth()">ถัดไป &#10095;</button>
        </div>
        
        <table class="table table-borderless table-calendar w-100" style="table-layout: fixed;">
          <thead>
            <tr>
              <th class="text-danger">อา</th>
              <th>จ</th>
              <th>อ</th>
              <th>พ</th>
              <th>พฤ</th>
              <th>ศ</th>
              <th class="text-primary">ส</th>
            </tr>
          </thead>
          <tbody id="calendarBody">
            <!-- JavaScript จะสร้างช่องปฏิทินที่นี่ -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal สำหรับแสดงข้อมูลในวันที่เลือก -->
  <div class="modal fade" id="dayDataModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="dayModalTitle" style="font-size: 22px;">บันทึกการเข้าเรียน</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body bg-light" id="dayModalBody">
          <!-- ข้อมูลจะถูกใส่ที่นี่ -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-lg w-100" data-bs-dismiss="modal">ปิดหน้าต่าง</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal สำหรับระบบ ย่อ/ขยาย/ซูม รูปภาพ -->
  <div class="modal fade" id="zoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content bg-dark text-white">
        <div class="modal-header border-0">
          <h5 class="modal-title" style="font-size: 22px;">โหมดขยายภาพ</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body d-flex flex-column">
          <!-- พื้นที่แสดงภาพ -->
          <div id="zoomContainer">
            <img id="zoomedImage" src="" alt="Zoomed Image">
          </div>
          <!-- แถบควบคุมการซูม (เหมาะสำหรับผู้ใหญ่) -->
          <div class="zoom-controls">
            <button class="btn btn-light btn-lg" onclick="adjustZoom(-0.5)">- ลดขนาด</button>
            <input type="range" class="form-range zoom-slider" id="zoomSlider" min="1" max="4" step="0.1" value="1">
            <button class="btn btn-light btn-lg" onclick="adjustZoom(0.5)">+ ขยาย</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- โหลด Bootstrap JS และ Script ควบคุมการทำงาน -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    
    // !! สำคัญมาก: เมื่อคุณ Deploy ฝั่ง Code.gs เสร็จ ให้นำ URL ที่ได้มาใส่ตรงนี้ !!
    const WEB_APP_URL = "ใส่_URL_ที่ได้จาก_APPS_SCRIPT_ตรงนี้"; 

    // ตัวแปรส่วนกลาง
    let globalData = [];
    let currentDate = new Date(); // สามารถตั้งค่าเริ่มต้นเป็นวันที่ที่ต้องการได้ (ปัจจุบัน)
    let currentScale = 1; // สเกลการซูมภาพ
    
    // รายชื่อเดือนภาษาไทย
    const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

    // เริ่มทำงานเมื่อเปิดหน้าเว็บ
    window.onload = function() {
      // ตรวจสอบว่าผู้ใช้ได้ใส่ URL ของ Web App หรือยัง
      if (WEB_APP_URL === "https://script.google.com/macros/s/AKfycbwWvKBqSq2weBBARvJmK5aYhLGwGGVXo0Wuigsvga-WaFN-2ziqYmS_sFSOZi48m1UH/exec") {
        document.getElementById('loadingSpinner').innerHTML = `
          <h3 class="text-danger mt-3">⚠️ ยังไม่ได้ตั้งค่าการเชื่อมต่อฐานข้อมูล</h3>
          <p class="text-muted">กรุณาใส่ URL ของ Google Apps Script ในตัวแปร WEB_APP_URL ที่โค้ด HTML</p>
        `;
        return;
      }

      // ใช้ Fetch API เพื่อไปดึงข้อมูล JSON จาก Apps Script
      fetch(WEB_APP_URL)
        .then(response => response.json()) // แปลงผลลัพธ์เป็น JSON
        .then(data => {
          onDataReceived(data); // ส่งข้อมูลไปให้ฟังก์ชันเดิมวาดปฏิทิน
        })
        .catch(error => {
          console.error("เกิดข้อผิดพลาด:", error);
          document.getElementById('loadingSpinner').innerHTML = `
            <h3 class="text-danger mt-3">❌ เกิดข้อผิดพลาดในการดึงข้อมูล</h3>
            <p class="text-muted">ไม่สามารถติดต่อฐานข้อมูลได้ โปรดตรวจสอบการตั้งค่า Deploy ใน Apps Script</p>
          `;
        });
    };

    function onDataReceived(data) {
      if(data.error) {
        alert("เกิดข้อผิดพลาดในการดึงข้อมูล: " + data.error);
        return;
      }
      globalData = data;
      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('calendarSection').style.display = 'block';
      
      // ให้ปฏิทินแสดงเดือนตามข้อมูลล่าสุดที่มี (จากตัวอย่างคือ พฤษภาคม 2026)
      // หรือถ้าต้องการแสดงเดือนปัจจุบันให้ใช้ currentDate เหมือนเดิม
      if(globalData.length > 0 && globalData[0].date) {
         let lastDateParts = globalData[0].date.split('-');
         if(lastDateParts.length === 3) {
            currentDate = new Date(lastDateParts[0], parseInt(lastDateParts[1])-1, 1);
         }
      }
      renderCalendar();
    }

    // ฟังก์ชันสร้างปฏิทิน
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      // แสดงหัวข้อเดือน พ.ศ.
      document.getElementById('monthYearDisplay').innerText = `${thaiMonths[month]} พ.ศ. ${year + 543}`;
      
      const firstDay = new Date(year, month, 1).getDay(); // วันแรกของเดือนตรงกับวันอะไร
      const daysInMonth = new Date(year, month + 1, 0).getDate(); // เดือนนี้มีกี่วัน
      
      const tbody = document.getElementById('calendarBody');
      tbody.innerHTML = ''; // ล้างข้อมูลเก่า
      
      let date = 1;
      for (let i = 0; i < 6; i++) {
        let row = document.createElement('tr');
        for (let j = 0; j < 7; j++) {
          let cell = document.createElement('td');
          if (i === 0 && j < firstDay) {
            // ช่องว่างก่อนเริ่มวันที่ 1
            cell.innerText = "";
            cell.style.border = "none";
          } else if (date > daysInMonth) {
            // ช่องว่างหลังวันสุดท้าย
            cell.innerText = "";
            cell.style.border = "none";
          } else {
            cell.innerText = date;
            
            // สร้างข้อความวันที่ในรูปแบบ YYYY-MM-DD เพื่อเช็คกับฐานข้อมูล
            // เติม 0 ข้างหน้าถ้าเลขเป็นหลักเดียว (เช่น เดือน 5 เป็น 05)
            const checkDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
            
            // ตรวจสอบว่าใน globalData มีวันที้นี้หรือไม่
            const dayRecords = globalData.filter(d => d.date === checkDateStr);
            
            if (dayRecords.length > 0) {
              // ทางเลือกที่ 9: ถ้ามีข้อมูล ให้เพิ่มเอฟเฟกต์ Glowing Border
              cell.classList.add('glowing-border');
              // สร้างฟังก์ชันเมื่อคลิกที่ช่องเรืองแสง
              cell.onclick = function() { showDayDetails(checkDateStr, dayRecords); };
            }
            date++;
          }
          row.appendChild(cell);
        }
        tbody.appendChild(row);
        if (date > daysInMonth) break;
      }
    }

    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    // ฟังก์ชันแสดงข้อมูลเมื่อกดที่วันที่
    function showDayDetails(dateStr, records) {
      // แปลงวันที่ YYYY-MM-DD เป็นภาษาไทย
      let parts = dateStr.split('-');
      let thaiDateText = `${parseInt(parts[2])} ${thaiMonths[parseInt(parts[1])-1]} ${parseInt(parts[0])+543}`;
      
      document.getElementById('dayModalTitle').innerText = `บันทึกการเข้าเรียนวันที่ ${thaiDateText}`;
      
      let modalBody = document.getElementById('dayModalBody');
      modalBody.innerHTML = '';
      
      records.forEach(rec => {
        // สร้างการ์ดแสดงข้อมูล
        let card = document.createElement('div');
        card.className = 'data-card shadow-sm';
        
        let statusColor = rec.status.toLowerCase().includes('success') ? 'text-success' : 'text-primary';
        
        // ถ้ามี FileID ภาพ ให้ดึงภาพมาโชว์
        let imgHtml = '';
        if(rec.fileId && rec.fileId.trim() !== '') {
           let imgSrc = `https://drive.google.com/uc?id=${rec.fileId}`;
           imgHtml = `<div class="mt-3 text-center">
                        <img src="${imgSrc}" class="thumbnail-img" onclick="openZoomModal('${imgSrc}')" title="คลิกเพื่อขยายภาพ">
                        <p class="text-muted mt-1" style="font-size:14px;">👆 แตะที่ภาพเพื่อขยาย/ซูม</p>
                      </div>`;
        }

        card.innerHTML = `
          <h4 class="${statusColor} fw-bold mb-2">สถานะ: ${rec.status}</h4>
          <p class="mb-1"><strong>ระดับชั้น:</strong> ${rec.className}</p>
          <p class="mb-1"><strong>รายละเอียด:</strong> ${rec.details}</p>
          <p class="mb-1 text-muted" style="font-size:16px;"><strong>บันทึกเมื่อ:</strong> ${rec.timestamp}</p>
          ${imgHtml}
        `;
        modalBody.appendChild(card);
      });
      
      // เปิดหน้าต่าง Modal
      var dayModal = new bootstrap.Modal(document.getElementById('dayDataModal'));
      dayModal.show();
    }

    // ----------------------------------------
    // ระบบซูมภาพ (Zoom Viewer สำหรับผู้ใหญ่)
    // ----------------------------------------
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomedImage = document.getElementById('zoomedImage');

    function openZoomModal(imgSrc) {
      // รีเซ็ตค่าการซูมเมื่อเปิดรูปใหม่
      currentScale = 1;
      zoomSlider.value = currentScale;
      zoomedImage.style.transform = `scale(${currentScale})`;
      zoomedImage.src = imgSrc;
      
      var zoomModal = new bootstrap.Modal(document.getElementById('zoomModal'));
      zoomModal.show();
    }

    // เมื่อเลื่อน Slider ให้ขยายภาพ
    zoomSlider.addEventListener('input', function(e) {
      currentScale = parseFloat(e.target.value);
      zoomedImage.style.transform = `scale(${currentScale})`;
    });

    // ปุ่มกด + / - สำหรับคนที่ไม่อยากเลื่อน Slider
    function adjustZoom(amount) {
      currentScale += amount;
      if (currentScale < 1) currentScale = 1;
      if (currentScale > 4) currentScale = 4;
      
      zoomSlider.value = currentScale;
      zoomedImage.style.transform = `scale(${currentScale})`;
    }
  </script>
</body>
</html>
