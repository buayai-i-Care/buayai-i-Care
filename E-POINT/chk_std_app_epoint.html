<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบการลงทะเบียน ระบบคะแนนความพฤติกรรม E-Point - โรงเรียนบัวใหญ่</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --teal-main: #0f766e; 
            --teal-light: #ccfbf1;
            --teal-dark: #115e59;
            --bg-color: #f8fafc;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); color: #1e293b; padding-bottom: 50px; }
        h1, h2, h3, h4, h5, .font-prompt { font-family: 'Prompt', sans-serif; }
        
        .top-navbar {
            background: linear-gradient(135deg, var(--teal-main), var(--teal-dark));
            color: white; height: 70px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(15, 118, 110, 0.3); position: fixed; top: 0; width: 100%; z-index: 1030;
        }

        .main-content { padding: 90px 15px 30px; max-width: 900px; margin: 0 auto; }
        
        .content-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        
        .form-control, .form-select { border-radius: 12px; padding: 12px 15px; border: 1px solid #cbd5e1; background-color: #f8fafc; font-family: 'Sarabun'; }
        .form-control:focus, .form-select:focus { border-color: var(--teal-main); box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.15); background-color: white; }
        
        .btn-teal { background: var(--teal-main); color: white; border-radius: 12px; font-weight: 600; padding: 12px 25px; transition: 0.3s; border: none; }
        .btn-teal:hover { background-color: var(--teal-dark); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(15, 118, 110, 0.3); }

        /* 📊 Summary Cards */
        .summary-box { border-radius: 15px; padding: 20px; text-align: center; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .summary-box h2 { font-size: 2.8rem; font-weight: 700; margin: 10px 0 0 0; font-family: 'Prompt', sans-serif; }
        .summary-box p { font-size: 1rem; opacity: 0.9; margin: 0; }
        .box-total { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .box-success { background: linear-gradient(135deg, #10b981, #059669); }
        .box-danger { background: linear-gradient(135deg, #f43f5e, #e11d48); }

        /* 🏠 Room Cards */
        .room-card { background: white; border-radius: 15px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); height: 100%; transition: 0.2s; }
        .room-card:hover { border-color: var(--teal-main); box-shadow: 0 8px 15px rgba(15, 118, 110, 0.1); }
        
        /* 📋 Table Styles (For Modals) */
        .table-custom { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #e2e8f0; margin-bottom: 0; }
        .table-custom th { background: #f8fafc; color: #475569; font-family: 'Prompt'; font-weight: 600; padding: 15px; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1;}
        .table-custom td { padding: 12px 15px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }
        
        .btn-report-special { background: #fff1f2; color: #e11d48; border: 1px solid #fecaca; border-radius: 50px; font-size: 0.8rem; font-weight: bold; padding: 5px 12px; transition: 0.2s; }
        .btn-report-special:hover { background: #e11d48; color: white; }

        select optgroup { font-weight: 700; color: var(--teal-dark); background: #f1f5f9; }
        select option { font-weight: 400; color: #1e293b; background: white; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <h5 class="m-0 fw-bold font-prompt"><i class="bi bi-shield-check me-2"></i> ตรวจสอบสถานะ ระบบคะแนนพฤติกรรม E-Point >>Buayai I Care School<<</h5>
    </div>

    <div class="main-content">
        
        <!-- ส่วนที่ 1: ค้นหา -->
        <div class="content-card text-center">
            <h5 class="fw-bold text-dark font-prompt mb-3">ระบุระดับชั้น หรือ ห้องเรียนที่ต้องการ</h5>
            <div class="row justify-content-center g-2">
                <div class="col-md-7 col-8">
                    <!-- 🌟 Dropdown เพิ่ม ภาพรวมระดับชั้น ม.1-ม.6 -->
                    <select id="room-select" class="form-select fw-bold text-center text-primary fs-5">
                        <!-- Options generated by JS -->
                    </select>
                </div>
                <div class="col-md-3 col-4">
                    <button class="btn-teal w-100" onclick="checkStatus()" id="btn-check">
                        <i class="bi bi-search"></i> ค้นหา
                    </button>
                </div>
            </div>
        </div>

        <div id="loading-spinner" class="text-center py-5" style="display: none;">
            <div class="spinner-border" style="color: var(--teal-main); width: 3rem; height: 3rem;"></div>
            <div class="mt-3 text-muted fw-bold">กำลังประมวลผลข้อมูล...</div>
        </div>

        <!-- ส่วนที่ 2: สรุปผล -->
        <div id="result-section" style="display: none;">
            
            <h4 class="font-prompt fw-bold text-dark mb-3" id="result-title">ผลการตรวจสอบ</h4>

            <!-- ยอดรวมใหญ่ด้านบน -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="summary-box box-total">
                        <p>นักเรียนทั้งหมด</p>
                        <h2 id="count-total">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="summary-box box-success">
                        <p><i class="bi bi-check-circle-fill"></i> สมัครแล้ว</p>
                        <h2 id="count-reg">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="summary-box box-danger">
                        <p><i class="bi bi-exclamation-circle-fill"></i> ยังไม่สมัคร</p>
                        <h2 id="count-unreg">0</h2>
                    </div>
                </div>
            </div>

            <!-- ส่วนสร้าง Card รายห้อง -->
            <div class="row g-3" id="room-cards-container">
                <!-- Cards will be generated here -->
            </div>

        </div>

    </div>

    <!-- 🌟 Modal: แสดงรายชื่อนักเรียน (ใช้ร่วมกันทั้งคนที่สมัครแล้ว และยังไม่สมัคร) -->
    <div class="modal fade" id="listModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 px-4 py-3" id="listModalHeader">
                    <h5 class="modal-title fw-bold font-prompt text-white" id="listModalTitle">รายชื่อนักเรียน</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="table-responsive table-custom">
                        <table class="table mb-0">
                            <thead id="listModalThead">
                                <!-- Headers -->
                            </thead>
                            <tbody id="listModalTbody">
                                <!-- Data -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🌟 Modal: แจ้งสถานะพิเศษ (ขาดเรียนนาน ฯลฯ) -->
    <div class="modal fade" id="specialStatusModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header bg-light border-0 px-4 py-3">
                    <h5 class="modal-title fw-bold text-danger font-prompt"><i class="bi bi-exclamation-triangle-fill"></i> แจ้งสถานะพิเศษนักเรียน</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="alert alert-danger border-0 rounded-3 mb-4">
                        <div class="fw-bold fs-5" id="sp-name">ชื่อนักเรียน</div>
                        <div class="small mt-1">รหัส: <span id="sp-id"></span> | ห้อง <span id="sp-room"></span></div>
                    </div>

                    <label class="form-label fw-bold small text-muted">ระบุสถานะ <span class="text-danger">*</span></label>
                    <select id="sp-status" class="form-select mb-3 text-danger fw-bold">
                        <option value="ขาดเรียนนาน">ขาดเรียนนาน</option>
                        <option value="พักการเรียน">พักการเรียน</option>
                        <option value="ลาออก">ลาออก / ย้ายสถานศึกษา</option>
                        <option value="อื่นๆ">อื่นๆ (โปรดระบุในหมายเหตุ)</option>
                    </select>

                    <label class="form-label fw-bold small text-muted">วันที่เริ่มสถานะ <span class="text-danger">*</span></label>
                    <input type="date" id="sp-date" class="form-control mb-3">

                    <label class="form-label fw-bold small text-muted">หมายเหตุเพิ่มเติม</label>
                    <textarea id="sp-note" class="form-control mb-4" rows="3" placeholder="ระบุเหตุผล หรือรายละเอียดเพิ่มเติม..."></textarea>

                    <button id="btn-save-special" class="btn-teal w-100 py-3 rounded-pill shadow-sm" onclick="submitSpecialStatus()">
                        <i class="bi bi-floppy-fill me-1"></i> ยืนยันบันทึกสถานะ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ====================================================
        // ⚠️ ใส่ลิงก์ Web App API ที่ได้จาก Google Apps Script ⚠️
        // ====================================================
        const API_URL = "ใส่_ลิงก์_WEB_APP_ตรงนี้"; 

        let globalRoomData = []; // เก็บตัวแปรไว้เปิดรายชื่อ

        // 1. 🌟 สร้างตัวเลือกห้องแบบมีกลุ่ม และ "ภาพรวมระดับชั้น"
        window.addEventListener('DOMContentLoaded', () => {
            let options = '<option value="">-- เลือกระดับชั้น หรือ ห้องเรียน --</option>';
            
            // กลุ่ม: ภาพรวมระดับชั้น
            options += '<optgroup label="📌 ดูภาพรวมระดับชั้น">';
            for (let m = 1; m <= 6; m++) {
                options += `<option value="m${m}">ภาพรวมระดับชั้น ม.${m}</option>`;
            }
            options += '</optgroup>';

            // กลุ่ม: รายห้อง
            for (let m = 1; m <= 6; m++) {
                options += `<optgroup label="รายห้อง ม.${m}">`;
                let maxRooms = (m === 4) ? 12 : 10;
                for (let r = 1; r <= maxRooms; r++) {
                    options += `<option value="${m}/${r}">ม.${m}/${r}</option>`;
                }
                options += `</optgroup>`;
            }
            
            document.getElementById('room-select').innerHTML = options;
            document.getElementById('sp-date').value = new Date().toLocaleDateString('en-CA');
        });

        // 2. Fetch API Helper
        async function fetchAPI(payload, btnId) {
            let btn, originalText;
            if(btnId) {
                btn = document.getElementById(btnId);
                originalText = btn.innerHTML;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> ค้นหา...';
                btn.disabled = true;
            }
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                alert("⚠️ การเชื่อมต่อล้มเหลว โปรดตรวจสอบสัญญาณอินเทอร์เน็ต");
                return { success: false, error: "Connection Failed" };
            } finally {
                if(btnId) { btn.innerHTML = originalText; btn.disabled = false; }
            }
        }

        // 3. ฟังก์ชันตรวจสอบสถานะ (ปรับปรุงให้รองรับ Card Array)
        async function checkStatus() {
            const roomVal = document.getElementById('room-select').value;
            const roomText = document.getElementById('room-select').options[document.getElementById('room-select').selectedIndex].text;
            
            if (!roomVal) return alert("กรุณาระบุห้องเรียนหรือระดับชั้นที่ต้องการตรวจสอบครับ");

            document.getElementById('result-section').style.display = 'none';
            document.getElementById('loading-spinner').style.display = 'block';

            const res = await fetchAPI({ action: 'getRegStatus', room: roomVal }, 'btn-check');
            
            document.getElementById('loading-spinner').style.display = 'none';

            if (res.success) {
                globalRoomData = res.rooms; // เก็บไว้ใช้ตอนคลิกปุ่มดูรายชื่อ

                document.getElementById('result-section').style.display = 'block';
                document.getElementById('result-title').innerText = `สรุปยอด: ${roomText}`;
                
                // ลงข้อมูลสถิติภาพรวมใหญ่
                document.getElementById('count-total').innerText = res.total;
                document.getElementById('count-reg').innerText = res.registeredCount;
                document.getElementById('count-unreg').innerText = res.unregisteredCount;

                // สร้างการ์ดของแต่ละห้อง
                const container = document.getElementById('room-cards-container');
                let cardsHtml = '';

                res.rooms.forEach((r, index) => {
                    cardsHtml += `
                        <div class="col-md-6 col-lg-4">
                            <div class="room-card">
                                <h5 class="fw-bold text-dark border-bottom pb-2 mb-3">
                                    <i class="bi bi-door-open-fill text-muted"></i> ม.${r.room}
                                </h5>
                                <div class="d-flex justify-content-between text-muted small mb-4">
                                    <span>ทั้งหมด: <b>${r.total}</b></span>
                                    <span class="text-success">สมัคร: <b>${r.registeredCount}</b></span>
                                    <span class="text-danger">ยังไม่สมัคร: <b>${r.unregisteredCount}</b></span>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-danger btn-sm flex-grow-1 fw-bold" onclick="openListModal(${index}, 'unreg')">ยังไม่สมัคร (${r.unregisteredCount})</button>
                                    <button class="btn btn-outline-success btn-sm flex-grow-1 fw-bold" onclick="openListModal(${index}, 'reg')">สมัครแล้ว (${r.registeredCount})</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = cardsHtml;

            } else {
                alert("❌ เกิดข้อผิดพลาด: " + res.error);
            }
        }

        // 4. 🌟 ฟังก์ชันเปิด Modal แสดงรายชื่อ
        const listModal = new bootstrap.Modal(document.getElementById('listModal'));
        
        function openListModal(roomIndex, type) {
            const roomData = globalRoomData[roomIndex];
            const header = document.getElementById('listModalHeader');
            const title = document.getElementById('listModalTitle');
            const thead = document.getElementById('listModalThead');
            const tbody = document.getElementById('listModalTbody');

            tbody.innerHTML = '';

            if (type === 'unreg') {
                header.className = 'modal-header border-0 px-4 py-3 bg-danger';
                title.innerHTML = `<i class="bi bi-person-x-fill"></i> ผู้ที่ยังไม่สมัครเข้าใช้งาน (ม.${roomData.room})`;
                thead.innerHTML = '<tr><th width="10%">#</th><th width="20%">รหัส</th><th width="40%">ชื่อ-สกุล</th><th width="30%" class="text-end">จัดการ</th></tr>';
                
                if(roomData.unregistered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-success fw-bold">สมัครครบทุกคนแล้ว! 🎉</td></tr>';
                } else {
                    roomData.unregistered.forEach((std, idx) => {
                        tbody.innerHTML += `
                            <tr>
                                <td class="text-muted">${idx+1}</td>
                                <td><span class="badge bg-light text-dark border">${std.id}</span></td>
                                <td class="fw-bold">${std.name}</td>
                                <td class="text-end">
                                    <button class="btn-report-special" onclick="openSpecialModal('${std.id}', '${std.name}', '${roomData.room}')">
                                        <i class="bi bi-exclamation-circle"></i> แจ้งขาดเรียนนาน
                                    </button>
                                </td>
                            </tr>`;
                    });
                }
            } 
            else if (type === 'reg') {
                header.className = 'modal-header border-0 px-4 py-3 bg-success';
                title.innerHTML = `<i class="bi bi-person-check-fill"></i> ผู้ที่สมัครเข้าใช้งานแล้ว (ม.${roomData.room})`;
                thead.innerHTML = '<tr><th width="10%">#</th><th width="20%">รหัส</th><th width="70%">ชื่อ-สกุล</th></tr>';
                
                if(roomData.registered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">ยังไม่มีนักเรียนสมัครเข้าใช้งาน</td></tr>';
                } else {
                    roomData.registered.forEach((std, idx) => {
                        tbody.innerHTML += `
                            <tr>
                                <td class="text-muted">${idx+1}</td>
                                <td class="text-success fw-bold">${std.id}</td>
                                <td>${std.name}</td>
                            </tr>`;
                    });
                }
            }

            listModal.show();
        }

        // 5. ระบบแจ้งสถานะพิเศษ (เหมือนเดิม)
        const specialModal = new bootstrap.Modal(document.getElementById('specialStatusModal'));

        function openSpecialModal(id, name, room) {
            listModal.hide(); // ซ่อนหน้าต่างรายชื่อก่อน
            document.getElementById('sp-id').innerText = id;
            document.getElementById('sp-name').innerText = name;
            document.getElementById('sp-room').innerText = room.startsWith("ม.") ? room : "ม." + room; 
            document.getElementById('sp-note').value = ""; 
            
            setTimeout(() => { specialModal.show(); }, 300); // รอให้แอนิเมชัน Modal แรกปิดเสร็จก่อน
        }

        async function submitSpecialStatus() {
            const id = document.getElementById('sp-id').innerText;
            const name = document.getElementById('sp-name').innerText;
            const room = document.getElementById('sp-room').innerText.replace("ม.", ""); 
            const status = document.getElementById('sp-status').value;
            const date = document.getElementById('sp-date').value;
            const note = document.getElementById('sp-note').value;

            if(!date) return alert("กรุณาระบุวันที่เริ่มสถานะ");

            const payload = {
                action: 'saveSpecialStatus',
                id: id, name: name, room: room,
                status: status, startDate: date, note: note
            };

            const res = await fetchAPI(payload, 'btn-save-special');
            if (res.success) {
                alert("✅ " + res.message);
                specialModal.hide();
            } else {
                alert("❌ บันทึกไม่สำเร็จ: " + res.error);
            }
        }
    </script>
</body>
</html>
