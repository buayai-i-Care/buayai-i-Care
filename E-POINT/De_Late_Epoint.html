<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ระบบบันทึกผู้มาสาย โรงเรียนบัวใหญ่</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">

    <style>
        /* ================= CSS: TH Sarabun & Modern Bento Grid ================= */
        :root {
            --bg-color: #ECEFF4;
            --primary: #FFD600;    /* เหลืองสดสะท้อนแสง */
            --secondary: #0046FF;  /* น้ำเงินหลวงคมชัด */
            --accent: #FF0066;     /* ชมพูสะท้อนแสงเด่นชัด */
            --success: #00E676;    /* เขียวสว่าง */
            --text-dark: #1A1D24;
            --white: #FFFFFF;
            --radius: 28px;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* หัวข้อด้านบนสุดและโลโก้ */
        .app-header {
            text-align: center;
            margin: 15px 0;
            width: 100%;
            max-width: 500px;
        }
        .school-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.15));
        }
        .app-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--secondary);
            margin: 0;
            text-shadow: 1px 1px 0px var(--white);
        }

        /* หน้าจอล็อกรหัสผ่าน */
        #loginScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--secondary), #0022AA);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            color: var(--white);
        }
        .login-box { text-align: center; width: 85%; max-width: 350px; }
        .login-box h1 { font-size: 36px; font-weight: 700; margin-bottom: 25px; }
        .login-box input {
            font-family: 'Sarabun', sans-serif;
            font-size: 26px;
            font-weight: bold;
            padding: 15px;
            border-radius: var(--radius);
            border: 4px solid var(--text-dark);
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
        }
        .login-box button {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--primary);
            color: var(--text-dark);
            font-size: 26px;
            font-weight: 800;
            padding: 15px 50px;
            border: 4px solid var(--text-dark);
            border-radius: var(--radius);
            cursor: pointer;
            box-shadow: 0 8px 0 var(--text-dark);
            width: 100%;
        }
        .login-box button:active { transform: translateY(8px); box-shadow: none; }

        /* Bento Grid Container */
        #mainApp {
            display: none; 
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .bento-card {
            background-color: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,47,255,0.06);
            border: 3px solid rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }

        .bento-card.yellow { background-color: var(--primary); border: 4px solid var(--text-dark); box-shadow: 0 8px 0 var(--text-dark); }
        
        /* ส่วนค้นหา */
        .search-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; color: var(--text-dark); }
        #studentIdInput {
            font-family: 'Sarabun', sans-serif;
            width: 100%;
            font-size: 44px;
            font-weight: 800;
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            border: 4px solid var(--text-dark);
            outline: none;
            box-sizing: border-box;
            background-color: var(--white);
        }

        /* ส่วนแสดงผลนักเรียน */
        #studentInfo { display: none; }
        .student-image-container {
            width: 100%;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #E5E9F0;
            border: 3px solid var(--text-dark);
            position: relative;
        }
        #studentImage { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
        .student-name { font-size: 32px; font-weight: 800; margin: 10px 0; color: var(--text-dark); }
        .student-room { font-size: 24px; font-weight: 700; background-color: var(--secondary); color: white; padding: 6px 20px; border-radius: 50px; display: inline-block; }

        /* ปุ่มบันทึก */
        #saveBtn {
            font-family: 'Sarabun', sans-serif;
            width: 100%;
            background-color: var(--accent);
            color: var(--white);
            font-size: 36px;
            font-weight: 800;
            padding: 20px;
            border: 4px solid var(--text-dark);
            border-radius: var(--radius);
            cursor: pointer;
            box-shadow: 0 10px 0 var(--text-dark);
            transition: all 0.05s;
        }
        #saveBtn:active { transform: translateY(10px); box-shadow: none; }
        #saveBtn:disabled { background-color: #A3AEC4; box-shadow: 0 10px 0 #606F8A; cursor: not-allowed; }

        #loading { font-size: 22px; color: var(--secondary); font-weight: 800; display: none; margin-top: 5px; }

        /* Popups Modals (ดูภาพใหญ่ / แจ้งเตือนสำเร็จ) */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); justify-content: center; align-items: center;
        }
        #imageModal img { max-width: 95%; max-height: 85%; border-radius: 20px; border: 4px solid white; }
        
        /* Custom Alert Modal แจ้งบันทึกสำเร็จ */
        .custom-alert {
            background-color: var(--white);
            width: 85%;
            max-width: 400px;
            border-radius: var(--radius);
            padding: 30px 20px;
            text-align: center;
            border: 5px solid var(--text-dark);
            box-shadow: 0 20px 0 rgba(0,0,0,0.15);
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .alert-icon { font-size: 60px; margin-bottom: 10px; color: var(--success); }
        .alert-text { font-size: 26px; font-weight: 700; color: var(--text-dark); line-height: 1.5; margin-bottom: 25px; }
        .alert-btn {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--success);
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 800;
            padding: 12px 40px;
            border: 3px solid var(--text-dark);
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--text-dark);
        }
        .alert-btn:active { transform: translateY(6px); box-shadow: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <img class="school-logo" src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w200" alt="ตราโรงเรียน">
            <h1>ระบบบันทึกผู้มาสาย<br>โรงเรียนบัวใหญ่</h1>
            <input type="password" id="passwordInput" placeholder="กรอกรหัสผ่านเพื่อใช้งาน">
            <br>
            <button onclick="checkPassword()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div class="app-header" id="appHeader" style="display:none;">
        <img class="school-logo" src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w200" alt="ตราโรงเรียน">
        <h1 class="app-title">ระบบบันทึกผู้มาสาย โรงเรียนบัวใหญ่</h1>
    </div>

    <div id="mainApp">
        <div class="bento-card yellow">
            <div class="search-title">พิมพ์รหัสนักเรียน 5 หลัก</div>
            <input type="number" id="studentIdInput" placeholder="00000" maxlength="5" oninput="javascript: if (this.value.length > this.maxLength) this.value = this.value.slice(0, this.maxLength);">
            <div id="loading">กำลังค้นหาข้อมูล...</div>
        </div>

        <div class="bento-card" id="studentInfo">
            <div class="student-image-container">
                <img id="studentImage" src="" alt="ภาพนักเรียน" onclick="openImageModal()">
            </div>
            <div class="student-name" id="studentName">-</div>
            <div class="student-room" id="studentRoom">-</div>
        </div>

        <div class="bento-card" style="background: transparent; box-shadow: none; padding: 0; border: none;">
            <button id="saveBtn" style="display: none;" onclick="saveData()">บันทึกมาสาย</button>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeImageModal()">
        <img id="modalImg" src="">
    </div>

    <div id="alertModal" class="modal">
        <div class="custom-alert">
            <div class="alert-icon">🎉</div>
            <div class="alert-text" id="alertText">ได้บันทึกข้อมูลมาสายเรียบร้อยแล้ว</div>
            <button class="alert-btn" onclick="closeAlertModal()">ตกลง (OK)</button>
        </div>
    </div>

    <script>
        // ================= JavaScript Logic =================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwuWINUcjChyb9Ga9_PoEiCuyI_o7bi4clqQKHJEew2GqCV-4nRuNorDwaYZEeEmaSz/exec";
        let currentStudent = null;

        // 1. ระบบปลดล็อกรหัสผ่าน
        function checkPassword() {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === 'sapa') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appHeader').style.display = 'block';
                document.getElementById('mainApp').style.display = 'grid';
                document.getElementById('studentIdInput').focus();
            } else {
                triggerFeedback('error');
                alert('รหัสผ่านไม่ถูกต้องครับ!');
            }
        }

        // 2. ระบบค้นหาอัตโนมัติเมื่อพิมพ์ครบ 5 หลักและยุบแป้นพิมพ์
        const inputField = document.getElementById('studentIdInput');
        inputField.addEventListener('input', function() {
            if (this.value.length === 5) {
                this.blur(); // ยุบแป้นพิมพ์มือถือลงทันที
                searchStudent(this.value);
            } else {
                hideStudentInfo();
            }
        });

        // ฟังก์ชันแปลงลิงก์ Google Drive เป็น Thumbnail ขนาด 500px เพื่อความคมชัดเวลาซูม
        function getThumbnailUrl(driveUrl) {
            if (!driveUrl) return 'https://via.placeholder.com/300?text=No+Image';
            const match = driveUrl.match(/\/d\/([a-zA-Z0-9_-]+)/) || driveUrl.match(/id=([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w500`; 
            }
            return driveUrl;
        }

        // เรียกค้นหาจาก API หลังบ้าน
        async function searchStudent(id) {
            document.getElementById('loading').style.display = 'block';
            hideStudentInfo();

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'search', id: id })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    currentStudent = result.data;
                    showStudentInfo(currentStudent);
                    triggerFeedback('success');
                } else {
                    triggerFeedback('error');
                    alert(result.message);
                    inputField.value = '';
                    inputField.focus();
                }
            } catch (error) {
                triggerFeedback('error');
                alert("เกิดข้อผิดพลาดในการเชื่อมต่ออินเทอร์เน็ต");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 3. แสดงข้อมูลนักเรียนการ์ด Bento
        function showStudentInfo(data) {
            document.getElementById('studentInfo').style.display = 'block';
            document.getElementById('studentName').innerText = data.name;
            document.getElementById('studentRoom').innerText = "ห้อง " + data.room;
            
            const imgUrl = getThumbnailUrl(data.image); 
            document.getElementById('studentImage').src = imgUrl;
            document.getElementById('modalImg').src = imgUrl;

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.style.display = 'block';
            saveBtn.disabled = false;
        }

        function hideStudentInfo() {
            document.getElementById('studentInfo').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'none';
            currentStudent = null;
        }

        // 4. บันทึกข้อมูลและความเร็วสูง (Optimistic Update) ร่วมกับ Custom Modal
        function saveData() {
            if (!currentStudent) return;

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true; 
            
            // ดึงวันที่ปัจจุบันแบบไทยสไตล์มาแสดงใน Modal
            const now = new Date();
            const thaiDateStr = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });

            // สั่งสั่นและส่งเสียงตอบรับความเร็วสูงทันที
            triggerFeedback('success');

            // 🌟 แสดงผลลัพธ์ผ่าน Custom Modal ตามที่คุณสั่งเป๊ะๆ
            const alertText = `ได้บันทึก ${currentStudent.name} มาสาย เมื่อวันที่ ${thaiDateStr} และหักคะแนนแล้ว 5 คะแนน ...ขอบคุณค่ะ`;
            document.getElementById('alertText').innerText = alertText;
            document.getElementById('alertModal').style.display = 'flex';

            // แอบส่งข้อมูลไปหลังบ้านเงียบๆ (Background Sync)
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'save', studentData: currentStudent })
            }).catch(e => console.error("Sync Error:", e));

            // ตั้งเวลาให้ปิดหน้าจอเตือนและพร้อมรับสแกนคนถัดไปโดยอัตโนมัติภายใน 3.5 วินาที (หากไม่ได้กดปุ่มตกลง)
            autoCloseTimeout = setTimeout(() => {
                closeAlertModal();
            }, 3500);
        }

        let autoCloseTimeout;
        function closeAlertModal() {
            clearTimeout(autoCloseTimeout);
            document.getElementById('alertModal').style.display = 'none';
            inputField.value = '';
            hideStudentInfo();
            inputField.focus(); // ดีดแผงคีย์บอร์ดกลับมาพร้อมบันทึกคนต่อไปทันที
        }

        // 5. เสียงและสั่นเตือนผู้ใช้
        function triggerFeedback(type) {
            if (navigator.vibrate) {
                if (type === 'success') navigator.vibrate(200);
                else navigator.vibrate([100, 50, 100]);
            }

            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'success') {
                    osc.frequency.value = 1000;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.4, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.frequency.value = 280;
                    osc.type = 'sawtooth';
                    gain.gain.setValueAtTime(0.4, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.4);
                }
            } catch (e) { console.log("Audio feedback error"); }
        }

        // 6. ระบบเปิด/ปิดภาพใหญ่ (กางนิ้วซูมด้วยเบราว์เซอร์ได้)
        function openImageModal() { document.getElementById('imageModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
    </script>
</body>
</html>
