<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in รถจักรยานยนต์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #0056b3; }
        #status { margin-top: 15px; font-size: 14px; color: #d9534f; font-weight: bold; }
        .success { color: #28a745 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏍️ เช็คอินรถจักรยานยนต์</h2>
    <p>สแกนและกรอกรหัสยืนยันตัวตน</p>
    
    <input type="text" id="studentId" placeholder="รหัสนักเรียน" maxlength="5">
    <input type="text" id="dailyPin" placeholder="รหัสประจำวัน 6 หลัก" maxlength="6">
    
    <button id="checkinBtn" onclick="processCheckin()">ยืนยันการเช็คอิน</button>
    <div id="status">ระบบพร้อมใช้งาน</div>
</div>

<script>
    // 🔗 เชื่อมโยงกับ URL Web App ของคุณแล้ว
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwLaXKJJemWYXOCSy4ytU3qGf9bpoX0qJ0f0cPMKYwyuFHxkSCrq-kmPV2QssQHDaVvDA/exec"; 
    
    const SCHOOL_LAT = 15.562072; 
    const SCHOOL_LNG = 102.413097; 
    const ALLOWED_RADIUS = 50; // รัศมี 50 เมตร

    const statusEl = document.getElementById('status');
    const checkinBtn = document.getElementById('checkinBtn');

    async function processCheckin() {
        const studentId = document.getElementById('studentId').value.trim();
        const dailyPin = document.getElementById('dailyPin').value.trim().toUpperCase();
        const today = new Date().toLocaleDateString();

        if (!studentId || !dailyPin || dailyPin.length !== 6) {
            statusEl.innerText = "❌ กรุณากรอกรหัสนักเรียนและรหัส 6 หลักให้ครบ";
            statusEl.className = "";
            return;
        }

        if (localStorage.getItem('checkin_date') === today) {
            statusEl.innerText = "❌ มือถือเครื่องนี้เช็คอินไปแล้วในวันนี้";
            statusEl.className = "";
            return;
        }

        statusEl.innerText = "📍 กำลังตรวจสอบ GPS...";
        statusEl.className = "";
        checkinBtn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => sendDataToGAS(position, studentId, dailyPin, today),
                (error) => {
                    statusEl.innerText = "❌ โปรดเปิด GPS และอนุญาตให้เว็บเข้าถึงตำแหน่ง";
                    checkinBtn.disabled = false;
                },
                { enableHighAccuracy: true }
            );
        } else {
            statusEl.innerText = "❌ เบราว์เซอร์ไม่รองรับ GPS";
            checkinBtn.disabled = false;
        }
    }

    function sendDataToGAS(position, studentId, dailyPin, today) {
        const distance = calculateDistance(position.coords.latitude, position.coords.longitude, SCHOOL_LAT, SCHOOL_LNG);

        if (distance > ALLOWED_RADIUS) {
            statusEl.innerText = `❌ คุณอยู่ห่างจุดจอดรถเกินไป (${Math.round(distance)} เมตร)`;
            checkinBtn.disabled = false;
            return;
        }

        statusEl.innerText = "⏳ กำลังบันทึกข้อมูลลงระบบ...";

        // ส่งข้อมูลไปยัง Google Apps Script ด้วยคำสั่ง POST
        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // บังคับเพื่อหลีกเลี่ยงปัญหา CORS บน GAS
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                'studentId': studentId,
                'pin': dailyPin
            })
        })
        .then(() => {
            // เนื่องจากโหมด no-cors จะไม่สามารถอ่านข้อความตอบกลับได้ 
            // แต่ถ้า fetch สำเร็จ (ไม่ catch error) หมายถึงข้อมูลเข้าเซิร์ฟเวอร์แล้ว
            statusEl.innerText = "🎉 เช็คอินสำเร็จเรียบร้อย!";
            statusEl.className = "success";
            localStorage.setItem('checkin_date', today); // ล็อคมือถือเครื่องนี้
        })
        .catch(err => {
            statusEl.innerText = "❌ เกิดข้อผิดพลาดในระบบการส่งข้อมูล";
            checkinBtn.disabled = false;
        });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
        const dp = (lat2 - lat1) * Math.PI / 180; const dl = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
    }
</script>
</body>
</html>
