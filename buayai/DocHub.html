<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาและคลังข้อมูล</title>
    <!-- นำเข้าฟอนต์ TH Sarabun -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-light: #475569;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            font-size: 18px; /* ปรับขนาดอักษรให้อ่านง่ายสำหรับผู้ใช้งานทั่วไป */
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding: 16px 0;
        }

        header h1 {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        header p {
            font-size: 18px;
            color: var(--text-light);
        }

        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--primary-color);
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .thumbnail-area {
            width: 80px;
            height: 80px;
            background-color: #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .thumbnail-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-area {
            flex-grow: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 16px;
            color: var(--text-light);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background-color: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-download {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }

        .loading, .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ระบบคลังข้อมูลเอกสาร</h1>
        <p>ค้นหาและดาวน์โหลดไฟล์โดยไม่ต้องเข้าสู่ระบบ</p>
    </header>

    <input type="text" id="searchInput" class="search-box" placeholder="พิมพ์ชื่อเอกสาร หรือหมวดหมู่..." oninput="filterFiles()">

    <div id="loadingStatus" class="loading">กำลังเชื่อมต่อฐานข้อมูล...</div>
    <div id="fileList" class="file-list"></div>
</div>

<script>
    // ---------------------------------------------------------
    // กรุณานำ Web App URL ที่ได้จาก Google Apps Script มาใส่ที่นี่
    // ---------------------------------------------------------
    const API_URL = 'https://script.google.com/macros/s/AKfycbzKM21-tmzCSuuIAPMG8pXkNvOak6SHb5IAf2FO6vmShDMs3LQu8wYj9NBvDVH2dGNR/exec';
    
    let allFiles = [];

    async function fetchFiles() {
        try {
            const response = await fetch(API_URL);
            allFiles = await response.json();
            
            // เรียงลำดับไฟล์ล่าสุดขึ้นก่อน
            allFiles.reverse();
            
            document.getElementById('loadingStatus').style.display = 'none';
            renderFiles(allFiles);
        } catch (error) {
            document.getElementById('loadingStatus').innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
            console.error(error);
        }
    }

    function renderFiles(files) {
        const listContainer = document.getElementById('fileList');
        listContainer.innerHTML = '';

        if(files.length === 0) {
            listContainer.innerHTML = '<div class="no-data">ไม่พบข้อมูลเอกสาร</div>';
            return;
        }

        files.forEach(file => {
            const card = document.createElement('div');
            card.className = 'file-card';
            
            // ใช้เทคนิคการดึง Thumbnail จาก Google Drive โดยตรง
            const thumbnailUrl = `https://drive.google.com/thumbnail?id=${file.fileId}&sz=w200`;
            const downloadUrl = `https://drive.google.com/uc?export=download&id=${file.fileId}`;

            card.innerHTML = `
                <div class="thumbnail-area">
                    <img src="${thumbnailUrl}" alt="Preview" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%2394a3b8\' stroke-width=\'2\'><path d=\'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\'/><polyline points=\'14 2 14 8 20 8\'/></svg>'">
                </div>
                <div class="info-area">
                    <div class="file-name" title="${file.name}">${file.name}</div>
                    <div class="file-meta">
                        <span class="tag">${file.category}</span>
                        <span>ขนาด: ${file.size}</span>
                    </div>
                    <div class="file-meta" style="margin-top: 4px; font-size: 14px;">
                        อัปเดต: ${file.date}
                    </div>
                </div>
                <a href="${downloadUrl}" class="btn-download" target="_blank">ดาวน์โหลด</a>
            `;
            listContainer.appendChild(card);
        });
    }

    function filterFiles() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allFiles.filter(file => 
            file.name.toLowerCase().includes(query) || 
            file.category.toLowerCase().includes(query)
        );
        renderFiles(filtered);
    }

    window.onload = fetchFiles;
</script>

</body>
</html>
