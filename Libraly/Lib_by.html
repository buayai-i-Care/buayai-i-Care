<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงชื่อเข้าใช้ห้องสมุดมีชีวิต - โรงเรียนบัวใหญ่</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2e7d32; /* เขียวหลัก */
            --primary-hover: #1b5e20;
            --bg-color: #f1f8e9; /* เขียวอ่อนพื้นหลัง */
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #a5d6a7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(76, 175, 80, 0.1), transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            position: relative;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            /* เพิ่มกรอบบางๆ และเงาที่เข้มและกว้างขึ้นเพื่อให้ดูลอยจากพื้นหลัง */
            border: 1px solid rgba(46, 125, 50, 0.2);
            box-shadow: 0 20px 40px rgba(46, 125, 50, 0.15), 0 5px 15px rgba(0,0,0,0.05);
            padding: 40px 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border-top: 6px solid var(--primary-color);
            /* เพิ่มอนิเมชันเด้งขึ้นมาตอนโหลดหน้าเว็บ */
            animation: popUpBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0; /* ซ่อนไว้ก่อนให้แอนิเมชันทำงาน */
        }

        /* กำหนดการเคลื่อนไหวของการเด้ง (Bounce) */
        @keyframes popUpBounce {
            0% { 
                transform: translateY(50px) scale(0.9); 
                opacity: 0; 
            }
            100% { 
                transform: translateY(0) scale(1); 
                opacity: 1; 
            }
        }

        .logo { width: 110px; margin-bottom: 20px; object-fit: contain; }
        
        h2 { color: var(--primary-color); font-weight: 700; font-size: 28px; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 16px; margin-bottom: 30px; }

        .input-wrapper { margin-bottom: 25px; text-align: left; }
        .input-wrapper label {
            display: block; font-weight: 600; color: var(--primary-color);
            margin-bottom: 8px; font-size: 16px;
        }
        
        input[type="text"], input[type="password"] {
            width: 100%; padding: 15px; border: 2px solid var(--border-color);
            border-radius: 12px; font-family: 'Sarabun', sans-serif;
            font-size: 18px; outline: none; transition: border-color 0.3s;
            text-align: center;
        }
        input[type="text"]:focus, input[type="password"]:focus { border-color: var(--primary-color); }

        .btn {
            background-color: var(--primary-color); color: white; border: none;
            padding: 16px; width: 100%; border-radius: 12px; font-size: 20px;
            font-family: 'Sarabun', sans-serif; font-weight: 600; cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background-color: #9e9e9e; cursor: not-allowed; }

        .admin-btn {
            position: absolute; top: 15px; right: 15px;
            background-color: rgba(46, 125, 50, 0.1); color: var(--primary-color);
            border: 1px solid var(--border-color); padding: 6px 12px;
            border-radius: 8px; font-size: 14px; font-family: 'Sarabun', sans-serif;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .admin-btn:hover { background-color: var(--primary-color); color: white; }

        /* Toast Notification (แทน alert) */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background-color: var(--card-bg); padding: 15px 25px; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); font-weight: 600; font-size: 16px;
            display: flex; align-items: center; gap: 10px; z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 5px solid;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-left-color: #4caf50; color: #2e7d32; }
        .toast.error { border-left-color: #f44336; color: #c62828; }

        /* Modal (แทน prompt) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); display: none;
            justify-content: center; align-items: center; z-index: 999;
            backdrop-filter: blur(3px); opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content {
            background: white; padding: 30px; border-radius: 15px;
            width: 90%; max-width: 350px; text-align: center;
            transform: scale(0.9); transition: transform 0.3s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-content h3 { color: var(--primary-color); margin-bottom: 20px; font-size: 22px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { 
            flex: 1; padding: 10px; border-radius: 8px; border: none; 
            font-family: 'Sarabun', sans-serif; font-size: 16px; cursor: pointer; font-weight: 600;
        }
        .modal-btn.cancel { background: #e0e0e0; color: #333; }
        .modal-btn.confirm { background: var(--primary-color); color: white; }

        /* Spinner for loading state */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top: 3px solid white; width: 20px; height: 20px;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- ปุ่มสำหรับแอดมินมุมขวาบน -->
    <button class="admin-btn" onclick="openAdminModal()">สำหรับเจ้าหน้าที่</button>

    <!-- ระบบแจ้งเตือน (Toast) -->
    <div id="toastMessage" class="toast">
        <span id="toastIcon">✓</span>
        <span id="toastText">ข้อความแจ้งเตือน</span>
    </div>

    <!-- หน้าต่างรหัสผ่านแอดมิน (Modal) -->
    <div id="adminModal" class="modal-overlay">
        <div class="modal-content">
            <h3>จัดการระบบ (Admin)</h3>
            <input type="password" id="adminPassword" placeholder="กรอกรหัสผ่าน">
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="closeAdminModal()">ยกเลิก</button>
                <button class="modal-btn confirm" onclick="verifyAdmin()">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <!-- Modal ยืนยันข้อมูลนักเรียนก่อนเข้าใช้งาน (Custom Modal) -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 380px;">
            <h3 style="margin-bottom: 20px; font-size: 22px;">ข้อมูลผู้ใช้ห้องสมุด</h3>
            <!-- ส่วนแสดงรูปภาพโปรไฟล์ -->
            <div style="width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; overflow: hidden; border: 4px solid var(--primary-color); box-shadow: 0 8px 16px rgba(0,0,0,0.1);">
                <img id="confirmImg" src="" alt="Profile" style="width: 100%; height: 100%; object-fit: cover; background-color: #f1f8e9;" onerror="this.src='https://placehold.co/140x140/e8f5e9/2e7d32?text=No+Photo'">
            </div>
            <!-- ส่วนแสดงชื่อและชั้น -->
            <h4 id="confirmName" style="color: var(--text-main); font-size: 24px; margin-bottom: 5px; font-weight: 700;">ชื่อ - สกุล</h4>
            <p id="confirmClass" style="color: var(--primary-color); font-size: 18px; margin-bottom: 25px; font-weight: 600;">ชั้นเรียน</p>
            
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="closeConfirmModal()">กลับไปแก้ไข</button>
                <button class="modal-btn confirm" id="realSubmitBtn" onclick="executeCheckIn()" style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                    <span id="realBtnText">เข้าใช้งานห้องสมุด</span>
                    <div class="spinner" id="realBtnSpinner" style="display: none; width: 16px; height: 16px; border-width: 2px;"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- Card หลักสำหรับลงชื่อเข้าใช้ -->
    <div class="card">
        <img src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w400" alt="ตราโรงเรียนบัวใหญ่" class="logo">
        <h2>ระบบลงชื่อเข้าใช้ห้องสมุดมีชีวิต</h2>
        <p class="subtitle">โรงเรียนบัวใหญ่</p>

        <div class="input-wrapper">
            <label for="studentId">รหัสประจำตัวนักเรียน</label>
            <input type="text" id="studentId" placeholder="เช่น 12345" autocomplete="off" inputmode="numeric">
        </div>

        <button class="btn" id="submitBtn" onclick="verifyStudent()">
            <span id="btnText">เข้าใช้ห้องสมุด</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>
    </div>

    <script>
        
        // -------------------------------------------------------------
        // สำคัญมาก: เปลี่ยน URL ด้านล่างเป็น Web App URL ของคุณที่ได้จากการ Deploy GAS
        // -------------------------------------------------------------
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwDD_CicwvwClg1XpM6BF23RlW4TpiFrb4SFddc_9c-hW1vGgBz3AL0Dpkqi_OjNQkg/exec"; 
        
        // รหัสผ่าน 'by44' ที่เข้ารหัส Base64 แล้ว
        const ADMIN_CODE_B64 = "Ynk0NA==";


        // ฟังก์ชันแสดงการแจ้งเตือน (Toast)
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toastMessage');
            const toastText = document.getElementById('toastText');
            const toastIcon = document.getElementById('toastIcon');
            
            toast.className = `toast ${type}`;
            toastText.textContent = message;
            toastIcon.textContent = type === 'success' ? '✓' : '✕';
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // จัดการ Modal แอดมิน
        function openAdminModal() {
            document.getElementById('adminModal').classList.add('active');
            document.getElementById('adminPassword').value = "";
            document.getElementById('adminPassword').focus();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }


        // ตรวจสอบรหัสผ่านแอดมิน
        function verifyAdmin() {
            const pass = document.getElementById('adminPassword').value;
            if(!pass) {
                showToast("กรุณากรอกรหัสผ่าน", "error");
                return;
            }

            // แปลงรหัสที่พิมพ์เป็น Base64 แล้วเทียบกับตัวแปรคงที่
            if(btoa(pass) === ADMIN_CODE_B64) {
                closeAdminModal();
                showToast("เข้าสู่ระบบแอดมินสำเร็จ", "success");
                
                // บันทึกสถานะการล็อกอินไว้ใน Session (เพื่อให้หน้า Dashboard รู้ว่าล็อกอินแล้ว)
                sessionStorage.setItem('isAdmin', 'true');
                
                // นำทางไปยังหน้า Dashboard
                setTimeout(() => {
                    window.location.href = "dashboardLib.html";
                }, 1000);
            } else {
                showToast("รหัสผ่านไม่ถูกต้อง", "error");
                document.getElementById('adminPassword').value = "";
            }
        }

        // --- ระบบแคชข้อมูลนักเรียนเพื่อความรวดเร็วระดับเสี้ยววินาที ---
        let studentsDB = {};
        
        // ให้หน้าเว็บโหลดรายชื่อเด็กรอไว้เบื้องหลังทันทีที่เปิดเว็บ
        window.addEventListener('load', async () => {
            if(!WEB_APP_URL.includes("YOUR_DEPLOYMENT_ID")) {
                try {
                    const response = await fetch(`${WEB_APP_URL}?action=getAllStudents`);
                    const data = await response.json();
                    if(data.status === "success") {
                        studentsDB = data.data;
                    }
                } catch(e) { console.warn("โหลดแคชเบื้องหลังไม่สำเร็จ ให้ดึงข้อมูลแบบปกติแทน", e); }
            } else {
                // ข้อมูลจำลองสำหรับการทดสอบ
                studentsDB = { 
                    "12345": { name: "เด็กชาย สมหมาย รักเรียน", class: "ม.1/1", image: "https://placehold.co/140x140/4caf50/ffffff?text=SM" },
                    "54321": { name: "นางสาว ใจดี มีสุข", class: "ม.6/2", image: "" }
                };
            }
        });

        // ตัวแปรเก็บข้อมูลชั่วคราวสำหรับเตรียมส่งไป Backend
        let currentStudentData = { id: "", name: "", class: "" };

        // 1. ฟังก์ชันค้นหาข้อมูลและแสดง Modal โชว์รูป/ชื่อ (แทนที่การเซฟทันที)
        async function verifyStudent() {
            const idInput = document.getElementById('studentId');
            const studentId = idInput.value.trim();

            if (!studentId) {
                showToast("กรุณากรอกรหัสประจำตัวนักเรียน", "error");
                idInput.focus();
                return;
            }

            // แสดงสถานะกำลังค้นหา กรณีที่แคชยังโหลดไม่เสร็จ
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = true;
            btnText.textContent = "กำลังค้นหา...";
            btnSpinner.style.display = "block";

            // ค้นหาในตัวแปรแคชก่อน (เร็วกว่า 0.01 วินาที)
            let student = studentsDB[studentId];
            
            // ถ้าระบบเพิ่งเปิดและแคชยังโหลดไม่เสร็จ หรือหาไม่พบ ให้ลองดึงจาก Backend สดๆ 1 ครั้ง
            if (!student && !WEB_APP_URL.includes("YOUR_DEPLOYMENT_ID")) {
                try {
                    const response = await fetch(`${WEB_APP_URL}?action=getStudent&studentId=${studentId}`);
                    const data = await response.json();
                    if (data.status === "success" && data.data) {
                        student = data.data;
                        studentsDB[studentId] = student; // อัปเดตลงแคชเผื่อใช้ครั้งต่อไป
                    }
                } catch(e) { console.warn("ไม่สามารถดึงข้อมูลรายบุคคลได้", e); }
            }

            // คืนสถานะปุ่มกลับมา
            btn.disabled = false;
            btnText.textContent = "ตรวจสอบข้อมูล";
            btnSpinner.style.display = "none";

            if (student) {
                currentStudentData = { id: studentId, name: student.name, class: student.class };
                showConfirmModal(student.name, student.class, student.image);
            } else {
                currentStudentData = { id: studentId, name: "", class: "" };
                showConfirmModal("ไม่พบรายชื่อในระบบ", "ตรวจสอบรหัสอีกครั้ง หรือบันทึกเป็นผู้ใช้ใหม่", "");
            }
        }

        // จัดการหน้าต่าง Custom Modal
        function showConfirmModal(name, className, imgUrl) {
            document.getElementById('confirmName').textContent = name;
            
            // ปรับสีข้อความเตือนถ้าไม่พบรหัส
            const classEl = document.getElementById('confirmClass');
            classEl.textContent = name === "ไม่พบรายชื่อในระบบ" ? className : `ชั้น ${className}`;
            classEl.style.color = name === "ไม่พบรายชื่อในระบบ" ? "#f44336" : "var(--primary-color)";

            const imgEl = document.getElementById('confirmImg');
            
            // --- เพิ่มระบบป้องกันและแปลงลิงก์ภาพแบบอัตโนมัติ ---
            let finalImgUrl = imgUrl;
            if (finalImgUrl && finalImgUrl.includes('drive.google.com')) {
                // ถ้าเป็นลิงก์ Google Drive ทุกรูปแบบ ให้ดึงเฉพาะ ID มาทำเป็น Thumbnail
                const match = finalImgUrl.match(/[-\w]{25,}/);
                if (match) {
                    finalImgUrl = `https://drive.google.com/thumbnail?id=${match[0]}&sz=w400`;
                }
            }

            if (finalImgUrl && finalImgUrl.startsWith('http')) {
                imgEl.src = finalImgUrl;
            } else {
                imgEl.src = `https://placehold.co/140x140/e8f5e9/2e7d32?text=Photo`;
            }

            document.getElementById('confirmModal').classList.add('active');
            
            // เตรียมให้กดปุ่ม Enter ซ้ำเพื่อบันทึกได้อย่างไหลลื่น
            setTimeout(() => { document.getElementById('realSubmitBtn').focus(); }, 100);
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            document.getElementById('studentId').focus();
        }

        // 2. ฟังก์ชันส่งข้อมูลเข้าสู่ระบบ Google Apps Script แบบความเร็วสูง
        async function executeCheckIn() {
            const btn = document.getElementById('realSubmitBtn');
            const btnText = document.getElementById('realBtnText');
            const spinner = document.getElementById('realBtnSpinner');
            const idInput = document.getElementById('studentId');

            // เปลี่ยนสถานะปุ่มเป็น กำลังโหลด
            btn.disabled = true;
            btnText.textContent = "กำลังบันทึก...";
            spinner.style.display = "block";

            try {
                if(WEB_APP_URL.includes("YOUR_DEPLOYMENT_ID")) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    showToast("บันทึกข้อมูลเรียบร้อยแล้วครับ (โหมดจำลอง)", "success");
                    closeConfirmModal();
                    idInput.value = "";
                } else {
                    // ส่งข้อมูลทุกอย่างไปให้ Backend เลย (Backend จะได้ไม่ต้องไปงมหาใหม่ ลดเวลารอได้อย่างมาก)
                    const params = new URLSearchParams({
                        action: 'checkin',
                        studentId: currentStudentData.id,
                        name: currentStudentData.name,
                        className: currentStudentData.class
                    });

                    const response = await fetch(`${WEB_APP_URL}?${params.toString()}`, {
                        method: 'GET',
                        mode: 'cors'
                    });
                    
                    const data = await response.json();
                    
                    if(data.status === "success") {
                        showToast(data.message, "success");
                        closeConfirmModal();
                        idInput.value = "";
                    } else {
                        showToast("เกิดข้อผิดพลาด: " + data.message, "error");
                    }
                }
            } catch (error) {
                showToast("การเชื่อมต่อล้มเหลว โปรดตรวจสอบอินเทอร์เน็ต", "error");
                console.error("Error:", error);
            } finally {
                // คืนค่าปุ่มกลับมาเหมือนเดิม
                btn.disabled = false;
                btnText.textContent = "บันทึกเข้าใช้งาน";
                spinner.style.display = "none";
                idInput.focus();
            }
        }

        // รองรับการกดปุ่ม Enter ทั้งขั้นตอนเช็ครหัสและแอดมิน
        document.getElementById('studentId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyStudent();
        });
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyAdmin();
        });
    </script>
</body>
</html>
