<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buayai I Care School ระบบฐานข้อมูลนักเรียน ของระบบช่วยเหลือผู้เรียนดิจิทัล</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           🎮 ธีมสีส้มดุดัน (Dark Amber / Neon Orange)
           ========================================= */
        :root {
            --bg-dark: #1a0500;
            --bg-card: rgba(40, 15, 5, 0.85);
            --primary: #ff6b00;       
            --primary-glow: rgba(255, 107, 0, 0.5);
            --accent: #ffc107;        
            --success: #22c55e;
            --danger: #ef4444;
            --locked: #57534e;
            --cooldown: #f97316;
            --text-main: #fff7ed;
            --text-muted: #fdba74;
            --card-inner: rgba(0,0,0,0.3);
        }

        body { font-family: 'Prompt', sans-serif; background: radial-gradient(circle at top left, #4a1500, #1a0500, #050100); color: var(--text-main); margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* --- View 1: Login --- */
        #login-view { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background: var(--bg-card); backdrop-filter: blur(12px); width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1); padding: 40px 30px; text-align: center; }
        .login-logo { width: 90px; height: 90px; object-fit: contain; border-radius: 50%; background: #fff; padding: 5px; box-shadow: 0 0 20px var(--primary-glow); margin: 0 auto 15px auto; border: 3px solid var(--primary); }
        .login-card h1 { margin: 0 0 5px; color: var(--primary); font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .login-card p { color: var(--text-muted); margin-bottom: 30px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--accent); }
        
        input[type="text"], input[type="password"], input[type="date"], input[type="number"], input[type="tel"], select, textarea {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid #78350f; border-radius: 10px; color: #fff; box-sizing: border-box; font-family: 'Prompt', sans-serif; font-size: 1rem; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); background: rgba(0,0,0,0.6); }
        input:disabled, select:disabled { background: rgba(255,255,255,0.05); color: #64748b; border-color: #1e293b; cursor: not-allowed; }
        
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), #ea580c); color: white; border: none; border-radius: 10px; font-family: 'Prompt', sans-serif; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px var(--primary-glow); margin-top: 20px; }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px var(--primary-glow); }
        .btn-submit:disabled { background: var(--locked); box-shadow: none; cursor: not-allowed; transform: none; }
        
        .btn-draft { background: transparent; border: 2px solid var(--locked); color: var(--text-muted); margin-top: 10px; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-family: 'Prompt'; }
        .btn-draft:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(255,193,7,0.1); }

        /* --- View 2: Dashboard --- */
        #dashboard-view { display: none; min-height: 100vh; }
        .sidebar { width: 300px; background: rgba(26, 5, 0, 0.9); border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; display: flex; flex-direction: column; backdrop-filter: blur(10px); overflow-y: auto; }
        .player-profile { text-align: center; padding-bottom: 20px; border-bottom: 1px dashed #78350f; margin-bottom: 15px; }
        .player-avatar { font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 15px var(--accent); }
        .score-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; border: 1px solid #78350f; margin-top: 10px; }
        .score-box span { display: block; font-size: 1.5rem; color: #ffc107; font-weight: bold; }
        
        .sidebar-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #fff; text-align: left; padding: 12px 15px; font-family: 'Prompt', sans-serif; font-size: 1rem; cursor: pointer; transition: 0.3s; width: 100%; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-btn:hover:not(.locked):not(.cooldown):not(.completed) { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .sidebar-btn.active { background: rgba(255, 193, 7, 0.15); border: 1px solid var(--accent); box-shadow: 0 0 15px rgba(255,193,7,0.2); }
        .sidebar-btn.locked { color: var(--locked); cursor: not-allowed; border-style: dashed; }
        .sidebar-btn.completed { border-color: var(--success); background: rgba(34, 197, 94, 0.05); cursor: not-allowed; }
        .sidebar-btn.cooldown { border-color: var(--cooldown); border-style: dashed; cursor: not-allowed; background: rgba(249, 115, 22, 0.05); }
        
        .main-content { flex: 1; padding: 30px; position: relative; }
        .content-card { background: var(--bg-card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.4s ease-out; position: relative; max-width: 900px; margin: 0 auto; }
        .timer-hud { position: absolute; top: -15px; right: 20px; background: #000; border: 2px solid var(--primary); padding: 5px 20px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); z-index: 10; }

        /* --- 🎯 Layout Elements --- */
        .section-box { border: 1px solid #78350f; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .section-title { color: var(--primary); border-bottom: 1px dashed #78350f; padding-bottom: 10px; margin-top: 0; font-size: 1.3rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        .pill-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .pill-label { display: inline-block; padding: 8px 16px; background: var(--card-inner); border: 1px solid #57534e; border-radius: 20px; cursor: pointer; transition: 0.2s; color: var(--text-muted); font-size: 0.9rem; user-select: none; }
        .pill-label input[type="checkbox"] { display: none; }
        .pill-label:has(input:checked) { background: rgba(255,107,0,0.2); border-color: var(--primary); color: #fff; box-shadow: 0 0 10px rgba(255,107,0,0.3); }

        .file-upload-box { border: 2px dashed #78350f; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; color: var(--text-muted); position: relative; margin-top: 5px; }
        .file-upload-box:hover { border-color: var(--primary); background: rgba(255,107,0,0.1); color: var(--primary); box-shadow: 0 0 15px var(--primary-glow) inset; }
        .file-upload-box.has-file { border-color: var(--success); background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .file-upload-box input[type="file"] { opacity: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }
        
        /* ปุ่ม GPS */
        .btn-gps { background: #1e3a8a; color: white; border: none; padding: 15px; border-radius: 10px; font-family: 'Prompt'; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-gps:hover { background: #2563eb; }

        .classmate-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; padding: 10px; }
        .classmate-card { background: var(--card-inner); border: 1px solid #57534e; border-radius: 10px; padding: 15px; text-align: center; position: relative; }
        .classmate-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid var(--accent); background: #333; }
        .rating-group { display: flex; justify-content: center; gap: 5px; margin-top: 8px; }
        .star-icon, .chili-icon { font-size: 1.2rem; cursor: pointer; filter: grayscale(100%) opacity(0.3); transition: 0.2s; }
        .star-icon.active { filter: grayscale(0%) drop-shadow(0 0 5px gold); }
        .chili-icon.active { filter: grayscale(0%) drop-shadow(0 0 5px red); }
        .btn-hide-card { position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; }
        .scholarship-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; border: 1px solid #57534e; }

        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #280f05; padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--accent); box-shadow: 0 0 30px rgba(255,193,7,0.4); max-width: 500px; width: 90%; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @media (max-width: 768px) { #dashboard-view { flex-direction: column; } .sidebar { width: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); max-height: 40vh; } .main-content { padding: 15px; } .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- [ View 1: Login ] -->
    <div id="login-view">
        <div class="login-card">
            <img src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w200" alt="โลโก้" class="login-logo">
            <h1>เข้าสู่ระบบยืนยันข้อมูลหลัก ของระบบดูแลช่วยเหลือผู้เรียนดิจิทัลโรงเรียนบัวใหญ่</h1>
            <p>Buayai I Care School องค์การบริหารส่วนจังหวัดนครราชสีมา</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group"><label>รหัสประจำตัวนักเรียน</label><input type="text" id="studentId" required></div>
                <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="password" required></div>
                <button type="submit" id="loginBtn" class="btn-submit">เริ่มกิจกรรม 🚀</button>
                <div id="error-msg" style="color:var(--danger); margin-top:10px;"></div>
            </form>
        </div>
    </div>

    <!-- [ View 2: Dashboard ] -->
    <div id="dashboard-view">
        <div class="sidebar">
            <div class="player-profile">
                <div class="player-avatar">🧑‍🚀</div>
                <h3 style="margin: 0; color: var(--accent);">รหัสประจำตัวนักเรียน: <span id="display-studentId">-</span></h3>
                <div class="score-box"><small>แต้มสะสมการร่วมกิจกรรม</small><span id="display-score">0</span></div>
            </div>
            
            <button class="sidebar-btn active" onclick="loadContent('dashboard', this)" id="btn-dash"><span>📡 หน้าหลักของฐานข้อมูลนักเรียน</span></button>
            <button class="sidebar-btn" onclick="loadContent('mission1', this)" id="btn-m1"><div>🎯 ด่าน 1: ยืนยันตัวตน</div><span class="countdown-text" id="cd-m1"></span><span id="icon-m1">🔓</span></button>
            <button class="sidebar-btn locked" onclick="loadContent('mission2', this)" id="btn-m2"><div>🎯 ด่าน 2: ข้อมูลครอบครัว</div><span class="countdown-text" id="cd-m2"></span><span id="icon-m2">🔒</span></button>
            <button class="sidebar-btn locked" onclick="loadContent('mission3', this)" id="btn-m3"><div>🎯 ด่าน 3: ข้อมูลสุขภาพ</div><span class="countdown-text" id="cd-m3"></span><span id="icon-m3">🔒</span></button>
            <button class="sidebar-btn locked" onclick="loadContent('mission4', this)" id="btn-m4"><div>🎯 ด่าน 4: ข้อมูลสัมพันธภาพ</div><span class="countdown-text" id="cd-m4"></span><span id="icon-m4">🔒</span></button>
            <button class="sidebar-btn locked" onclick="loadContent('mission5', this)" id="btn-m5"><div>🎯 ด่าน 5: ภาพบ้าน (GPS)</div><span class="countdown-text" id="cd-m5"></span><span id="icon-m5">🔒</span></button>
            <button class="sidebar-btn locked" onclick="loadContent('mission6', this)" id="btn-m6"><div>🏆 ด่าน 6: แบบวัด SDQ</div><span class="countdown-text" id="cd-m6"></span><span id="icon-m6">🔒</span></button>
            
            <button class="sidebar-btn" style="margin-top:auto; background:rgba(239,68,68,0.1); color:#fca5a5;" onclick="handleLogout()">🚪 ออกจากระบบ</button>
        </div>

        <div class="main-content">
            <div class="content-card" id="dynamic-content-area"></div>
        </div>
    </div>

    <!-- [ Modal ] -->
    <div id="custom-modal">
        <div class="modal-content">
            <div style="font-size: 4rem; margin-bottom: 10px;" id="modal-icon">🎉</div>
            <h2 id="modal-heading">--ผ่านด่าน--</h2>
            <div id="modal-text" style="font-size: 1rem; margin-bottom: 20px; line-height: 1.6;"></div>
            <div id="score-container" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <h3 style="margin:0; color:#ffc107;">+ <span id="modal-score">0</span> แต้มสะสมการร่วมกิจกรรมของทางโรงเรียน</h3>
            </div>
            <button class="btn-submit" onclick="closeModalAndGoNext()">ดำเนินการต่อ ➔</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ การตั้งค่าระบบ
        // ==========================================
        // *** เปลี่ยน URL ตรงนี้เป็น URL ที่ได้จากการ Deploy ของคุณ ***
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwnlY8cUvwYw_J6QiBhuP5Cm0ens7fSBq8GBVl7AVjU-07gyK_NiRauF8kFK1ymcb-y8w/exec';
        const DEV_MODE = true; 
        const COOLDOWN_MS = DEV_MODE ? (1 * 60 * 1000) : (2 * 24 * 60 * 60 * 1000); 

        let playerState = {
            score: 0,
            missions: { 
                m1: { status: 'unlocked', unlocksAt: 0 },
                m2: { status: 'locked', unlocksAt: 0 },
                m3: { status: 'locked', unlocksAt: 0 },
                m4: { status: 'locked', unlocksAt: 0 },
                m5: { status: 'locked', unlocksAt: 0 },
                m6: { status: 'locked', unlocksAt: 0 }
            }
        };

        let m4State = { scholarships: [], friendsRatings: {} };
        let missionTimer = null, mainGameLoop = null, secondsElapsed = 0, currentMission = '';
        let cachedStudentData = null, cachedClassmates = [];

        window.onload = () => {
            const savedState = localStorage.getItem('playerState');
            if(savedState) playerState = JSON.parse(savedState);
            if (localStorage.getItem('isLoggedIn') === 'true') showDashboardView();
        };

        function savePlayerState() { localStorage.setItem('playerState', JSON.stringify(playerState)); updateSidebarUI(); }

        // ==========================================
        // 💡 ระบบแสดงผลเมื่อผู้ใช้เลือกไฟล์รูปภาพ (UX Fix)
        // ==========================================
        document.addEventListener('change', function(e) {
            if(e.target.type === 'file' && e.target.parentElement.classList.contains('file-upload-box')) {
                const box = e.target.parentElement;
                const span = box.querySelector('span');
                if(e.target.files.length > 0) {
                    const fileName = e.target.files[0].name;
                    span.innerHTML = `✅ เลือกไฟล์สำเร็จ<br><small style="color: #fff; font-weight: normal;">${fileName}</small>`;
                    box.classList.add('has-file');
                } else {
                    span.innerHTML = `คลิกเลือกรูปถ่าย 📂`;
                    box.classList.remove('has-file');
                }
            }
        });

        // ==========================================
        // 🔐 Login & Auth
        // ==========================================
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn'), msg = document.getElementById('error-msg');
            const stuId = document.getElementById('studentId').value.trim(), pass = document.getElementById('password').value.trim();
            btn.disabled = true; btn.textContent = 'CONNECTING... ⏳'; msg.textContent = '';
            try {
                const data = await fetchAPI('login', { studentId: stuId, password: pass });
                if (data.status === 'success') {
                    localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('studentId', data.data.studentId);
                    showDashboardView();
                } else throw new Error(data.message || 'รหัสไม่ถูกต้อง');
            } catch (error) { msg.textContent = `❌ ${error.message}`; btn.disabled = false; btn.textContent = 'START MISSION 🚀'; }
        }

        async function showDashboardView() {
            document.getElementById('login-view').style.display = 'none'; 
            document.getElementById('dashboard-view').style.display = 'flex';
            document.getElementById('display-studentId').textContent = localStorage.getItem('studentId');
            
            const area = document.getElementById('dynamic-content-area');
            area.innerHTML = `<div style="text-align:center; padding:50px;">📡 กำลังกู้คืนสถานะตัวละครและข้อมูลเก่า...</div>`;

            try {
                const res = await fetchAPI('getData', { studentId: localStorage.getItem('studentId') });
                if(res.status === 'success' && res.studentData) { 
                    cachedStudentData = res.studentData; 
                    cachedClassmates = res.classmates || [];
                    syncProgress(res.studentData);
                }
            } catch (err) { console.error(err); }

            updateSidebarUI(); startGameLoop(); loadContent('dashboard', document.getElementById('btn-dash'));
        }

        function handleLogout() { localStorage.clear(); location.reload(); }

        function syncProgress(sd) {
            let u = false;
            if (sd.citizenId && sd.fullName && playerState.missions.m1.status !== 'completed') {
                playerState.missions.m1.status = 'completed'; u = true;
                if (playerState.missions.m2.status === 'locked') playerState.missions.m2.status = 'unlocked';
            }
            if (sd.guardianName && sd.guardianPhone && playerState.missions.m2.status !== 'completed') {
                playerState.missions.m2.status = 'completed'; u = true;
                if (playerState.missions.m3.status === 'locked') playerState.missions.m3.status = 'unlocked';
            }
            if (sd.weight && sd.height && playerState.missions.m3.status !== 'completed') {
                playerState.missions.m3.status = 'completed'; u = true;
                if (playerState.missions.m4.status === 'locked') playerState.missions.m4.status = 'unlocked';
            }
            if (sd.preferencesJson && playerState.missions.m4.status !== 'completed') {
                playerState.missions.m4.status = 'completed'; u = true;
                if (playerState.missions.m5.status === 'locked') playerState.missions.m5.status = 'unlocked';
            }
            // ปลดล็อกด่าน 6 เมื่อทำด่าน 5 เสร็จ (อิงจาก housingStatus)
            if (sd.housingStatus && playerState.missions.m5.status !== 'completed') {
                playerState.missions.m5.status = 'completed'; u = true;
                if (playerState.missions.m6.status === 'locked') playerState.missions.m6.status = 'unlocked';
            }
            if(u) savePlayerState();
        }

        function startGameLoop() {
            if(mainGameLoop) clearInterval(mainGameLoop);
            mainGameLoop = setInterval(() => {
                let now = Date.now(), u = false;
                for (let i = 1; i <= 6; i++) {
                    let mId = 'm'+i, m = playerState.missions[mId], el = document.getElementById('cd-'+mId);
                    if (m.status === 'cooldown') {
                        let diff = m.unlocksAt - now;
                        if (diff <= 0) { m.status = 'unlocked'; el.textContent = ''; u = true; }
                        else {
                            let mins = Math.floor(diff/1000/60), secs = Math.floor((diff/1000)%60);
                            el.textContent = `⏳ ${mins}:${secs.toString().padStart(2,'0')}`;
                        }
                    }
                }
                if(u) savePlayerState();
            }, 1000);
        }

        function updateSidebarUI() {
            document.getElementById('display-score').textContent = playerState.score.toLocaleString();
            for (let i = 1; i <= 6; i++) {
                let mId = 'm'+i, status = playerState.missions[mId].status, btn = document.getElementById('btn-'+mId), icon = document.getElementById('icon-'+mId);
                btn.className = 'sidebar-btn';
                if (status === 'locked') { btn.classList.add('locked'); icon.textContent = '🔒'; }
                else if (status === 'unlocked') { icon.textContent = '🔓'; }
                else if (status === 'completed') { btn.classList.add('completed'); icon.textContent = '✅'; }
                else if (status === 'cooldown') { btn.classList.add('cooldown'); icon.textContent = '⏳'; }
            }
        }

        // ==========================================
        // 🌍 ดึงพิกัด GPS และแปลงเป็นที่อยู่ (Reverse Geocoding)
        // ==========================================
        window.getLocation = () => {
            const btn = document.getElementById('btn-gps');
            const latInput = document.getElementById('m5-lat');
            const lngInput = document.getElementById('m5-lng');
            btn.textContent = 'กำลังค้นหาสัญญาณดาวเทียม... 🛰️';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        latInput.value = lat;
                        lngInput.value = lng;

                                    <label>📷 3.1 ภาพนักเรียนหน้าบ้าน</label>

                                        <input type="file" id="m5-img1" accept="image/*" required>

                                        <input type="file" id="m5-img2" accept="image/*" required>
                                        <span>คลิกเลือกรูปถ่าย 📂<br><small>(ห้องพัก หรือ บริเวณบ้าน)</small></span>

                        </div>

                        <button type="submit" class="btn-submit">ยืนยันข้อมูลด่าน 5 🏆</button>
                    </form>`;
            }

            startTimer();
        }

        // ==========================================
        // 🧩 Helper Functions (Logical Layer)
        // ==========================================
        function calcBMI() {
            const w = parseFloat(document.getElementById('m3-weight')?.value), h = parseFloat(document.getElementById('m3-height')?.value)/100;
            const res = document.getElementById('bmi-result');
            if(w>0 && h>0) {
                const bmi = (w/(h*h)).toFixed(1); res.style.display='block';
                const valEl = document.getElementById('bmi-val'), labEl = document.getElementById('bmi-label'), advEl = document.getElementById('bmi-adv');
                valEl.textContent = `BMI: ${bmi}`;
                if(bmi < 18.5) { labEl.textContent = "📏 ผอมไปหน่อยนะ"; labEl.style.color="#38bdf8"; advEl.textContent = "🍎 ควรทานอาหารเพิ่ม เสริมโปรตีนและพักผ่อนให้พอครับ"; }
                else if(bmi < 23) { labEl.textContent = "✅ หุ่นดีมาก (ปกติ)"; labEl.style.color="#22c55e"; advEl.textContent = "💪 สุดยอด! ออกกำลังกายรักษาร่างกายแบบนี้ต่อไปนะครับ"; }
                else if(bmi < 25) { labEl.textContent = "⚠️ เริ่มอวบแล้วนะ"; labEl.style.color="#fbbf24"; advEl.textContent = "🏃 ลองขยับร่างกายให้มากขึ้น ลดอาหารหวานมันเค็มดูครับ"; }
                else { labEl.textContent = "🚨 อ้วนเกินเกณฑ์"; labEl.style.color="#ef4444"; advEl.textContent = "🥗 ควรปรึกษาครูหรือแพทย์เรื่องโภชนาการ และออกกำลังกายเบาๆ ครับ"; }
            }
        }

        function getDriveThumb(url) {
            const match = url?.match(/[-\w]{25,}/);
            return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=w200` : 'https://via.placeholder.com/80?text=No+Img';
        }

        function renderClassmates() {
            const con = document.getElementById('classmates-container'); if(!con) return;
            if(cachedClassmates.length === 0) { con.innerHTML = "<p>ไม่พบรายชื่อเพื่อน</p>"; return; }
            con.innerHTML = cachedClassmates.map(m => {
                const r = m4State.friendsRatings[m.studentId] || { s:0, c:0 };
                return `
                <div class="classmate-card" id="c-${m.studentId}">
                    <button type="button" class="btn-hide-card" onclick="this.parentElement.style.display='none'">✖</button>
                    <img src="${getDriveThumb(m.profileImageUrl)}" class="classmate-img" onerror="this.src='https://via.placeholder.com/80'">
                    <div style="font-size:0.8rem; font-weight:600;">${m.fullName}</div>
                    <div class="rating-group">${[1,2,3,4,5].map(i => `<span class="star-icon ${i<=r.s?'active':''}" onclick="rate('${m.studentId}','s',${i})">⭐</span>`).join('')}</div>
                    <div class="rating-group">${[1,2,3,4,5].map(i => `<span class="chili-icon ${i<=r.c?'active':''}" onclick="rate('${m.studentId}','c',${i})">🌶️</span>`).join('')}</div>
                </div>`;
            }).join('');
        }

        window.rate = (id, t, v) => {
            if(!m4State.friendsRatings[id]) m4State.friendsRatings[id] = {s:0, c:0};
            m4State.friendsRatings[id][t] = (m4State.friendsRatings[id][t] === v) ? 0 : v;
            renderClassmates();
        };

        window.addSch = () => { m4State.scholarships.push({ n:'', a:'', d:'' }); renderScholarships(); };
        window.remSch = (i) => { m4State.scholarships.splice(i,1); renderScholarships(); };
        function renderScholarships() {
            const con = document.getElementById('scholarships-container'); if(!con) return;
            con.innerHTML = m4State.scholarships.map((s,i) => `
                <div class="scholarship-item">
                    <button type="button" class="btn-hide-card" onclick="remSch(${i})">✖</button>
                    <input type="text" placeholder="ชื่อทุน" value="${s.n}" onchange="m4State.scholarships[${i}].n=this.value">
                    <div class="form-grid" style="margin-top:5px;">
                        <input type="number" placeholder="บาท" value="${s.a}" onchange="m4State.scholarships[${i}].a=this.value">
                        <input type="date" value="${s.d}" onchange="m4State.scholarships[${i}].d=this.value">
                    </div>
                </div>`).join('');
        }

        function toggleTravel() {
            const v = document.getElementById('m4-travel')?.value;
            if(!v) return;
            document.getElementById('travel-A').style.display = v==='A' ? 'block' : 'none';
            document.getElementById('travel-B').style.display = v==='B' ? 'block' : 'none';
        }

        function startTimer() { clearInterval(missionTimer); secondsElapsed=0; missionTimer = setInterval(()=>{
            secondsElapsed++; const el = document.getElementById('mission-timer-display');
            if(el) { let m=Math.floor(secondsElapsed/60), s=secondsElapsed%60; el.textContent=`${m}:${s.toString().padStart(2,'0')}`; }
        },1000); }

        async function fetchAPI(a, p={}) { p.action = a; const r = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(p) }); return await r.json(); }
        
        // ==========================================
        // 📸 ระบบบีบอัดรูปภาพก่อนอัปโหลด (แก้ปัญหา Google Drive Error)
        // ==========================================
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // ปรับลดขนาดความกว้างสูงสุด
                        const MAX_HEIGHT = 800; // ปรับลดขนาดความสูงสูงสุด
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // บีบอัดเป็น JPEG คุณภาพ 70% ลดขนาดไฟล์มหาศาล
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(dataUrl);
                    };
                    img.onerror = (e) => reject(e);
                };
                reader.onerror = (e) => reject(e);
            });
        }

        // ==========================================
        // 💾 Submit Logic
        // ==========================================
        async function submitMission(e, num) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]'); btn.disabled=true; btn.textContent='UPLOADING...';
            let p = { studentId: localStorage.getItem('studentId'), mission: String(num) };
            
            try {
                if(num === 1) {
                    p.citizenId = document.getElementById('m1-citizenId').value;
                    p.fullName = document.getElementById('m1-fullName').value;
                    p.birthDate = document.getElementById('m1-birth').value;
                    p.religion = document.getElementById('m1-religion').value;
                    if(document.getElementById('m1-img').files.length > 0) {
                        p.profileImageBase64 = await getBase64(document.getElementById('m1-img').files[0]);
                    }
                } else if(num === 2) {
                    p.fatherName = document.getElementById('m2-fatherName').value;
                    p.motherName = document.getElementById('m2-motherName').value;
                    p.guardianName = document.getElementById('m2-guardianName').value;
                    p.studentPhone = document.getElementById('m2-stuPhone').value;
                    p.guardianPhone = document.getElementById('m2-guardPhone').value;
                    if(document.getElementById('m2-sign').files.length > 0) {
                        p.guardianSignatureBase64 = await getBase64(document.getElementById('m2-sign').files[0]);
                    }
                } else if(num === 3) {
                    p.weight = document.getElementById('m3-weight').value;
                    p.height = document.getElementById('m3-height').value;
                    p.medicalCondition = JSON.stringify({
                        status: document.getElementById('m3-status').value,
                        acc: document.getElementById('m3-acc').value, accDate: document.getElementById('m3-acc-date').value,
                        ill: document.getElementById('m3-ill').value, illDate: document.getElementById('m3-ill-date').value
                    });
                } else if(num === 4) {
                    p.preferencesJson = JSON.stringify({
                        subs: Array.from(document.querySelectorAll('#m4-subs input:checked')).map(x=>x.value),
                        acts: Array.from(document.querySelectorAll('#m4-acts input:checked')).map(x=>x.value),
                        color: document.getElementById('m4-color').value,
                        career: document.getElementById('m4-career').value,
                        scholarships: m4State.scholarships,
                        dist: document.getElementById('m4-dist').value,
                        travel: document.getElementById('m4-travel').value
                    });
                    p.friendsJson = JSON.stringify(m4State.friendsRatings);
                } else if(num === 5) {
                    p.lat = document.getElementById('m5-lat').value;
                    p.lng = document.getElementById('m5-lng').value;
                    
                    let hNo = document.getElementById('m5-houseno').value.trim();
                    let sub = document.getElementById('m5-subdistrict').value.trim();
                    let dist = document.getElementById('m5-district').value.trim();
                    let prov = document.getElementById('m5-province').value.trim();
                    p.fullAddress = `${hNo} ต.${sub} อ.${dist} จ.${prov}`;
                    
                    p.housingStatus = document.getElementById('m5-housing').value;
                    p.homeImg1Base64 = await getBase64(document.getElementById('m5-img1').files[0]);
                    p.homeImg2Base64 = await getBase64(document.getElementById('m5-img2').files[0]);
                }

                const res = await fetchAPI('saveData', p);
                if(res.status !== 'success') throw new Error(res.message);

                let baseScore = (num === 5) ? 2000 : 1500;
                playerState.score += (baseScore - (secondsElapsed * 2));
                playerState.missions['m'+num].status = 'completed';
                
                let next = num+1; 
                if(playerState.missions['m'+next]) {
                    playerState.missions['m'+next].status = 'cooldown';
                    playerState.missions['m'+next].unlocksAt = Date.now() + COOLDOWN_MS;
                }
                savePlayerState();

                let waitStr = DEV_MODE ? "1 นาที" : "2 วัน";
                let prepStr = "เตรียมรายชื่อเพื่อนและสีที่ชอบ";
                if(num === 1) prepStr = "เตรียมเบอร์โทรศัพท์ 10 หลักและภาพถ่ายผู้ปกครอง";
                if(num === 2) prepStr = "เตรียมข้อมูลน้ำหนักและส่วนสูงล่าสุด";
                if(num === 3) prepStr = "เตรียมรายชื่อเพื่อนและข้อมูลทุนการศึกษา";
                if(num === 4) prepStr = "เตรียมเปิด GPS บนมือถือ และถ่ายรูปหน้าบ้าน/ในบ้าน";
                if(num === 5) prepStr = "เตรียมทำแบบประเมิน SDQ เพื่อดูจุดแข็งจุดอ่อน";

                document.getElementById('modal-text').innerHTML = `
                    ภารกิจด่านที่ ${num} บันทึกสำเร็จแล้ว!<br>
                    ด่านถัดไปจะเปิดในอีก <b>${waitStr}</b> ⏳<br><br>
                    <div style="background:rgba(255,107,0,0.1); padding:10px; border-radius:5px; text-align:left;">
                        💡 <b>ภารกิจต่อไป:</b> ${prepStr}
                    </div>
                `;
                document.getElementById('modal-score').textContent = baseScore.toLocaleString();
                document.getElementById('custom-modal').style.display='flex';
            } catch(err) { alert("Error: " + err.message); btn.disabled=false; btn.textContent='ลองใหม่อีกครั้ง'; }
        }

        function closeModalAndGoNext() { document.getElementById('custom-modal').style.display='none'; showDashboardView(); }
    </script>
