<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buayai I Care - Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           🎮 ธีมสีส้มดุดัน (Dark Amber / Neon Orange)
           ========================================= */
        :root {
            --bg-dark: #1a0500;
            --bg-card: rgba(40, 15, 5, 0.85);
            --primary: #ff6b00;       
            --primary-glow: rgba(255, 107, 0, 0.5);
            --accent: #ffc107;        
            --success: #22c55e;
            --danger: #ef4444;
            --locked: #57534e;
            --cooldown: #f97316;
            --text-main: #fff7ed;
            --text-muted: #fdba74;
            --card-inner: rgba(0,0,0,0.3);
        }

        body { font-family: 'Prompt', sans-serif; background: radial-gradient(circle at top left, #4a1500, #1a0500, #050100); color: var(--text-main); margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* --- View 1: Login --- */
        #login-view { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background: var(--bg-card); backdrop-filter: blur(12px); width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1); padding: 40px 30px; text-align: center; }
        .login-logo { width: 90px; height: 90px; object-fit: contain; border-radius: 50%; background: #fff; padding: 5px; box-shadow: 0 0 20px var(--primary-glow); margin: 0 auto 15px auto; border: 3px solid var(--primary); }
        .login-card h1 { margin: 0 0 5px; color: var(--primary); font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .login-card p { color: var(--text-muted); margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--accent); }
        
        input[type="text"], input[type="password"], input[type="date"], input[type="number"], input[type="tel"], select, textarea {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid #78350f; border-radius: 10px; color: #fff; box-sizing: border-box; font-family: 'Prompt', sans-serif; font-size: 1rem; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); background: rgba(0,0,0,0.6); }
        input:disabled, select:disabled { background: rgba(255,255,255,0.05); color: #64748b; border-color: #1e293b; cursor: not-allowed; }
        input[type="color"] { padding: 5px; height: 50px; cursor: pointer; }
        
        .file-upload-box { border: 2px dashed #78350f; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; color: var(--text-muted); position: relative; }
        .file-upload-box:hover { border-color: var(--primary); background: rgba(255,107,0,0.1); color: var(--primary); box-shadow: 0 0 15px var(--primary-glow) inset; }
        .file-upload-box input[type="file"] { opacity: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }

        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), #ea580c); color: white; border: none; border-radius: 10px; font-family: 'Prompt', sans-serif; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px var(--primary-glow); margin-top: 20px; }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px var(--primary-glow); }
        .btn-submit:disabled { background: var(--locked); box-shadow: none; cursor: not-allowed; transform: none; }
        
        .btn-draft { background: transparent; border: 2px solid var(--locked); box-shadow: none; color: var(--text-muted); margin-top: 10px; }
        .btn-draft:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(255,193,7,0.1); }
        .btn-action { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Prompt'; transition: 0.2s; }
        .btn-action:hover { background: #e0a800; }

        #error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 15px; min-height: 20px; }

        /* --- View 2: Dashboard --- */
        #dashboard-view { display: none; min-height: 100vh; }
        .sidebar { width: 300px; background: rgba(26, 5, 0, 0.9); border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; display: flex; flex-direction: column; backdrop-filter: blur(10px); overflow-y: auto; }
        .player-profile { text-align: center; padding-bottom: 20px; border-bottom: 1px dashed #78350f; margin-bottom: 15px; }
        .player-avatar { font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 15px var(--accent); }
        .score-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; border: 1px solid #78350f; margin-top: 10px; }
        .score-box span { display: block; font-size: 1.5rem; color: #ffc107; font-weight: bold; }
        
        .sidebar-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #fff; text-align: left; padding: 12px 15px; font-family: 'Prompt', sans-serif; font-size: 1rem; cursor: pointer; transition: 0.3s; width: 100%; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-btn:hover:not(.locked):not(.cooldown):not(.completed) { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .sidebar-btn.active { background: rgba(255, 193, 7, 0.15); border: 1px solid var(--accent); box-shadow: 0 0 15px rgba(255,193,7,0.2); }
        .sidebar-btn.locked { color: var(--locked); cursor: not-allowed; border-style: dashed; }
        .sidebar-btn.completed { border-color: var(--success); background: rgba(34, 197, 94, 0.05); cursor: not-allowed; }
        .sidebar-btn.cooldown { border-color: var(--cooldown); border-style: dashed; cursor: not-allowed; background: rgba(249, 115, 22, 0.05); }
        
        .btn-info { display: flex; flex-direction: column; }
        .btn-title { font-weight: 500; }
        .countdown-text { font-size: 0.8rem; color: var(--accent); font-weight: bold; margin-top: 2px; }
        .logout-btn { margin-top: 20px; background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: #fca5a5; }

        .main-content { flex: 1; padding: 30px; position: relative; }
        .content-card { background: var(--bg-card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.4s ease-out; position: relative; max-width: 900px; margin: 0 auto; }
        .timer-hud { position: absolute; top: -15px; right: 20px; background: #000; border: 2px solid var(--primary); padding: 5px 20px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); z-index: 10; }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-card); display: flex; justify-content: center; align-items: center; z-index: 20; border-radius: 20px; flex-direction: column; color: var(--accent); font-weight: bold; font-size: 1.2rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #280f05; padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--accent); box-shadow: 0 0 30px rgba(255,193,7,0.4); max-width: 500px; width: 90%; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-content h2 { color: var(--success); margin-top: 0; font-size: 2rem; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* =========================================
           🎯 องค์ประกอบเฉพาะของด่าน 4 (UI พิเศษ)
           ========================================= */
        .section-box { border: 1px solid #78350f; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .section-title { color: var(--primary); border-bottom: 1px dashed #78350f; padding-bottom: 10px; margin-top: 0; font-size: 1.3rem; }
        
        /* Checkbox แบบ Pill (แคปซูล) */
        .pill-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .pill-label { display: inline-block; padding: 8px 16px; background: var(--card-inner); border: 1px solid #57534e; border-radius: 20px; cursor: pointer; transition: 0.2s; color: var(--text-muted); font-size: 0.9rem; user-select: none; }
        .pill-label input[type="checkbox"] { display: none; }
        .pill-label:has(input:checked) { background: rgba(255,107,0,0.2); border-color: var(--primary); color: #fff; box-shadow: 0 0 10px rgba(255,107,0,0.3); }
        
        /* การ์ดเพื่อน (Rating) */
        .classmate-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .classmate-card { background: var(--card-inner); border: 1px solid #57534e; border-radius: 10px; padding: 15px; text-align: center; position: relative; }
        .classmate-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid var(--accent); background: #333; }
        .rating-group { display: flex; justify-content: center; gap: 5px; margin-top: 8px; }
        .star-icon, .chili-icon { font-size: 1.2rem; cursor: pointer; filter: grayscale(100%) opacity(0.3); transition: 0.2s; }
        .star-icon.active { filter: grayscale(0%) drop-shadow(0 0 5px gold); }
        .chili-icon.active { filter: grayscale(0%) drop-shadow(0 0 5px red); }
        .btn-hide-card { position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; }
        .btn-hide-card:hover { color: var(--danger); }
        
        /* ทุนการศึกษาแบบ Dynamic */
        .scholarship-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; border: 1px solid #57534e; }
        .btn-remove { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--danger); font-size: 1.2rem; cursor: pointer; }

        @media (max-width: 768px) { #dashboard-view { flex-direction: column; } .sidebar { width: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); max-height: 40vh; } .main-content { padding: 15px; } .content-card { padding: 20px; } }
    </style>
</head>
<body>

    <!-- =================[ View 1: Login ]================= -->
    <div id="login-view">
        <div class="login-card">
            <img src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w200" alt="โลโก้โรงเรียน" class="login-logo">
            <h1>SYSTEM LOGIN</h1>
            <p>Buayai I Care - Student Mission</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group"><label>ID CODE (รหัสประจำตัว)</label><input type="text" id="studentId" required></div>
                <div class="form-group"><label>PASSWORD (รหัสผ่าน)</label><input type="password" id="password" required></div>
                <button type="submit" id="loginBtn" class="btn-submit">START MISSION 🚀</button>
                <div id="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- =================[ View 2: Dashboard ]================= -->
    <div id="dashboard-view">
        <div class="sidebar">
            <div class="player-profile">
                <div class="player-avatar">🧑‍🚀</div>
                <h3 style="margin: 0; color: var(--accent);">ID: <span id="display-studentId">-</span></h3>
                <div class="score-box"><small>TOTAL EXP</small><span id="display-score">0</span></div>
            </div>
            
            <button class="sidebar-btn active" onclick="loadContent('dashboard', this)" id="btn-dash">
                <div class="btn-info"><span class="btn-title">📡 ศูนย์บัญชาการ</span></div>
            </button>
            <button class="sidebar-btn" onclick="loadContent('mission1', this)" id="btn-m1">
                <div class="btn-info"><span class="btn-title">🎯 ด่าน 1: ยืนยันตัวตน</span><span class="countdown-text" id="cd-m1"></span></div><span id="icon-m1">🔓</span>
            </button>
            <button class="sidebar-btn locked" onclick="loadContent('mission2', this)" id="btn-m2">
                <div class="btn-info"><span class="btn-title">🎯 ด่าน 2: เครือข่ายครอบครัว</span><span class="countdown-text" id="cd-m2"></span></div><span id="icon-m2">🔒</span>
            </button>
            <button class="sidebar-btn locked" onclick="loadContent('mission3', this)" id="btn-m3">
                <div class="btn-info"><span class="btn-title">🎯 ด่าน 3: สแกนกายภาพ</span><span class="countdown-text" id="cd-m3"></span></div><span id="icon-m3">🔒</span>
            </button>
            <button class="sidebar-btn locked" onclick="loadContent('mission4', this)" id="btn-m4">
                <div class="btn-info"><span class="btn-title">🎯 ด่าน 4: ทักษะและพันธมิตร</span><span class="countdown-text" id="cd-m4"></span></div><span id="icon-m4">🔒</span>
            </button>
            <button class="sidebar-btn locked" onclick="loadContent('mission5', this)" id="btn-m5">
                <div class="btn-info"><span class="btn-title">🎯 ด่าน 5: ผู้สนับสนุน</span><span class="countdown-text" id="cd-m5"></span></div><span id="icon-m5">🔒</span>
            </button>
            <button class="sidebar-btn locked" onclick="loadContent('mission6', this)" id="btn-m6">
                <div class="btn-info"><span class="btn-title">🏆 ด่าน 6: ประเมินศักยภาพ</span><span class="countdown-text" id="cd-m6"></span></div><span id="icon-m6">🔒</span>
            </button>
            
            <button class="sidebar-btn logout-btn" onclick="handleLogout()">🚪 ออกจากระบบ</button>
        </div>

        <div class="main-content">
            <div class="content-card" id="dynamic-content-area"></div>
        </div>
    </div>

    <!-- =================[ Modal แจ้งผลคะแนน และใบ้ภารกิจ ]================= -->
    <div id="custom-modal">
        <div class="modal-content">
            <div style="font-size: 4rem; margin-bottom: 10px;" id="modal-icon">🎉</div>
            <h2 id="modal-heading">MISSION CLEAR!</h2>
            <p id="modal-text" style="font-size: 1.1rem; margin-bottom: 20px;"></p>
            <div id="score-container" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <h3 style="margin:0; color:#ffc107;">+ <span id="modal-score">0</span> EXP</h3>
            </div>
            <button class="btn-submit" onclick="closeModalAndGoNext()">ดำเนินการต่อ ➔</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ การตั้งค่าระบบ
        // ==========================================
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxDUeqW2fpz391aV5uXWId_gNBRQs_doBdMCljMydzV4pmEHTiuuzGN9uGTAZ5B28-DIA/exec';
        const DEV_MODE = true; 
        const COOLDOWN_MS = DEV_MODE ? (1 * 60 * 1000) : (2 * 24 * 60 * 60 * 1000); 

        let playerState = {
            score: 0,
            missions: { 
                m1: { status: 'unlocked', unlocksAt: 0 },
                m2: { status: 'locked', unlocksAt: 0 },
                m3: { status: 'locked', unlocksAt: 0 },
                m4: { status: 'locked', unlocksAt: 0 },
                m5: { status: 'locked', unlocksAt: 0 },
                m6: { status: 'locked', unlocksAt: 0 }
            }
        };

        let m4State = {
            scholarships: [],
            friendsRatings: {} 
        };

        let missionTimer = null, mainGameLoop = null, secondsElapsed = 0, currentMission = '';
        let cachedStudentData = null;
        let cachedClassmates = []; 

        window.onload = () => {
            const savedState = localStorage.getItem('playerState');
            if(savedState) playerState = JSON.parse(savedState);
            checkLoginState();
        };

        function savePlayerState() { localStorage.setItem('playerState', JSON.stringify(playerState)); updateSidebarUI(); }

        // ==========================================
        // 🔐 Login & Routing
        // ==========================================
        function checkLoginState() {
            if (localStorage.getItem('isLoggedIn') === 'true') showDashboardView();
            else showLoginView();
        }

        function showLoginView() { document.getElementById('login-view').style.display = 'flex'; document.getElementById('dashboard-view').style.display = 'none'; if(mainGameLoop) clearInterval(mainGameLoop); }

        async function showDashboardView() {
            document.getElementById('login-view').style.display = 'none'; 
            document.getElementById('dashboard-view').style.display = 'flex';
            document.getElementById('display-studentId').textContent = localStorage.getItem('studentId');
            
            const contentArea = document.getElementById('dynamic-content-area');
            contentArea.innerHTML = `<div class="loading-overlay">📡 กำลังซิงค์ข้อมูลกู้คืนความคืบหน้า... ⏳</div>`;

            try {
                const res = await fetchAPI('getData', { studentId: localStorage.getItem('studentId') });
                if(res.status === 'success' && res.studentData) { 
                    cachedStudentData = res.studentData; 
                    cachedClassmates = res.classmates || [];
                    syncProgressWithDatabase(res.studentData);
                }
            } catch (err) { console.error('Sync failed:', err); }

            updateSidebarUI(); 
            startGameLoop(); 
            loadContent('dashboard', document.getElementById('btn-dash'));
        }

        function handleLogout() { localStorage.clear(); showLoginView(); }

        async function fetchAPI(action, payload = {}) {
            payload.action = action;
            const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
            return await res.json();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn'), errorMsg = document.getElementById('error-msg');
            const stuId = document.getElementById('studentId').value.trim(), pass = document.getElementById('password').value.trim();
            btn.disabled = true; btn.textContent = 'CONNECTING... ⏳'; errorMsg.textContent = '';
            try {
                const data = await fetchAPI('login', { studentId: stuId, password: pass });
                if (data.status === 'success') {
                    localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('studentId', data.data.studentId);
                    showDashboardView();
                } else throw new Error(data.message || 'รหัสไม่ถูกต้อง');
            } catch (error) { errorMsg.textContent = `❌ ${error.message}`; } 
            finally { btn.disabled = false; btn.textContent = 'START MISSION 🚀'; }
        }

        function syncProgressWithDatabase(sd) {
            let updated = false;
            if (sd.citizenId && sd.fullName && playerState.missions.m1.status !== 'completed') {
                playerState.missions.m1.status = 'completed';
                if (playerState.missions.m2.status === 'locked') playerState.missions.m2.status = 'unlocked';
                updated = true;
            }
            if (sd.guardianName && sd.guardianPhone && playerState.missions.m2.status !== 'completed') {
                playerState.missions.m2.status = 'completed';
                if (playerState.missions.m3.status === 'locked') playerState.missions.m3.status = 'unlocked';
                updated = true;
            }
            if (sd.weight && sd.height && playerState.missions.m3.status !== 'completed') {
                playerState.missions.m3.status = 'completed';
                if (playerState.missions.m4.status === 'locked') playerState.missions.m4.status = 'unlocked';
                updated = true;
            }
            if (sd.preferencesJson && sd.friendsJson && playerState.missions.m4.status !== 'completed') {
                playerState.missions.m4.status = 'completed';
                if (playerState.missions.m5.status === 'locked') playerState.missions.m5.status = 'unlocked';
                updated = true;
            }
            if (updated) savePlayerState();
        }

        function startGameLoop() {
            if(mainGameLoop) clearInterval(mainGameLoop);
            mainGameLoop = setInterval(() => {
                let now = Date.now(), uiNeedsUpdate = false;
                for (let i = 1; i <= 6; i++) {
                    let mId = 'm' + i, mission = playerState.missions[mId], textElement = document.getElementById('cd-' + mId);
                    if (mission.status === 'cooldown') {
                        let timeLeft = mission.unlocksAt - now;
                        if (timeLeft <= 0) { mission.status = 'unlocked'; textElement.textContent = ''; uiNeedsUpdate = true; } 
                        else {
                            let days = Math.floor(timeLeft / (1000 * 60 * 60 * 24)), hours = Math.floor((timeLeft / (1000 * 60 * 60)) % 24), mins = Math.floor((timeLeft / 1000 / 60) % 60), secs = Math.floor((timeLeft / 1000) % 60);
                            textElement.textContent = DEV_MODE ? `⏳ ชาร์จพลัง: ${mins}น ${secs}วิ` : `⏳ ปลดล็อกใน: ${days}วัน ${hours}ชม ${mins}น`;
                        }
                    } else if (textElement) textElement.textContent = ''; 
                }
                if(uiNeedsUpdate) savePlayerState();
            }, 1000);
        }

        function updateSidebarUI() {
            document.getElementById('display-score').textContent = playerState.score.toLocaleString();
            for (let i = 1; i <= 6; i++) {
                let mId = 'm' + i, status = playerState.missions[mId].status, btn = document.getElementById('btn-' + mId), icon = document.getElementById('icon-' + mId);
                btn.className = 'sidebar-btn'; 
                if (status === 'locked') { btn.classList.add('locked'); icon.textContent = '🔒'; }
                else if (status === 'unlocked') { icon.textContent = '🔓'; }
                else if (status === 'completed') { btn.classList.add('completed'); icon.textContent = '✅'; }
                else if (status === 'cooldown') { btn.classList.add('cooldown'); icon.textContent = '⏳'; }
            }
        }

        function startTimer() {
            clearInterval(missionTimer); secondsElapsed = 0;
            const timerDisplay = document.getElementById('mission-timer-display');
            if(timerDisplay) timerDisplay.textContent = "00:00";
            missionTimer = setInterval(() => {
                secondsElapsed++;
                if(document.getElementById('mission-timer-display')) {

                    if(pref.activities.includes("อื่นๆ")) document.getElementById('m4-act-other').style.display = 'block';
                }
                if(pref.career === "อื่นๆ") document.getElementById('m4-car-other').style.display = 'block';
                
                renderClassmatesUI();
                renderScholarshipsUI();
                
                if(pref.commuteDetails) {
                    if(pref.commuteType === 'A') {
                        document.getElementById('m4-A-type').value = pref.commuteDetails.type || 'จักรยานยนต์';
                        document.getElementById('m4-A-brand').value = pref.commuteDetails.brand || '';
                        document.getElementById('m4-A-plate').value = pref.commuteDetails.plate || '';
                        document.getElementById('m4-A-license').value = pref.commuteDetails.license || 'ไม่มี';
                    } else if(pref.commuteType === 'B') {
                        document.getElementById('m4-B-driver').value = pref.commuteDetails.driver || '';
                        document.getElementById('m4-B-phone').value = pref.commuteDetails.phone || '';
                        document.getElementById('m4-B-type').value = pref.commuteDetails.type || 'รถตู้';
                        if(pref.commuteDetails.type === 'อื่นๆ') document.getElementById('m4-B-type-other').style.display = 'block';
                        document.getElementById('m4-B-type-other').value = pref.commuteDetails.typeOther || '';
                        document.getElementById('m4-B-plate').value = pref.commuteDetails.plate || '';
                        document.getElementById('m4-B-village').value = pref.commuteDetails.village || '';
                        document.getElementById('m4-B-fare').value = pref.commuteDetails.fare || '';
                    }
                }
                toggleCommuteDetails();
            }
            else {
                contentArea.innerHTML = `<h2 style="color: var(--accent); margin-top:0;">🎯 กำลังพัฒนาด่านนี้...</h2><p>โปรดรออัปเดตระบบในอนาคต</p>`;
            }
        }

        // ==========================================
        // 🧩 ฟังก์ชันเฉพาะของด่าน 4
        // ==========================================
        
        // 🌟 ฟังก์ชันสกัดลิงก์ Google Drive ให้เป็น Thumbnail เพื่อให้ <img> แสดงได้
        function getDriveThumbnailUrl(url) {
            if (!url) return 'https://via.placeholder.com/80?text=No+Img';
            // หาชุดตัวอักษร ID ของ Google Drive
            const match = url.match(/[-\w]{25,}/);
            if (match) {
                return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w200`;
            }
            return url; // ถ้ารูปแบบอื่นปล่อยผ่าน
        }

        function toggleCommuteDetails() {
            const type = document.getElementById('m4-commuteType').value;
            document.getElementById('commute-details-A').style.display = type === 'A' ? 'block' : 'none';
            document.getElementById('commute-details-B').style.display = type === 'B' ? 'block' : 'none';
        }

        // 🌟 อัปเดต UI เพื่อน: ใช้ Thumbnail และเพิ่มปุ่มซ่อน (✖)
        function renderClassmatesUI() {
            const container = document.getElementById('classmates-container');
            if(cachedClassmates.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); background:rgba(0,0,0,0.3); padding:15px; border-radius:10px;">ไม่พบรายชื่อเพื่อนในห้องเดียวกัน โปรดตรวจสอบว่าข้อมูลเพื่อนคนอื่นๆ ถูกบันทึกในฐานข้อมูล (ชีต students คอลัมน์ D) แล้วหรือไม่</p>';
                return;
            }
            let html = '';
            cachedClassmates.forEach(mate => {
                const ratings = m4State.friendsRatings[mate.studentId] || { star: 0, chili: 0 };
                // นำลิงก์ไปผ่านตัวกรอง Thumbnail ก่อน
                const imgSrc = getDriveThumbnailUrl(mate.profileImageUrl);
                
                html += `
                    <div class="classmate-card" id="card-${mate.studentId}">
                        <!-- ปุ่มซ่อนการ์ด -->
                        <button type="button" class="btn-hide-card" onclick="document.getElementById('card-${mate.studentId}').style.display='none'" title="ซ่อนเพื่อนคนนี้">✖</button>
                        
                        <img src="${imgSrc}" class="classmate-img" onerror="this.src='https://via.placeholder.com/80?text=Err'">
                        <div style="font-weight:600; font-size:0.9rem;">${mate.fullName}</div>
                        <div class="rating-group">
                            ${[1,2,3,4,5].map(i => `<span class="star-icon ${i <= ratings.star ? 'active' : ''}" onclick="setRating('${mate.studentId}', 'star', ${i})">⭐</span>`).join('')}
                        </div>
                        <div class="rating-group">
                            ${[1,2,3,4,5].map(i => `<span class="chili-icon ${i <= ratings.chili ? 'active' : ''}" onclick="setRating('${mate.studentId}', 'chili', ${i})">🌶️</span>`).join('')}
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        window.setRating = function(studentId, type, score) {
            if(!m4State.friendsRatings[studentId]) m4State.friendsRatings[studentId] = { star:0, chili:0 };
            if(m4State.friendsRatings[studentId][type] === score) m4State.friendsRatings[studentId][type] = 0;
            else m4State.friendsRatings[studentId][type] = score;
            renderClassmatesUI();
        }

        window.addScholarshipUI = function() {
            m4State.scholarships.push({ name: '', amount: '', date: '' });
            renderScholarshipsUI();
        }
        window.removeScholarshipUI = function(index) {
            m4State.scholarships.splice(index, 1);
            renderScholarshipsUI();
        }
        window.updateSchData = function(index, field, val) {
            m4State.scholarships[index][field] = val;
        }
        
        function renderScholarshipsUI() {
            const container = document.getElementById('scholarships-container');
            if(m4State.scholarships.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); font-size:0.9rem;">ยังไม่มีประวัติรับทุน (หากมีให้กดปุ่มเพิ่มทุน)</p>';
                return;
            }
            let html = '';
            m4State.scholarships.forEach((sch, i) => {
                html += `
                <div class="scholarship-item">
                    <button type="button" class="btn-remove" onclick="removeScholarshipUI(${i})" title="ลบทุนนี้">✖</button>
                    <strong>ทุนครั้งที่ ${i+1}</strong>
                    <div class="form-grid" style="margin-top:10px;">
                        <div class="form-group"><label>ชื่อทุน</label><input type="text" value="${sch.name}" onchange="updateSchData(${i}, 'name', this.value)" required></div>
                        <div class="form-group"><label>จำนวนเงิน (บาท)</label><input type="number" value="${sch.amount}" onchange="updateSchData(${i}, 'amount', this.value)" required></div>
                        <div class="form-group full-width"><label>วันที่ได้รับ</label><input type="date" value="${sch.date}" onchange="updateSchData(${i}, 'date', this.value)" required></div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // ==========================================
        // 💾 บันทึกข้อมูล (Save Draft & Submit)
        // ==========================================
        async function submitMission(e, missionNumber, isDraft = false) {
            if(e) e.preventDefault();
            
            const btnDraft = document.getElementById(`btn-draft-${missionNumber}`);
            const btnSubmit = document.getElementById(`btn-submit-${missionNumber}`);
            if(btnDraft) btnDraft.disabled = true;
            if(btnSubmit) { btnSubmit.disabled = true; btnSubmit.textContent = 'UPLOADING DATA... ⏳'; }
            
            clearInterval(missionTimer);

            let payload = { studentId: localStorage.getItem('studentId'), mission: String(missionNumber) };

            try {
                if (missionNumber === 1) { /* โค้ดด่าน 1 */ } 
                else if (missionNumber === 2) { /* โค้ดด่าน 2 */ }
                else if (missionNumber === 3) { /* โค้ดด่าน 3 */ }
                else if (missionNumber === 4) {
                    let prefData = {
                        subjects: Array.from(document.querySelectorAll('#m4-subjects input:checked')).map(el => el.value),
                        subjectOther: document.getElementById('m4-sub-other').value,
                        activities: Array.from(document.querySelectorAll('#m4-activities input:checked')).map(el => el.value),
                        activityOther: document.getElementById('m4-act-other').value,
                        color: document.getElementById('m4-color').value,
                        career: document.getElementById('m4-career').value,
                        careerOther: document.getElementById('m4-car-other').value,
                        scholarships: m4State.scholarships,
                        commuteDistance: document.getElementById('m4-distance').value,
                        commuteType: document.getElementById('m4-commuteType').value,
                        commuteDetails: {}
                    };

                    if(prefData.commuteType === 'A') {
                        prefData.commuteDetails = {
                            type: document.getElementById('m4-A-type').value,
                            brand: document.getElementById('m4-A-brand').value,
                            plate: document.getElementById('m4-A-plate').value,
                            license: document.getElementById('m4-A-license').value
                        };
                    } else if(prefData.commuteType === 'B') {
                        prefData.commuteDetails = {
                            driver: document.getElementById('m4-B-driver').value,
                            phone: document.getElementById('m4-B-phone').value,
                            type: document.getElementById('m4-B-type').value,
                            typeOther: document.getElementById('m4-B-type-other').value,
                            plate: document.getElementById('m4-B-plate').value,
                            village: document.getElementById('m4-B-village').value,
                            fare: document.getElementById('m4-B-fare').value
                        };
                    }

                    payload.preferencesJson = JSON.stringify(prefData);
                    payload.friendsJson = JSON.stringify(m4State.friendsRatings);
                }

                const res = await fetchAPI('saveData', payload);
                if (res.status !== 'success') throw new Error(res.message || 'บันทึกไม่สำเร็จ');

                if (isDraft) {
                    document.getElementById('modal-icon').textContent = '📝';
                    document.getElementById('modal-heading').textContent = "DRAFT SAVED!";
                    document.getElementById('modal-heading').style.color = "var(--accent)";
                    document.getElementById('modal-text').innerHTML = `บันทึกร่างด่าน ${missionNumber} เรียบร้อยแล้ว!<br>ข้อมูลถูกเก็บเข้าคลัง คุณสามารถกลับมาแก้ไขต่อได้เสมอ`;
                    document.getElementById('score-container').style.display = 'none'; 
                } else {
                    const baseScore = 1000;
                    const timeBonus = Math.max(0, 500 - (secondsElapsed * 5)); 
                    const earnedScore = baseScore + timeBonus;

                    playerState.score += earnedScore;
                    playerState.missions[`m${missionNumber}`].status = 'completed'; 
                    
                    let nextMission = missionNumber + 1;
                    if(playerState.missions[`m${nextMission}`]) {
                        playerState.missions[`m${nextMission}`].status = 'cooldown';
                        playerState.missions[`m${nextMission}`].unlocksAt = Date.now() + COOLDOWN_MS;
                    }
                    savePlayerState();

                    let prepText = '';
                    if (missionNumber === 1) prepText = 'เตรียมชื่อ-สกุล บิดามารดา/ผู้ปกครอง, เบอร์โทรศัพท์ และ <b>ภาพลายเซ็นผู้ปกครอง</b>';
                    else if (missionNumber === 2) prepText = 'เตรียมข้อมูล <b>น้ำหนัก ส่วนสูง</b> และโรคประจำตัว (ถ้ามี)';
                    else if (missionNumber === 3) prepText = 'เตรียมข้อมูล <b>วิชาที่ชอบ</b>, อาชีพในฝัน และรายชื่อเพื่อนสนิท';
                    else if (missionNumber === 4) prepText = 'เตรียมข้อมูล <b>เครือข่ายผู้สนับสนุน</b> และ <b>รูปถ่ายของบิดา/มารดา</b>';
                    else prepText = 'เตรียมตัวให้พร้อมสำหรับความท้าทายต่อไป!';

                    const waitText = DEV_MODE ? '1 นาที' : '2 วัน';

                    document.getElementById('modal-icon').textContent = '🎉';
                    document.getElementById('modal-heading').textContent = "MISSION CLEAR!";
                    document.getElementById('modal-heading').style.color = "var(--success)";
                    document.getElementById('modal-text').innerHTML = `
                        ด่าน ${missionNumber} สำเร็จ และถูกปิดถาวรแล้ว!<br>
                        ด่านถัดไปจะเปิดในอีก <b>${waitText}</b> ⏳<br><br>
                        <div style="background: rgba(255, 107, 0, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary); font-size: 0.95rem; text-align: left;">
                            💡 <b>สิ่งที่ต้องเตรียมในภารกิจต่อไป (ด่านที่ ${nextMission}):</b><br>${prepText}
                        </div>
                    `;
                    document.getElementById('score-container').style.display = 'block';
                    document.getElementById('modal-score').textContent = earnedScore.toLocaleString();
                }

                document.getElementById('custom-modal').style.display = 'flex';

            } catch (error) {
                alert('เกิดข้อผิดพลาด: ' + error.message);
                if(btnDraft) btnDraft.disabled = false;
                if(btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'บันทึก & ผ่านด่าน 🏆'; }
                startTimer(); 
            }
        }

        function closeModalAndGoNext() {
            document.getElementById('custom-modal').style.display = 'none';
            showDashboardView(); 
        }
    </script>
</body>
</html>
