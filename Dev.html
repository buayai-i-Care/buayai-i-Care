<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ: Buayai I Care School สำหรับนักเรียน</title>
    <!-- นำเข้าฟอนต์ Sarabun เพื่อความเป็นทางการและอ่านง่าย -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316; 
            --primary-hover: #ea580c;
            --bg-color: #fff7ed;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .login-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 40px 30px;
            text-align: center;
            box-sizing: border-box;
        }
        .icon-container { font-size: 4rem; margin-bottom: 10px; }
        h1 { margin-top: 0; color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; font-weight: 700; }
        p { color: #6b7280; font-size: 0.95rem; margin-bottom: 30px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }
        input:disabled { background-color: #f3f4f6; cursor: not-allowed; }
        
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        #error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 15px;
            min-height: 20px;
            font-weight: 500;
            word-wrap: break-word;
        }

        .action-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .action-links a { color: var(--primary); text-decoration: none; font-weight: 600; transition: 0.2s; }
        .action-links a:hover { color: var(--primary-hover); text-decoration: underline; }
        
        .student-badge {
            display: inline-block;
            background-color: #ffedd5;
            color: var(--primary-hover);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="icon-container">🔐</div>
    <div class="student-badge">🧑‍🎓 โหมดนักเรียน</div>
    <h1>เข้าสู่ระบบนักเรียน</h1>
    <p>Buayai I Care School</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="studentId">เลขประจำตัวนักเรียน</label>
            <input type="text" id="studentId" placeholder="เช่น 1111" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label for="password">รหัสผ่าน</label>
            <input type="password" id="password" placeholder="เช่น 1111" required autocomplete="current-password">
        </div>

        <button type="submit" id="loginBtn">เข้าสู่ระบบ 🚀</button>
        <div id="error-msg"></div>
        
        <div class="action-links">
            <a href="appyEpoint.html">ยังไม่สมัคร? ไปที่นี่</a>
            <a href="loginEpoint.html">ลืมรหัสผ่าน? ไปที่นี่</a>
        </div>
    </form>
</div>

<script>
    // ==========================================
    // ⚙️ Configuration
    // ==========================================
    // ⚠️ โปรดตรวจสอบให้แน่ใจว่า URL นี้มาจากการ Deploy แบบ "New Deployment" เสมอ
    const LOGIN_API_URL = 'https://script.google.com/macros/s/AKfycbyojpX4udti1CiMSQm9L7DfBgxieW16K3q3f-gaNWpOahzIu5cR0kTTGy3uG1qHrkC5RA/exec';

    // ==========================================
    // 🔄 Initialization
    // ==========================================
    window.onload = () => {
        // หากผู้ใช้เคยล็อกอินไว้แล้ว ให้ Redirect ทันที
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.replace('advice/Std_info_dashboard.html'); // ใช้ replace เพื่อไม่ให้กด Back กลับมาหน้าล็อกอินได้
        }
    };

    // ==========================================
    // 🔐 Login Handler
    // ==========================================
    async function handleLogin(e) {
        e.preventDefault();
        
        const studentIdInput = document.getElementById('studentId');
        const passwordInput = document.getElementById('password');
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('error-msg');

        // รวบรวมข้อมูล
        const studentId = studentIdInput.value.trim();
        const password = passwordInput.value.trim();

        // Validate เบื้องต้นฝั่ง Client
        if (!studentId || !password) {
            errorMsg.textContent = '❌ กรุณากรอกข้อมูลให้ครบถ้วน';
            return;
        }

        // Lock UI State
        errorMsg.textContent = '';
        btn.disabled = true;
        studentIdInput.disabled = true;
        passwordInput.disabled = true;
        btn.textContent = 'กำลังตรวจสอบข้อมูล... ⏳';

        try {
            // สร้าง Payload แบบ URLSearchParams (หลีกเลี่ยง CORS Preflight issues)
            const payload = new URLSearchParams({
                'action': 'login', // ❗️ จุดสำคัญ: แจ้ง Backend ว่านี่คือคำสั่งล็อกอิน
                'studentId': studentId,
                'password': password
            });

            // ดำเนินการยิง Request
            const response = await fetch(LOGIN_API_URL, {
                method: 'POST',
                body: payload
            });

            // ตรวจสอบ HTTP Status
            if (!response.ok) {
                throw new Error(`HTTP Error: ${response.status}`);
            }

            // รับและตรวจสอบผลลัพธ์ (ดักจับกรณี GAS พ่น HTML error page ออกมา)
            let data;
            try {
                data = await response.json();
            } catch (parseError) {
                console.error("JSON Parse Error. Server might have returned HTML.", parseError);
                throw new Error("เซิร์ฟเวอร์ตอบกลับในรูปแบบที่ไม่ถูกต้อง (ตรวจสอบการ Deploy ของ GAS)");
            }

            // ประมวลผลลัพธ์ทางตรรกะ (Business Logic)
            if (data.status === 'success') {
                // เซฟ Session ลง LocalStorage อย่างปลอดภัย
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('studentId', data.data.studentId);
                localStorage.setItem('room', data.data.room);
                
                // อัปเดต UI ให้ผู้ใช้ทราบ
                btn.style.backgroundColor = 'var(--success)';
                btn.textContent = 'สำเร็จ! กำลังเข้าสู่ระบบ... ✅';
                
                // หน่วงเวลาเล็กน้อยเพื่อให้เห็นข้อความสำเร็จ ก่อน Redirect
                setTimeout(() => {
                    window.location.replace('advice/Std_info_dashboard.html');
                }, 800);
            } else {
                // รหัสผ่านผิด หรือ ไม่พบผู้ใช้
                throw new Error(data.message || 'รหัสประจำตัวหรือรหัสผ่านไม่ถูกต้อง');
            }

        } catch (error) {
            console.error("Login Process Error:", error);
            
            // แสดงข้อความ Error ตามกรณี
            if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                errorMsg.textContent = '❌ ขัดข้องทางเครือข่าย โปรดตรวจสอบอินเทอร์เน็ต หรือ URL ของ GAS';
            } else {
                errorMsg.textContent = `❌ ${error.message}`;
            }

            // ปลดล็อก UI State ให้กรอกใหม่ได้
            btn.disabled = false;
            studentIdInput.disabled = false;
            passwordInput.disabled = false;
            btn.textContent = 'เข้าสู่ระบบ 🚀';
            passwordInput.value = ''; // เคลียร์รหัสผ่านให้กรอกใหม่
            passwordInput.focus();
        }
    }
</script>

</body>
</html>
