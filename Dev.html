<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทดสอบเชื่อมต่อฐานข้อมูล and otehr feature </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-top: 0;
            color: #111827;
            font-size: 1.5rem;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
            text-align: center;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        #status-message {
            margin-top: 20px;
            font-weight: 600;
            text-align: center;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }
        li {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .col-number {
            font-weight: bold;
            color: #4b5563;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 โครงสร้างคอลัมน์ Sheet</h2>
    <p style="text-align: center; color: #4b5563; margin-bottom: 20px;">
        คลิกปุ่มด้านล่างเพื่อดึงข้อมูลจาก Google Sheet
    </p>
    
    <button onclick="fetchColumns()" id="fetch-btn">ดึงข้อมูลคอลัมน์</button>
    
    <div id="status-message"></div>
    <ul id="column-list"></ul>
</div>

<script>
    // ⚠️ นำ URL ของ Web app จาก Google Apps Script มาใส่ในเครื่องหมายคำพูดด้านล่างนี้
    // เช่น const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/xxxx/exec';
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyojpX4udti1CiMSQm9L7DfBgxieW16K3q3f-gaNWpOahzIu5cR0kTTGy3uG1qHrkC5RA/exec';

    async function fetchColumns() {
        const listContainer = document.getElementById('column-list');
        const statusMessage = document.getElementById('status-message');
        const fetchBtn = document.getElementById('fetch-btn');
        
        // ล้างข้อมูลเก่าและปรับสถานะปุ่ม
        listContainer.innerHTML = ''; 
        statusMessage.textContent = '⏳ กำลังดึงข้อมูลจากฐานข้อมูล...';
        statusMessage.style.color = '#d97706'; // สีส้ม
        fetchBtn.disabled = true;

        try {
            const response = await fetch(GAS_WEB_APP_URL);
            const data = await response.json();

            if (data.status === 'success') {
                statusMessage.textContent = '✅ ดึงข้อมูลสำเร็จ!';
                statusMessage.style.color = '#16a34a'; // สีเขียว
                
                data.columns.forEach((colName, index) => {
                    const li = document.createElement('li');
                    // ถ้าช่องว่างให้แสดงข้อความสีแดงเตือน
                    const nameDisplay = colName ? colName : '<span style="color:#ef4444; font-style:italic;">(ไม่มีชื่อคอลัมน์)</span>';
                    li.innerHTML = `<span class="col-number">[คอลัมน์ ${index + 1}]</span> ${nameDisplay}`;
                    listContainer.appendChild(li);
                });
            } else {
                statusMessage.textContent = `❌ เกิดข้อผิดพลาด: ${data.message}`;
                statusMessage.style.color = '#dc2626'; // สีแดง
            }
        } catch (error) {
            statusMessage.textContent = `❌ ไม่สามารถเชื่อมต่อได้ กรุณาตรวจสอบ URL ของ GAS อีกครั้ง`;
            statusMessage.style.color = '#dc2626'; // สีแดง
            console.error("Error details:", error);
        } finally {
            fetchBtn.disabled = false;
        }
    }
</script>

</body>
</html>
